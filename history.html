<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a192f">
    <title>سجل الرقابة | نظام موكّل</title>
    
    <link rel="manifest" href="./manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <link href="./css/style.css" rel="stylesheet">
    
    <style>
        .audit-card {
            border-right: 4px solid var(--navy, #0a192f);
            transition: all 0.3s ease;
            border-radius: 12px;
        }
        .audit-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 .5rem 1rem rgba(0,0,0,.1) !important;
            border-color: var(--accent, #64ffda);
        }
        .diff-viewer {
            background-color: #f1f5f9;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 0.85rem;
            max-height: 400px;
            overflow-y: auto;
            direction: ltr;
            text-align: left;
        }
        .diff-removed {
            background-color: #ffe6e6;
            color: #cc0000;
            text-decoration: line-through;
            padding: 2px 4px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 2px;
        }
        .diff-added {
            background-color: #e6ffe6;
            color: #008000;
            font-weight: bold;
            padding: 2px 4px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 2px;
        }
        .action-badge {
            font-size: 0.75rem;
            padding: 5px 10px;
        }
        .action-badge.CREATE { background-color: #10b981; color: white; }
        .action-badge.UPDATE { background-color: #3b82f6; color: white; }
        .action-badge.DELETE { background-color: #ef4444; color: white; }
    </style>
</head>
<body class="bg-light pb-5">

    <div class="top-nav px-3 d-flex align-items-center justify-content-between">
        <button class="btn btn-link text-white p-0" onclick="window.location.href='app.html'"><i class="fas fa-arrow-right fs-4"></i></button>
        <h5 class="mb-0 fw-bold text-white text-truncate mx-2"><i class="fas fa-history text-accent me-2"></i> سجل الرقابة والمتابعة</h5>
        <button class="btn btn-sm btn-outline-light text-white fw-bold shadow-sm" onclick="loadAuditLogs()" title="تحديث السجل"><i class="fas fa-sync"></i></button>
    </div>

    <div class="container mt-4">
        <div class="card-custom p-3 shadow-sm mb-4 bg-white border-0">
            <p class="text-muted small mb-3"><i class="fas fa-info-circle text-primary"></i> يعرض هذا السجل كافة الحركات والإجراءات التي تمت داخل المكتب، وهو مخصص للمدراء فقط لضمان النزاهة وحماية البيانات (Zero Data Loss).</p>
            
            <div class="row g-2">
                <div class="col-md-5 col-6">
                    <select class="form-select border-0 shadow-sm bg-light fw-bold text-navy" id="filterAction" onchange="loadAuditLogs()">
                        <option value="">جميع الحركات</option>
                        <option value="CREATE">إضافة سجل جديد (Create)</option>
                        <option value="UPDATE">تعديل بيانات (Update)</option>
                        <option value="DELETE">حذف سجل (Delete)</option>
                    </select>
                </div>
                <div class="col-md-5 col-6">
                    <select class="form-select border-0 shadow-sm bg-light fw-bold text-navy" id="filterModule" onchange="loadAuditLogs()">
                        <option value="">جميع أقسام النظام</option>
                        <option value="mo_cases">القضايا</option>
                        <option value="mo_clients">الموكلين</option>
                        <option value="mo_installments">الدفعات المالية</option>
                        <option value="mo_expenses">المصاريف</option>
                        <option value="mo_users">فريق العمل (HR)</option>
                        <option value="mo_files">المستندات والملفات</option>
                    </select>
                </div>
                <div class="col-md-2 col-12">
                    <button class="btn btn-navy w-100 fw-bold shadow-sm" onclick="loadAuditLogs()"><i class="fas fa-filter"></i> تصفية</button>
                </div>
            </div>
        </div>

        <div id="loadingIndicator" class="text-center py-5">
            <i class="fas fa-spinner fa-spin fa-3x text-primary mb-3"></i>
            <h6 class="text-muted">جاري سحب السجل الأمني...</h6>
        </div>

        <div class="row" id="auditContainer" style="display: none;">
            </div>
    </div>

    <div class="modal fade" id="diffModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-navy text-white border-0" style="border-radius: 15px 15px 0 0;">
                    <h5 class="modal-title fw-bold"><i class="fas fa-search-plus text-accent me-2"></i> مقارنة التعديلات (Time Machine)</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 bg-light" id="diffModalBody">
                    </div>
                <div class="modal-footer border-0 bg-white">
                    <button type="button" class="btn btn-outline-navy fw-bold px-4" data-bs-dismiss="modal">إغلاق</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/history.js"></script>
</body>
</html>
