<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a192f">
    <title>موكّل | المساعد القانوني الذكي (AI)</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <link href="./css/style.css" rel="stylesheet">
    
    <style>
        body { background: #f8fafc; font-family: 'Cairo', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        
        .top-nav { background: var(--navy); height: 65px; display: flex; align-items: center; padding: 0 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 10; flex-shrink: 0; }
        
        .chat-container { flex-grow: 1; overflow-y: auto; padding: 20px; padding-bottom: 20px; scroll-behavior: smooth; display: flex; flex-direction: column; }
        
        .chat-bubble { max-width: 85%; padding: 15px 20px; border-radius: 20px; margin-bottom: 15px; font-size: 0.95rem; line-height: 1.7; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.03); word-wrap: break-word; }
        .chat-bubble.ai { background-color: white; color: var(--navy); border: 1px solid #e2e8f0; border-top-right-radius: 0; align-self: flex-start; }
        .chat-bubble.user { background: linear-gradient(135deg, var(--navy) 0%, #1e3a8a 100%); color: white; border-top-left-radius: 0; align-self: flex-end; margin-left: auto; }
        
        .chat-input-area { background: white; padding: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 10; display: flex; gap: 10px; align-items: flex-end; border-top: 1px solid #e2e8f0; flex-shrink: 0; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        
        .chat-input { flex-grow: 1; border-radius: 20px; border: 1px solid #e2e8f0; padding: 12px 20px; font-size: 0.95rem; background: #f8fafc; transition: 0.3s; resize: none; overflow-y: auto; min-height: 50px; max-height: 120px; font-family: 'Cairo', sans-serif; }
        .chat-input:focus { outline: none; border-color: var(--accent); background: white; box-shadow: 0 0 0 3px rgba(100, 255, 218, 0.2); }
        
        .btn-send { background-color: var(--navy); color: white; border: none; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.3s; flex-shrink: 0; }
        .btn-send:hover { background-color: var(--accent); color: var(--navy); transform: scale(1.05); }
        .btn-send:disabled { background-color: #cbd5e1; cursor: not-allowed; transform: none; color: white; }
        
        .typing-indicator { display: none; padding: 15px 20px; background: white; border-radius: 20px; border-top-right-radius: 0; width: fit-content; border: 1px solid #e2e8f0; margin-bottom: 15px; align-self: flex-start; }
        .typing-indicator span { display: inline-block; width: 8px; height: 8px; background-color: var(--navy); border-radius: 50%; margin: 0 2px; animation: typing 1.4s infinite ease-in-out both; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        
        /* تنسيقات مخرجات الـ AI */
        .ai-text p { margin-bottom: 10px; }
        .ai-text p:last-child { margin-bottom: 0; }
        .ai-text ul { padding-right: 20px; margin-bottom: 10px; }
        .ai-text strong { color: #0a192f; }
        
        /* تخصيص الـ Scrollbar */
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .chat-input::-webkit-scrollbar { width: 4px; }
        .chat-input::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>

    <script>
        const fwSettings = JSON.parse(localStorage.getItem('firm_settings'));
        if (fwSettings) {
            if (fwSettings.primary_color) document.documentElement.style.setProperty('--navy', fwSettings.primary_color);
            if (fwSettings.accent_color) document.documentElement.style.setProperty('--accent', fwSettings.accent_color);
        }
    </script>
</head>
<body>

    <div class="top-nav">
        <button class="btn btn-link text-white text-decoration-none me-2 p-0" onclick="window.location.href='app.html'">
            <i class="fas fa-arrow-right fs-4"></i>
        </button>
        <h6 class="text-white mb-0 fw-bold d-flex align-items-center">
            <i class="fas fa-robot text-accent me-2 fa-lg"></i> المساعد القانوني (AI)
        </h6>
        <button class="btn btn-sm btn-outline-light ms-auto rounded-pill px-3 shadow-sm" onclick="clearChat()" title="محادثة جديدة">
            <i class="fas fa-trash-alt me-1"></i> مسح
        </button>
    </div>

    <div class="chat-container" id="chat-box">
        <div class="chat-bubble ai">
            <div class="d-flex align-items-center mb-2 pb-2 border-bottom">
                <i class="fas fa-robot text-accent me-2 fs-5"></i>
                <h6 class="fw-bold mb-0 text-navy">موكّل الذكي</h6>
            </div>
            <div class="ai-text text-muted">
                أهلاً بك يا أستاذ. أنا مساعدك القانوني الذكي المدعوم بـ Cloudflare AI.<br>
                يمكنني مساعدتك في صياغة اللوائح، تلخيص الوقائع، استخراج القوانين، أو الإجابة على استفساراتك القانونية. كيف يمكنني خدمتك اليوم؟
            </div>
        </div>
        
        <div class="typing-indicator" id="typing-indicator">
            <span></span><span></span><span></span>
        </div>
    </div>

    <div class="chat-input-area">
        <button class="btn btn-light text-navy rounded-circle shadow-sm" style="width: 45px; height: 45px; flex-shrink: 0;" onclick="startDictation()" title="إملاء صوتي">
            <i class="fas fa-microphone fs-5"></i>
        </button>
        <textarea id="chat-input" class="chat-input shadow-sm" placeholder="اكتب سؤالك أو استشارتك هنا..." rows="1" oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
        <button id="btn-send" class="btn-send shadow" onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    
    <script>
        // التحقق من الجلسة
        window.onload = () => {
            if (!localStorage.getItem(CONFIG.TOKEN_KEY)) {
                window.location.href = 'login.html';
            }
            loadChatHistory();
            scrollToBottom();
        };

        // دالة الحماية من XSS
        const escapeHTML = (str) => {
            if (!str) return '';
            return str.toString().replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        };

        // التوسيع التلقائي لمربع النص
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight) + 'px';
            if (textarea.value.trim() === '') {
                textarea.style.height = '50px';
            }
        }

        // إرسال بالضغط على Enter (بدون Shift)
        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // النزول لأسفل المحادثة
        function scrollToBottom() {
            const chatBox = document.getElementById('chat-box');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // تنسيق النصوص القادمة من الذكاء الاصطناعي (Markdown بسيط)
        function formatAIText(text) {
            let formatted = escapeHTML(text);
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); // Bold
            formatted = formatted.replace(/\n/g, '<br>'); // New lines
            return `<div class="ai-text">${formatted}</div>`;
        }

        // حفظ وجلب سجل المحادثة المحلي
        function saveToHistory(role, content) {
            let history = JSON.parse(localStorage.getItem('ai_chat_history')) || [];
            history.push({ role, content });
            // الاحتفاظ بآخر 20 رسالة فقط لتوفير المساحة
            if(history.length > 20) history = history.slice(history.length - 20);
            localStorage.setItem('ai_chat_history', JSON.stringify(history));
        }

        function loadChatHistory() {
            const history = JSON.parse(localStorage.getItem('ai_chat_history')) || [];
            const chatBox = document.getElementById('chat-box');
            const indicator = document.getElementById('typing-indicator');
            
            history.forEach(msg => {
                const div = document.createElement('div');
                if (msg.role === 'user') {
                    div.className = 'chat-bubble user';
                    div.innerText = msg.content;
                } else {
                    div.className = 'chat-bubble ai shadow-sm';
                    div.innerHTML = formatAIText(msg.content);
                    // إضافة زر النسخ لرسائل الـ AI
                    div.innerHTML += `<button class="btn btn-sm btn-light border position-absolute bottom-0 start-0 m-2 py-0 px-2 text-muted shadow-sm" onclick="navigator.clipboard.writeText('${escapeHTML(msg.content).replace(/'/g, "\\'")}').then(() => Swal.fire({toast:true, position:'top-end', icon:'success', title:'تم النسخ!', showConfirmButton:false, timer:1500}))" title="نسخ الرد"><i class="fas fa-copy"></i></button>`;
                }
                chatBox.insertBefore(div, indicator);
            });
        }

        function clearChat() {
            Swal.fire({
                title: 'هل أنت متأكد؟',
                text: "سيتم مسح سجل هذه المحادثة محلياً.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'نعم، امسح',
                cancelButtonText: 'إلغاء'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('ai_chat_history');
                    location.reload();
                }
            });
        }

        // الإرسال الفعلي للسيرفر
        async function sendMessage() {
            const inputEl = document.getElementById('chat-input');
            const text = inputEl.value.trim();
            const btn = document.getElementById('btn-send');
            const indicator = document.getElementById('typing-indicator');
            const chatBox = document.getElementById('chat-box');

            if (!text) return;

            // 1. إضافة رسالة المستخدم للواجهة
            inputEl.value = '';
            inputEl.style.height = '50px';
            btn.disabled = true;

            const userDiv = document.createElement('div');
            userDiv.className = 'chat-bubble user fade-in';
            userDiv.innerText = text;
            chatBox.insertBefore(userDiv, indicator);
            saveToHistory('user', text);
            scrollToBottom();

            // 2. إظهار مؤشر الكتابة
            indicator.style.display = 'block';
            scrollToBottom();

            try {
                // 3. الاتصال بمحرك Cloudflare AI عبر الدالة الموحدة
                const response = await API.askAI(text);

                // 4. إخفاء المؤشر وعرض النتيجة
                indicator.style.display = 'none';

                if (response && response.reply) {
                    const aiDiv = document.createElement('div');
                    aiDiv.className = 'chat-bubble ai fade-in shadow-sm';
                    aiDiv.innerHTML = formatAIText(response.reply);
                    // إضافة زر النسخ
                    aiDiv.innerHTML += `<button class="btn btn-sm btn-light border position-absolute bottom-0 start-0 m-2 py-0 px-2 text-muted shadow-sm" onclick="navigator.clipboard.writeText('${escapeHTML(response.reply).replace(/'/g, "\\'")}').then(() => Swal.fire({toast:true, position:'top-end', icon:'success', title:'تم النسخ!', showConfirmButton:false, timer:1500}))" title="نسخ الرد"><i class="fas fa-copy"></i></button>`;
                    
                    chatBox.insertBefore(aiDiv, indicator);
                    saveToHistory('ai', response.reply);
                } else {
                    throw new Error("لم يتم استلام رد صحيح من السيرفر");
                }
            } catch (error) {
                indicator.style.display = 'none';
                Swal.fire({
                    toast: true, position: 'top-end', icon: 'error',
                    title: 'فشل الاتصال بالذكاء الاصطناعي', showConfirmButton: false, timer: 3000
                });
            } finally {
                btn.disabled = false;
                scrollToBottom();
                inputEl.focus();
            }
        }

        // الإملاء الصوتي
        function startDictation() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                Swal.fire({toast:true, position:'top-end', icon:'warning', title:'متصفحك لا يدعم الإملاء الصوتي.', showConfirmButton:false, timer:3000});
                return;
            }
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'ar-JO';
            recognition.interimResults = false;

            const inputEl = document.getElementById('chat-input');
            const originalPlaceholder = inputEl.placeholder;
            inputEl.placeholder = "جاري الاستماع... تحدث الآن.";
            
            Swal.fire({toast:true, position:'top-end', icon:'info', title:'الميكروفون يعمل.. تحدث الآن', showConfirmButton:false, timer:2000});

            recognition.start();

            recognition.onresult = function(event) {
                inputEl.value += (inputEl.value ? ' ' : '') + event.results[0][0].transcript;
                autoResize(inputEl);
            };

            recognition.onerror = function() {
                Swal.fire({toast:true, position:'top-end', icon:'error', title:'تم إيقاف الميكروفون أو حدث خطأ.', showConfirmButton:false, timer:2000});
                inputEl.placeholder = originalPlaceholder;
            };

            recognition.onend = function() {
                inputEl.placeholder = originalPlaceholder;
            };
        }
    </script>
</body>
</html>
