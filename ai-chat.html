<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0B132B">
    <title>موكّل | المستشار القانوني الذكي</title>
    
    <link rel="icon" type="image/png" sizes="192x192" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg4PE-keniz_4Af49kFkt6o_JmNj4K1yDZpdoDpXtzZcw6Zylh6l3MKyG186d2NmFov_1xIZ8qhXY136PeE5OpQlWQgR45YFvKo9MdMlL6K0rE-IqIyiMINdIrAynb44a2V_177s_xcULbLfMWgLuXJP4-uQ8zx3V-Cl3HNwXucegTli7-sDlUnAIGS__M/s320/icon-512.png.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link href="./css/style.css" rel="stylesheet">
    
    <style>
        :root { 
            --primary-dark: #0B132B; 
            --primary-light: #1C2541;
            --gold-luxury: #D4AF37;
            --gold-hover: #b5952f;
            --light-bg: #F0F2F5; 
            --text-dark: #1A1A1A;
            --text-muted: #6C757D;
        }

        body { 
            background: var(--light-bg); 
            font-family: 'Cairo', sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; 
            margin: 0; 
            overflow: hidden; 
        }

        .top-nav { 
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-light) 100%);
            height: 70px; 
            flex-shrink: 0;
            z-index: 1040; 
            border-bottom: 3px solid var(--gold-luxury);
            box-shadow: 0 4px 15px rgba(11, 19, 43, 0.15);
        }

        .main-chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            background-image: url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%23d4af37" fill-opacity="0.05"%3E%3Cpath d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .chat-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
            word-wrap: break-word;
            animation: fadeInBubble 0.3s ease-out forwards;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        @keyframes fadeInBubble { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .chat-user {
            align-self: flex-start;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-ai {
            align-self: flex-end;
            background: white;
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
            border-right: 4px solid var(--gold-luxury);
        }

        .msg-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            font-size: 0.75rem;
            opacity: 0.8;
        }
        
        .chat-user .msg-footer { color: #E2E8F0; }
        .chat-ai .msg-footer { color: var(--text-muted); }

        .copy-btn {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            padding: 0;
            transition: 0.2s;
            font-size: 1rem;
        }
        .copy-btn:hover { color: var(--gold-luxury); transform: scale(1.1); }

        .input-wrapper {
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.05);
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 1030;
        }

        .input-area {
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            border: 1px solid #E2E8F0;
            border-radius: 20px;
            padding: 12px 18px;
            background: #F8FAFC;
            resize: none;
            max-height: 120px;
            min-height: 48px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: 0.3s;
        }
        .chat-input:focus { outline: none; border-color: var(--gold-luxury); background: white; }

        .btn-action {
            width: 48px; height: 48px;
            border-radius: 50%;
            border: none;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; transition: all 0.3s ease; flex-shrink: 0;
        }
        .btn-send { background: linear-gradient(135deg, var(--gold-luxury), var(--gold-hover)); color: var(--primary-dark); box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3); }
        .btn-mic { background: white; color: var(--primary-dark); border: 1px solid #E2E8F0; }

        .bottom-nav { 
            height: 70px;
            flex-shrink: 0;
            background: white; 
            border-top: 1px solid #E2E8F0;
            display: flex; justify-content: space-around; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { flex: 1; text-align: center; color: #94A3B8; font-size: 0.75rem; font-weight: 800; padding: 10px 0; cursor: pointer; }
        .nav-item.active { color: var(--primary-dark); border-top: 3px solid var(--gold-luxury); margin-top: -1px; }
        .nav-item i { font-size: 1.3rem; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="top-nav px-3 d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-sm text-white p-0 border-0 text-decoration-none" onclick="window.location.href='app.html'">
                <i class="fas fa-arrow-right fs-4"></i>
            </button>
            <div class="d-flex align-items-center gap-2">
                <div style="width: 40px; height: 40px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--gold-luxury);">
                    <i class="fas fa-balance-scale fs-5" style="color: var(--gold-luxury);"></i>
                </div>
                <div>
                    <h6 class="mb-0 fw-bold text-white">المستشار القانوني</h6>
                    <small style="color: rgba(255,255,255,0.7); font-size: 0.75rem;"><i class="fas fa-circle text-success me-1" style="font-size: 8px;"></i>متصل بالتشريعات الأردنية</small>
                </div>
            </div>
        </div>
        <button class="btn btn-sm border-0 text-white" onclick="AIChatEngine.clearChat()" title="مسح المحادثة" style="background: rgba(255,255,255,0.1); border-radius: 10px; padding: 6px 12px;">
            <i class="fas fa-broom"></i>
        </button>
    </div>

    <div class="main-chat-area">
        <div class="chat-container" id="chat-box">
            <div class="chat-bubble chat-ai">
                <div class="msg-content">
                    <h6 class="fw-bold mb-2 text-navy">أهلاً بك يا أستاذ!</h6>
                    أنا مساعدك القانوني الذكي.<br>اسألني أي سؤال قانوني، أو قم بتفعيل نمط <b>"تحليل الثغرات والدفوع"</b> لأقوم بتحليل الوقائع واستخراج الثغرات بدقة متناهية.
                </div>
                <div class="msg-footer">
                    <span class="msg-time">الآن</span>
                </div>
            </div>
        </div>

        <div class="input-wrapper">
            <div class="form-check form-switch m-0 px-2 d-flex align-items-center gap-2">
                <input class="form-check-input m-0" type="checkbox" id="deepAnalysisToggle" style="width: 2.2rem; height: 1.1rem; cursor: pointer;">
                <label class="form-check-label fw-bold text-navy mb-0" for="deepAnalysisToggle" style="font-size: 0.8rem; cursor: pointer;">
                    <i class="fas fa-shield-alt text-danger me-1"></i> تفعيل استخراج الثغرات والدفوع (RAG)
                </label>
            </div>
            
            <div class="input-area">
                <button class="btn-action btn-mic" id="btn-mic" onclick="AIChatEngine.startDictation()" title="إملاء صوتي">
                    <i class="fas fa-microphone"></i>
                </button>
                <textarea id="chat-input" class="chat-input" rows="1" placeholder="اكتب سؤالك أو وقائع القضية..."></textarea>
                <button class="btn-action btn-send" id="btn-send" onclick="AIChatEngine.sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='app.html'"><i class="fas fa-home"></i>المكتب</div>
        <div class="nav-item" onclick="window.location.href='app.html'"><i class="fas fa-gavel"></i>القضايا</div>
        <div class="nav-item" onclick="window.location.href='app.html'"><i class="fas fa-users"></i>الموكلين</div>
        <div class="nav-item active"><i class="fas fa-robot"></i>الذكاء</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/ai-chat.js"></script>
    
    <script>
        const fwSettings = JSON.parse(localStorage.getItem('firm_settings'));
        if (fwSettings) {
            if (fwSettings.primary_color) { document.documentElement.style.setProperty('--primary-dark', fwSettings.primary_color); document.documentElement.style.setProperty('--text-navy', fwSettings.primary_color); }
            if (fwSettings.accent_color) document.documentElement.style.setProperty('--gold-luxury', fwSettings.accent_color);
        }
    </script>
</body>
</html>
