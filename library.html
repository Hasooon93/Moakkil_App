<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موكّل | المكتبة والأرشيف الذكي</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* تنسيقات خاصة بالمكتبة الذكية */
        .library-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .upload-zone { border: 2px dashed #6f42c1; border-radius: 10px; padding: 40px; text-align: center; background: #f8f9fa; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .upload-zone:hover, .upload-zone.dragover { background: #e2d9f3; border-color: #59359a; }
        .upload-zone i { font-size: 3rem; color: #6f42c1; margin-bottom: 10px; }
        
        .filters { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .filter-btn { background: white; border: 1px solid #ddd; padding: 8px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .filter-btn.active, .filter-btn:hover { background: #6f42c1; color: white; border-color: #6f42c1; }
        
        .files-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .file-card { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; border-top: 4px solid #ddd; }
        .file-card.template { border-top-color: #ffc107; } /* النماذج لونها أصفر */
        .file-card.analyzed { border-top-color: #20c997; } /* المحللة ذكياً لونها أخضر */
        
        .file-icon { font-size: 2.5rem; color: #555; text-align: center; margin-bottom: 10px; }
        .file-icon.pdf { color: #dc3545; }
        .file-icon.word { color: #0d6efd; }
        .file-icon.image { color: #198754; }
        
        .file-name { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-meta { font-size: 0.85rem; color: #666; text-align: center; margin-bottom: 15px; }
        
        .ai-summary-badge { background: #e8f5e9; color: #198754; padding: 5px; border-radius: 5px; font-size: 0.8rem; margin-bottom: 10px; display: block; border: 1px solid #c8e6c9;}
        
        .card-actions { display: flex; justify-content: space-between; gap: 5px; }
        .btn-action { flex: 1; padding: 8px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .btn-view { background: #0d6efd; color: white; }
        .btn-ai { background: #6f42c1; color: white; }
        .btn-delete { background: transparent; color: #dc3545; border: 1px solid #dc3545; flex: 0.3; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-top: 10px; background: #fff3cd; padding: 10px; border-radius: 5px; border: 1px solid #ffe69c;}
    </style>
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <header class="library-header">
                <h1><i class="fas fa-folder-open"></i> الأرشيف والمكتبة الذكية</h1>
                <button class="btn-action btn-view" style="width: auto; padding: 10px 20px;" onclick="document.getElementById('uploadInput').click()">
                    <i class="fas fa-upload"></i> رفع ملف جديد
                </button>
            </header>

            <div class="upload-zone" id="dropZone">
                <i class="fas fa-cloud-upload-alt"></i>
                <h3>اسحب وأفلت الملفات هنا</h3>
                <p>أو اضغط لاختيار ملف من جهازك</p>
                <input type="file" id="uploadInput" style="display: none;">
            </div>

            <div class="filters" id="fileFilters">
                <button class="filter-btn active" data-filter="all">الكل</button>
                <button class="filter-btn" data-filter="template">مكتبة النماذج ⭐️</button>
                <button class="filter-btn" data-filter="analyzed">تم تحليلها بالذكاء الاصطناعي 🧠</button>
                <button class="filter-btn" data-filter="case">ملفات القضايا</button>
                <button class="filter-btn" data-filter="client">هويات الموكلين</button>
            </div>

            <div class="files-grid" id="filesGrid">
                <div style="text-align: center; width: 100%; grid-column: 1 / -1;">
                    <i class="fas fa-spinner fa-spin fa-2x"></i> جاري تحميل المكتبة...
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="fileDetailsModal">
        <div class="modal-content">
            <h3><i class="fas fa-tags"></i> تصنيف الملف</h3>
            <p style="color: gray; font-size: 0.9rem; margin-bottom: 15px;">يرجى تصنيف الملف لربطه بقاعدة البيانات الصحيحة.</p>
            
            <form id="fileDetailsForm">
                <div class="form-group">
                    <label>اسم الملف</label>
                    <input type="text" id="meta_file_name" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>تصنيف الملف</label>
                    <select id="meta_file_category" class="form-control" required>
                        <option value="مستند قضية">مستند قضية (لائحة، قرار، إلخ)</option>
                        <option value="هوية موكل">مستندات موكل (هوية، وكالة)</option>
                        <option value="ملف إداري">ملف إداري (عقد موظف، مصاريف)</option>
                        <option value="أخرى">أخرى</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>ربط بقضية (اختياري)</label>
                    <select id="meta_case_id" class="form-control">
                        <option value="">-- بدون ربط --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>ربط بموكل (اختياري)</label>
                    <select id="meta_client_id" class="form-control">
                        <option value="">-- بدون ربط --</option>
                    </select>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="meta_is_template" style="width: 20px; height: 20px;">
                    <label for="meta_is_template" style="margin: 0; color: #856404;">تحديد كـ "نموذج قانوني" ليراه جميع المحامين لاستخدامه لاحقاً</label>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn-action btn-view" style="flex: 2;"><i class="fas fa-cloud-upload-alt"></i> اعتماد ورفع للدرايف</button>
                    <button type="button" class="btn-action" style="background: #ccc;" onclick="closeModal()">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/library.js"></script>
</body>
</html>
