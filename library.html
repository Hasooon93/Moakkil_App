<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a192f">
    <title>المكتبة القانونية | موكّل</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <link href="./css/style.css" rel="stylesheet">
    
    <style>
        .nav-pills .nav-link { border-radius: 10px; color: var(--navy); font-weight: 700; border: 1px solid #e2e8f0; margin-left: 5px; transition: 0.3s; background: white;}
        .nav-pills .nav-link.active { background-color: var(--navy); color: white; border-color: var(--navy); }
        .template-card { border-right: 4px solid var(--accent); transition: 0.3s; border-radius: 12px; background: white; padding: 15px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .template-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        
        /* تصميم الشريط السفلي الموحد */
        .bottom-nav { background: #ffffff; box-shadow: 0 -4px 20px rgba(0,0,0,0.05); border-radius: 25px 25px 0 0; padding: 10px 5px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); position: fixed; bottom: 0; width: 100%; z-index: 1030; }
        .nav-item { flex: 1; text-align: center; color: #64748b; font-size: 0.75rem; font-weight: 700; transition: all 0.3s ease; border-radius: 15px; padding: 8px 0; cursor: pointer; }
        .nav-item.active { color: var(--navy); background-color: #f1f5f9; transform: translateY(-3px); }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 4px; transition: transform 0.3s; }
        .nav-item.active i { color: var(--accent); transform: scale(1.1); }
    </style>

    <script>
        const fwSettings = JSON.parse(localStorage.getItem('firm_settings'));
        if (fwSettings) {
            if (fwSettings.primary_color) document.documentElement.style.setProperty('--navy', fwSettings.primary_color);
            if (fwSettings.accent_color) document.documentElement.style.setProperty('--accent', fwSettings.accent_color);
        }
    </script>
</head>
<body class="pb-5 mb-5 bg-light">

    <div class="top-nav px-3 d-flex align-items-center justify-content-between shadow-sm sticky-top mb-3" style="background: var(--navy); height: 65px;">
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-sm btn-light border-0 rounded-circle text-navy shadow-sm" onclick="window.location.href='app'" style="width: 35px; height: 35px;">
                <i class="fas fa-arrow-right"></i>
            </button>
            <h6 class="mb-0 fw-bold text-white"><i class="fas fa-book me-2 text-accent"></i> المكتبة والنماذج</h6>
        </div>
        <button id="btn-add-template" class="btn btn-sm fw-bold shadow-sm" style="background-color: var(--accent, #64ffda); color: var(--navy, #0a192f); border: none;" onclick="openModal('uploadModal')">
            <i class="fas fa-plus"></i> نموذج
        </button>
    </div>

    <div class="container mt-3">
        <div class="alert alert-info border-info bg-white text-center shadow-sm fw-bold small">
            <i class="fas fa-info-circle me-1"></i> هذه المكتبة مشتركة وتظهر لجميع المحامين والموظفين في المكتب للوصول السريع للنماذج والتشريعات.
        </div>

        <ul class="nav nav-pills mb-4 justify-content-center flex-nowrap overflow-auto pb-2" id="pills-tab" role="tablist" style="white-space: nowrap;">
            <li class="nav-item-tab">
                <button class="nav-link active px-4 shadow-sm" data-bs-toggle="pill" data-bs-target="#tab-contracts" onclick="filterTemplates('عقود')">عقود</button>
            </li>
            <li class="nav-item-tab">
                <button class="nav-link px-4 shadow-sm" data-bs-toggle="pill" data-bs-target="#tab-poa" onclick="filterTemplates('وكالات')">وكالات</button>
            </li>
            <li class="nav-item-tab">
                <button class="nav-link px-4 shadow-sm" data-bs-toggle="pill" data-bs-target="#tab-lawsuits" onclick="filterTemplates('لوائح')">لوائح</button>
            </li>
            <li class="nav-item-tab">
                <button class="nav-link px-4 shadow-sm" data-bs-toggle="pill" data-bs-target="#tab-laws" onclick="filterTemplates('قوانين')">تشريعات</button>
            </li>
        </ul>

        <div class="mb-3 position-relative">
            <input type="text" class="form-control form-control-lg border-0 shadow-sm" id="search-input" placeholder="ابحث عن نموذج، وكالة، أو قانون..." onkeyup="searchTemplates()" style="border-radius: 15px;">
            <i class="fas fa-search text-muted position-absolute" style="top: 50%; right: 15px; transform: translateY(-50%);"></i>
        </div>

        <div class="row g-3" id="templates-container">
            <div class="col-12 text-center p-5 text-muted">
                <i class="fas fa-spinner fa-spin fa-2x mb-3"></i>
                <br>جاري جلب المكتبة...
            </div>
        </div>
    </div>

    <div class="modal fade" id="uploadModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-navy text-white border-0" style="border-radius: 15px 15px 0 0;">
                    <h5 class="modal-title fw-bold"><i class="fas fa-cloud-upload-alt me-2 text-accent"></i> إضافة نموذج للمكتبة</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 bg-light">
                    <form id="uploadForm" onsubmit="uploadTemplate(event)">
                        <div class="mb-3 text-start">
                            <label class="form-label small fw-bold text-muted">اسم النموذج / التشريع <span class="text-danger">*</span></label>
                            <input type="text" id="tpl_title" class="form-control border-0 shadow-sm" required placeholder="مثال: عقد إيجار تجاري...">
                        </div>
                        <div class="mb-3 text-start">
                            <label class="form-label small fw-bold text-muted">التصنيف <span class="text-danger">*</span></label>
                            <select id="tpl_category" class="form-select border-0 shadow-sm" required>
                                <option value="عقود">عقود جاهزة</option>
                                <option value="وكالات">نماذج وكالات</option>
                                <option value="لوائح">لوائح ومذكرات</option>
                                <option value="قوانين">نصوص قانونية / تشريعات</option>
                            </select>
                        </div>
                        <div class="mb-4 text-start">
                            <label class="form-label small fw-bold text-muted">الملف (PDF أو Word) <span class="text-danger">*</span></label>
                            <input type="file" id="tpl_file" class="form-control border-0 shadow-sm bg-white" accept=".pdf,.doc,.docx" required>
                        </div>
                        <button type="submit" id="btn_upload_tpl" class="btn btn-warning w-100 fw-bold py-3 text-dark shadow-sm" style="border-radius: 12px;">
                            <i class="fas fa-save me-1"></i> رفع وأرشفة النموذج
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav d-flex justify-content-around">
        <div class="nav-item" onclick="window.location.href='app.html'">
            <i class="fas fa-home"></i> الرئيسية
        </div>
        <div class="nav-item" onclick="window.location.href='app.html'">
            <i class="fas fa-gavel"></i> القضايا
        </div>
        <div class="nav-item" onclick="window.location.href='app.html'">
            <i class="fas fa-users"></i> الموكلين
        </div>
        <div class="nav-item" onclick="window.location.href='app.html'">
            <i class="fas fa-calendar-check"></i> الأجندة
        </div>
        <div class="nav-item active" onclick="window.location.href='app.html'">
            <i class="fas fa-toolbox"></i> الأدوات
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/library.js"></script>
</body>
</html>
