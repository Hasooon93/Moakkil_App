<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المكتبة القانونية | موكّل</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
    
    <style>
        .nav-pills .nav-link { border-radius: 10px; color: var(--navy); font-weight: 700; border: 1px solid #e2e8f0; margin-left: 5px; transition: 0.3s; background: white;}
        .nav-pills .nav-link.active { background-color: var(--navy); color: white; border-color: var(--navy); }
        .template-card { border-right: 4px solid var(--accent); transition: 0.3s; }
        .template-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
        .btn-outline-navy { color: var(--navy); border-color: var(--navy); }
        .btn-outline-navy:hover { background-color: var(--navy); color: white; }

        /* تصميم الشريط السفلي الموحد */
        .bottom-nav { background: #ffffff; box-shadow: 0 -4px 20px rgba(0,0,0,0.05); border-radius: 25px 25px 0 0; padding: 10px 5px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); position: fixed; bottom: 0; width: 100%; z-index: 1030; }
        .nav-item { flex: 1; text-align: center; color: #64748b; font-size: 0.75rem; font-weight: 700; transition: all 0.3s ease; border-radius: 15px; padding: 8px 0; cursor: pointer; }
        .nav-item.active { color: var(--navy); background-color: #f1f5f9; transform: translateY(-3px); }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 4px; transition: transform 0.3s; }
        .nav-item.active i { color: var(--accent); transform: scale(1.1); }
    </style>
</head>
<body style="background: var(--bg-light); padding-bottom: 80px;">

    <div class="top-nav d-flex align-items-center px-3 shadow-sm position-relative" style="height: 65px; background: var(--navy);">
        <button class="btn btn-link text-white text-decoration-none p-0 position-absolute start-0 ms-3" onclick="window.location.href='app.html'">
            <i class="fas fa-arrow-right fs-4"></i>
        </button>
        <h6 class="text-white mb-0 fw-bold mx-auto"><i class="fas fa-book-open text-accent me-2"></i> المكتبة القانونية</h6>
        <button class="btn btn-sm btn-warning text-dark fw-bold position-absolute end-0 me-3" onclick="openModal('uploadTemplateModal')" id="btn-add-template" title="رفع نموذج جديد">
            <i class="fas fa-plus"></i> رفع ملف
        </button>
    </div>

    <div class="container mt-4 mb-5 pb-4">
        <ul class="nav nav-pills mb-4 flex-nowrap overflow-auto pb-2" style="white-space: nowrap;" id="library-tabs" role="tablist">
            <li class="nav-item-tab"><button class="nav-link active shadow-sm px-4" data-bs-toggle="pill" data-bs-target="#cat-contracts">عقود</button></li>
            <li class="nav-item-tab"><button class="nav-link shadow-sm px-4" data-bs-toggle="pill" data-bs-target="#cat-poa">وكالات</button></li>
            <li class="nav-item-tab"><button class="nav-link shadow-sm px-4" data-bs-toggle="pill" data-bs-target="#cat-pleadings">لوائح</button></li>
            <li class="nav-item-tab"><button class="nav-link shadow-sm px-4" data-bs-toggle="pill" data-bs-target="#cat-laws">قوانين</button></li>
        </ul>

        <div class="tab-content" id="library-content">
            <div class="tab-pane fade show active" id="cat-contracts"><div class="row g-3" id="list-contracts"></div></div>
            <div class="tab-pane fade" id="cat-poa"><div class="row g-3" id="list-poa"></div></div>
            <div class="tab-pane fade" id="cat-pleadings"><div class="row g-3" id="list-pleadings"></div></div>
            <div class="tab-pane fade" id="cat-laws"><div class="row g-3" id="list-laws"></div></div>
        </div>
    </div>

    <div class="bottom-nav d-flex justify-content-around">
        <div class="nav-item" onclick="window.location.href='app.html'">
            <i class="fas fa-home"></i> الرئيسية
        </div>
        <div class="nav-item" onclick="window.location.href='app.html'">
            <i class="fas fa-gavel"></i> القضايا
        </div>
        <div class="nav-item" onclick="window.location.href='app.html'">
            <i class="fas fa-users"></i> الموكلين
        </div>
        <div class="nav-item" onclick="window.location.href='app.html'">
            <i class="fas fa-calendar-check"></i> الأجندة
        </div>
        <div class="nav-item active" onclick="window.location.href='app.html'">
            <i class="fas fa-toolbox"></i> الأدوات
        </div>
    </div>

    <div class="modal fade" id="uploadTemplateModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0" style="border-radius: 20px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-navy">إضافة نموذج للمكتبة</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center p-4">
                    <form id="templateForm" onsubmit="saveTemplate(event)">
                        <input type="text" id="tpl_title" class="form-control border-0 shadow-sm mb-3" placeholder="اسم النموذج (مثال: عقد إيجار شقة) *" required>
                        <select id="tpl_category" class="form-select border-0 shadow-sm mb-3" required>
                            <option value="عقود">عقود جاهزة</option>
                            <option value="وكالات">نماذج وكالات</option>
                            <option value="لوائح">لوائح ومذكرات</option>
                            <option value="قوانين">نصوص قانونية / تشريعات</option>
                        </select>
                        <input type="file" id="tpl_file" class="form-control border-0 shadow-sm bg-white mb-4" accept=".pdf,.doc,.docx" required>
                        <button type="submit" id="btn_upload_tpl" class="btn btn-warning w-100 fw-bold py-2 text-dark shadow" style="border-radius: 10px;">
                            <i class="fas fa-cloud-upload-alt me-1"></i> رفع وأرشفة النموذج
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="alertBox" class="alert-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/library.js"></script>
</body>
</html>
