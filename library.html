<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المكتبة القانونية | موكّل</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
    
    <style>
        .nav-pills .nav-link { border-radius: 10px; color: var(--navy); font-weight: 700; border: 1px solid #e2e8f0; margin-left: 5px; transition: 0.3s; background: white;}
        .nav-pills .nav-link.active { background-color: var(--navy); color: white; border-color: var(--navy); }
        .template-card { border-right: 4px solid var(--accent); transition: 0.3s; }
        .template-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
        .btn-outline-navy { color: var(--navy); border-color: var(--navy); }
        .btn-outline-navy:hover { background-color: var(--navy); color: white; }
    </style>
</head>
<body style="background: var(--bg-light); padding-bottom: 80px;">

    <div class="top-nav d-flex align-items-center px-3 shadow-sm position-relative" style="height: 65px; background: var(--navy);">
        <h5 class="text-white mb-0 fw-bold mx-auto"><i class="fas fa-book-open text-accent me-2"></i> المكتبة القانونية</h5>
        <button class="btn btn-sm btn-accent fw-bold text-navy position-absolute end-0 me-3" onclick="openModal('uploadTemplateModal')" id="btn-add-template" style="display:none;" title="إضافة نموذج"><i class="fas fa-plus"></i> إضافة</button>
    </div>

    <div class="container mt-4">
        <ul class="nav nav-pills mb-4 flex-nowrap overflow-auto pb-2" style="white-space: nowrap;" id="library-tabs" role="tablist">
            <li class="nav-item"><button class="nav-link active shadow-sm px-4" data-bs-toggle="pill" data-bs-target="#cat-contracts">عقود</button></li>
            <li class="nav-item"><button class="nav-link shadow-sm px-4" data-bs-toggle="pill" data-bs-target="#cat-poa">وكالات</button></li>
            <li class="nav-item"><button class="nav-link shadow-sm px-4" data-bs-toggle="pill" data-bs-target="#cat-pleadings">لوائح</button></li>
            <li class="nav-item"><button class="nav-link shadow-sm px-4" data-bs-toggle="pill" data-bs-target="#cat-laws">قوانين</button></li>
        </ul>

        <div class="tab-content" id="library-content">
            <div class="tab-pane fade show active" id="cat-contracts"><div class="row g-3" id="list-contracts"></div></div>
            <div class="tab-pane fade" id="cat-poa"><div class="row g-3" id="list-poa"></div></div>
            <div class="tab-pane fade" id="cat-pleadings"><div class="row g-3" id="list-pleadings"></div></div>
            <div class="tab-pane fade" id="cat-laws"><div class="row g-3" id="list-laws"></div></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='app.html'"><i class="fas fa-home"></i><span>الرئيسية</span></div>
        <div class="nav-item active"><i class="fas fa-book"></i><span>المكتبة</span></div>
    </div>

    <div class="modal fade" id="uploadTemplateModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0" style="border-radius: 20px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-navy">إضافة نموذج للمكتبة</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <form id="templateForm" onsubmit="saveTemplate(event)">
                        <input type="text" id="tpl_title" class="form-control mb-2" placeholder="اسم النموذج (مثال: عقد إيجار شقة) *" required>
                        <select id="tpl_category" class="form-select mb-2" required>
                            <option value="عقود">عقود جاهزة</option>
                            <option value="وكالات">نماذج وكالات</option>
                            <option value="لوائح">لوائح ومذكرات</option>
                            <option value="قوانين">نصوص قانونية / تشريعات</option>
                        </select>
                        <input type="file" id="tpl_file" class="form-control mb-3" accept=".pdf,.doc,.docx" required>
                        <button type="submit" id="btn_upload_tpl" class="btn btn-warning w-100 fw-bold py-2 text-dark" style="border-radius: 10px;">
                            <i class="fas fa-cloud-upload-alt me-1"></i> رفع وأرشفة النموذج
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="alertBox" class="alert-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/library.js"></script>
</body>
</html>
