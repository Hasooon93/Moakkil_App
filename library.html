<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a192f">
    <title>المكتبة القانونية والنماذج | موكّل</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <link href="./css/style.css" rel="stylesheet">
    
    <style>
        .library-header {
            background: linear-gradient(135deg, var(--navy, #0a192f) 0%, #1e3a8a 100%);
            color: white;
            padding: 20px;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .library-header::after {
            content: '\f02d'; /* أيقونة الكتاب */
            font-family: 'Font Awesome 5 Free';
            font-weight: 900;
            position: absolute;
            left: -10px;
            bottom: -20px;
            font-size: 120px;
            opacity: 0.05;
        }
        .nav-pills .nav-link { 
            border-radius: 12px; 
            color: var(--navy); 
            font-weight: 700; 
            border: 1px solid #e2e8f0; 
            margin-left: 8px; 
            transition: all 0.3s ease; 
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .nav-pills .nav-link.active { 
            background-color: var(--navy); 
            color: white; 
            border-color: var(--navy); 
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .template-card { 
            border-right: 4px solid var(--accent); 
            transition: all 0.3s ease; 
            border-radius: 12px; 
            background: white; 
            padding: 20px; 
            position: relative; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            height: 100%;
        }
        .template-card:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.08); 
        }
        
        .bottom-nav { background: #ffffff; box-shadow: 0 -4px 20px rgba(0,0,0,0.05); border-radius: 25px 25px 0 0; padding: 10px 5px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); position: fixed; bottom: 0; width: 100%; z-index: 1030; }
        .nav-item { flex: 1; text-align: center; color: #64748b; font-size: 0.75rem; font-weight: 700; transition: all 0.3s ease; border-radius: 15px; padding: 8px 0; cursor: pointer; }
        .nav-item.active { color: var(--navy); background-color: #f1f5f9; transform: translateY(-3px); }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 4px; transition: transform 0.3s; }
        .nav-item.active i { color: var(--accent); transform: scale(1.1); }
    </style>
</head>
<body class="pb-5 mb-5 bg-light">

    <div class="library-header">
        <div class="d-flex justify-content-between align-items-center position-relative z-1">
            <div class="d-flex align-items-center">
                <button class="btn btn-link text-white p-0 text-decoration-none me-3" onclick="window.location.href='app.html'"><i class="fas fa-arrow-right fs-4"></i></button>
                <h5 class="mb-0 fw-bold"><i class="fas fa-book text-accent me-2"></i> المكتبة والنماذج</h5>
            </div>
            <button id="btn-add-template" class="btn btn-sm fw-bold shadow-sm" style="background-color: var(--accent, #64ffda); color: var(--navy, #0a192f); border: none;" onclick="openModal('uploadModal')">
                <i class="fas fa-plus"></i> إضافة نموذج
            </button>
        </div>
        <p class="mt-2 mb-0 opacity-75 small position-relative z-1">أرشيف المكتب للتشريعات، العقود، واللوائح الجاهزة.</p>
    </div>

    <div class="container">
        <div class="alert alert-info border-0 bg-white text-navy shadow-sm fw-bold small rounded-3 d-flex align-items-center">
            <i class="fas fa-info-circle fa-2x text-primary me-3"></i>
            <span>هذه المكتبة مشتركة. أي نموذج يتم رفعه هنا سيكون متاحاً لجميع المحامين في المكتب لتسهيل وسرعة العمل.</span>
        </div>

        <ul class="nav nav-pills mb-4 justify-content-start flex-nowrap overflow-auto pb-2" id="pills-tab" role="tablist" style="white-space: nowrap;">
            <li class="nav-item-tab">
                <button class="nav-link active px-4" data-bs-toggle="pill" data-bs-target="#tab-contracts" onclick="filterTemplates('عقود')">عقود</button>
            </li>
            <li class="nav-item-tab">
                <button class="nav-link px-4" data-bs-toggle="pill" data-bs-target="#tab-poa" onclick="filterTemplates('وكالات')">وكالات</button>
            </li>
            <li class="nav-item-tab">
                <button class="nav-link px-4" data-bs-toggle="pill" data-bs-target="#tab-lawsuits" onclick="filterTemplates('لوائح')">لوائح ومذكرات</button>
            </li>
            <li class="nav-item-tab">
                <button class="nav-link px-4" data-bs-toggle="pill" data-bs-target="#tab-laws" onclick="filterTemplates('قوانين')">تشريعات</button>
            </li>
            <li class="nav-item-tab">
                <button class="nav-link px-4" data-bs-toggle="pill" data-bs-target="#tab-other" onclick="filterTemplates('أخرى')">أخرى</button>
            </li>
        </ul>

        <div class="mb-4 position-relative">
            <input type="text" class="form-control form-control-lg border-0 shadow-sm" id="search-input" placeholder="ابحث عن نموذج، وكالة، أو قانون بالاسم..." onkeyup="searchTemplates()" style="border-radius: 12px; padding-right: 45px;">
            <i class="fas fa-search text-muted position-absolute" style="top: 50%; right: 15px; transform: translateY(-50%);"></i>
        </div>

        <div class="row g-3" id="templates-container">
            <div class="col-12 text-center p-5 text-muted">
                <i class="fas fa-spinner fa-spin fa-2x mb-3"></i>
                <br>جاري جلب المكتبة...
            </div>
        </div>
    </div>

    <div class="modal fade" id="uploadModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-navy text-white border-0" style="border-radius: 15px 15px 0 0;">
                    <h5 class="modal-title fw-bold"><i class="fas fa-cloud-upload-alt me-2 text-accent"></i> أرشفة نموذج جديد</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 bg-light">
                    <form id="uploadForm" onsubmit="uploadTemplate(event)">
                        <div class="mb-3 text-start">
                            <label class="form-label small fw-bold text-muted">اسم النموذج / التشريع <span class="text-danger">*</span></label>
                            <input type="text" id="tpl_title" class="form-control border-0 shadow-sm" required placeholder="مثال: عقد إيجار تجاري، وكالة خاصة...">
                        </div>
                        <div class="mb-3 text-start">
                            <label class="form-label small fw-bold text-muted">التصنيف <span class="text-danger">*</span></label>
                            <select id="tpl_category" class="form-select border-0 shadow-sm" required>
                                <option value="عقود">عقود جاهزة</option>
                                <option value="وكالات">نماذج وكالات</option>
                                <option value="لوائح">لوائح ومذكرات</option>
                                <option value="قوانين">نصوص قانونية / تشريعات</option>
                                <option value="أخرى">أخرى</option>
                            </select>
                        </div>
                        <div class="mb-4 text-start">
                            <label class="form-label small fw-bold text-muted">الملف المرفق (PDF, Word, صور) <span class="text-danger">*</span></label>
                            <input type="file" id="tpl_file" class="form-control border-0 shadow-sm bg-white" required>
                        </div>
                        <button type="submit" id="btn_upload_tpl" class="btn btn-warning w-100 fw-bold py-3 text-dark shadow-sm" style="border-radius: 12px;">
                            <i class="fas fa-save me-1"></i> رفع وحفظ في المكتبة
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav d-flex justify-content-around">
        <div class="nav-item" onclick="window.location.href='app.html'">
            <i class="fas fa-home"></i> الرئيسية
        </div>
        <div class="nav-item" onclick="window.location.href='app.html'">
            <i class="fas fa-gavel"></i> القضايا
        </div>
        <div class="nav-item" onclick="window.location.href='app.html'">
            <i class="fas fa-users"></i> الموكلين
        </div>
        <div class="nav-item" onclick="window.location.href='app.html'">
            <i class="fas fa-calendar-check"></i> الأجندة
        </div>
        <div class="nav-item active">
            <i class="fas fa-toolbox"></i> الأدوات
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/library.js"></script>
</body>
</html>
