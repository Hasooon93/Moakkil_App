<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موكّل | الموارد البشرية والرواتب</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* تنسيقات خاصة بقسم الموارد البشرية */
        .hr-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        .staff-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; border-right: 5px solid #ccc; transition: 0.3s;}
        .staff-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .staff-card.role-admin { border-right-color: #dc3545; }
        .staff-card.role-lawyer { border-right-color: #0d6efd; }
        .staff-card.role-secretary { border-right-color: #20c997; }
        
        .staff-avatar { width: 60px; height: 60px; border-radius: 50%; background: #f8f9fa; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; color: #6f42c1; margin-bottom: 15px; border: 2px solid #e9ecef;}
        .staff-name { font-size: 1.25rem; font-weight: bold; color: #333; margin-bottom: 5px; }
        .staff-role-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; background: #e9ecef; color: #495057; margin-bottom: 15px; }
        .staff-info { font-size: 0.9rem; color: #666; margin-bottom: 8px; }
        .staff-info i { width: 20px; color: #6f42c1; }
        
        .card-actions { display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .btn-action { flex: 1; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 5px; }
        .btn-edit { background: #e2d9f3; color: #6f42c1; }
        .btn-edit:hover { background: #6f42c1; color: white; }
        .btn-toggle { background: #f8d7da; color: #dc3545; }
        .btn-toggle.active { background: #d1e7dd; color: #198754; }

        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 0; border-radius: 12px; width: 95%; max-width: 800px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; }
        .modal-header { padding: 20px; background: #6f42c1; color: white; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; background: #f8f9fa; }
        .modal-footer { padding: 20px; background: white; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        
        /* Section styling inside modal */
        .form-section { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); border: 1px solid #eee;}
        .form-section-title { font-size: 1.1rem; color: #6f42c1; margin-bottom: 15px; border-bottom: 2px solid #e2d9f3; padding-bottom: 5px; font-weight: bold; display: flex; align-items: center; gap: 10px;}
        
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 200px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; font-size: 0.9rem;}
        .form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; transition: 0.3s;}
        .form-control:focus { border-color: #6f42c1; outline: none; box-shadow: 0 0 5px rgba(111, 66, 193, 0.3); }
        
        .salary-box { background: #d1e7dd; border: 1px solid #badbcc; padding: 15px; border-radius: 8px; margin-top: 10px; }
        .checkbox-wrapper { display: flex; align-items: center; gap: 10px; background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; }
        .checkbox-wrapper input { width: 18px; height: 18px; }
    </style>
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <header class="hr-header">
                <div>
                    <h1 style="margin:0;"><i class="fas fa-users-cog"></i> الموارد البشرية (HR)</h1>
                    <p style="color: gray; margin-top: 5px;">إدارة الموظفين، الرواتب، والصلاحيات</p>
                </div>
                <button class="btn-action" style="background:#6f42c1; color:white; width: auto; padding: 10px 20px;" onclick="openStaffModal()">
                    <i class="fas fa-user-plus"></i> إضافة موظف جديد
                </button>
            </header>

            <div class="staff-grid" id="staffGrid">
                <div style="text-align: center; grid-column: 1 / -1; padding: 50px;">
                    <i class="fas fa-spinner fa-spin fa-2x" style="color: #6f42c1;"></i> جاري تحميل بيانات الموظفين...
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="staffModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle" style="margin: 0;"><i class="fas fa-user-tie"></i> إضافة موظف جديد</h3>
                <i class="fas fa-times" style="cursor: pointer; font-size: 1.2rem;" onclick="closeStaffModal()"></i>
            </div>
            
            <div class="modal-body">
                <form id="staffForm">
                    <input type="hidden" id="user_id">

                    <div class="form-section">
                        <div class="form-section-title"><i class="fas fa-id-card"></i> البيانات الأساسية ودخول النظام</div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>الاسم الرباعي <span style="color:red;">*</span></label>
                                <input type="text" id="full_name" class="form-control" required placeholder="مثال: أحمد محمود علي">
                            </div>
                            <div class="form-group">
                                <label>رقم الهاتف (للدخول OTP) <span style="color:red;">*</span></label>
                                <input type="text" id="phone" class="form-control" required placeholder="مثال: 0791234567">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>المنصب / الدور الوظيفي <span style="color:red;">*</span></label>
                                <select id="role" class="form-control" required>
                                    <option value="lawyer">محامي</option>
                                    <option value="secretary">سكرتاريا / إداري</option>
                                    <option value="admin">مدير نظام</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>معرف تيليغرام (Telegram ID)</label>
                                <input type="text" id="telegram_id" class="form-control" placeholder="لإرسال الإشعارات والتذكيرات">
                            </div>
                        </div>
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="can_login" checked>
                            <label for="can_login" style="margin:0; font-weight:normal;">السماح لهذا الموظف بتسجيل الدخول للنظام (يستهلك من كوتا الباقة)</label>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-section-title"><i class="fas fa-briefcase"></i> الملف المهني والنقابي</div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>التخصص القانوني</label>
                                <select id="specialization" class="form-control">
                                    <option value="">-- غير محدد --</option>
                                    <option value="تجاري وشركات">تجاري وشركات</option>
                                    <option value="جنائي">جنائي</option>
                                    <option value="عمالي">عمالي</option>
                                    <option value="شرعي وأسرة">شرعي وأسرة</option>
                                    <option value="إداري عام">شؤون إدارية</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>سنوات الخبرة</label>
                                <input type="number" id="experience_years" class="form-control" min="0" placeholder="مثال: 5">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>رقم النقابة (للمحامين)</label>
                                <input type="text" id="syndicate_number" class="form-control" placeholder="رقم المزاولة">
                            </div>
                            <div class="form-group">
                                <label>تاريخ الانضمام للمكتب (Join Date)</label>
                                <input type="date" id="join_date" class="form-control">
                            </div>
                        </div>
                    </div>

                    <div class="form-section salary-box">
                        <div class="form-section-title" style="color: #0f5132; border-color: #badbcc;"><i class="fas fa-money-bill-wave"></i> تفاصيل الراتب (Salary Details)</div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>الراتب الأساسي (دينار)</label>
                                <input type="number" id="salary_basic" class="form-control" min="0" step="0.01" placeholder="0.00">
                            </div>
                            <div class="form-group">
                                <label>بدل تنقلات / اتصالات</label>
                                <input type="number" id="salary_allowance" class="form-control" min="0" step="0.01" placeholder="0.00">
                            </div>
                            <div class="form-group">
                                <label>النسبة من القضايا (إن وجدت %)</label>
                                <input type="number" id="salary_commission" class="form-control" min="0" max="100" placeholder="مثال: 10">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-section-title"><i class="fas fa-ambulance"></i> جهة الاتصال في حالات الطوارئ</div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>اسم شخص الطوارئ</label>
                                <input type="text" id="emergency_name" class="form-control" placeholder="اسم قريب أو صديق">
                            </div>
                            <div class="form-group">
                                <label>رقم هاتف الطوارئ</label>
                                <input type="text" id="emergency_phone" class="form-control" placeholder="رقم الهاتف">
                            </div>
                            <div class="form-group">
                                <label>صلة القرابة</label>
                                <input type="text" id="emergency_relation" class="form-control" placeholder="مثال: أخ، أب، زوجة">
                            </div>
                        </div>
                    </div>

                </form>
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn-action" style="background:#198754; color:white; font-weight:bold; padding: 12px 20px;" onclick="saveStaff()">
                    <i class="fas fa-save"></i> حفظ بيانات الموظف
                </button>
                <button type="button" class="btn-action" style="background:#e9ecef; color:#333; padding: 12px 20px;" onclick="closeStaffModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/staff.js"></script>
</body>
</html>
