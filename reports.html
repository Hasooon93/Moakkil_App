<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a192f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="موكّل">
    <title>موكّل | التقارير والإحصائيات</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        :root { --navy: #0a192f; --accent: #64ffda; --success: #4caf50; --danger: #f44336; --warning: #ff9800; --shadow: 0 4px 15px rgba(0,0,0,0.08); }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f5f7fa; padding-bottom: 40px; min-height: 100dvh; }
        
        .top-nav { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: linear-gradient(135deg, var(--navy) 0%, #1a3a5a 100%); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; box-shadow: var(--shadow); }
        .top-nav-left { display: flex; align-items: center; gap: 15px; }
        .back-btn { background: rgba(255,255,255,0.1); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; text-decoration: none; }
        .top-nav h5 { margin: 0; font-size: 1.2rem; font-weight: 700; }
        .export-btn { background: var(--accent); color: var(--navy); border: none; padding: 8px 16px; border-radius: 20px; font-weight: 700; font-size: 0.9rem; cursor: pointer; }
        
        .main-content { margin-top: 80px; padding: 0 15px; max-width: 1200px; margin-left: auto; margin-right: auto; }
        
        .filters-container { background: white; padding: 15px; border-radius: 15px; box-shadow: var(--shadow); margin-bottom: 20px; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; }
        .filter-btn { background: #f8f9fa; border: 1px solid #e9ecef; color: #555; padding: 8px 20px; border-radius: 30px; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.3s; }
        .filter-btn.active { background: var(--navy); color: white; border-color: var(--navy); }
        
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        @media (max-width: 768px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
        .stat-card { background: white; border-radius: 15px; padding: 20px 15px; box-shadow: var(--shadow); text-align: center; border-bottom: 4px solid var(--accent); }
        .stat-card.revenue { border-bottom-color: var(--success); }
        .stat-card.pending { border-bottom-color: var(--warning); }
        .stat-value { font-size: 1.6rem; font-weight: 800; color: var(--navy); margin-bottom: 5px; }
        .stat-label { font-size: 0.85rem; color: #666; font-weight: 700; }
        
        .chart-card { background: white; border-radius: 15px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; }
        .chart-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        .chart-header h6 { margin: 0; font-weight: 800; color: var(--navy); }
        .chart-container { position: relative; height: 300px; width: 100%; }

        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.9); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><h5 class="mt-3 text-navy fw-bold">جاري التحليل...</h5></div>

<div class="top-nav">
    <div class="top-nav-left">
        <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
        <h5><i class="fas fa-chart-pie me-2"></i>التقارير</h5>
    </div>
    <button class="export-btn" onclick="exportToExcel()"><i class="fas fa-file-excel me-1"></i> تصدير Excel</button>
</div>

<div class="main-content">
    <div class="filters-container">
        <button class="filter-btn active" onclick="applyFilter('all', this)">كل الأوقات</button>
        <button class="filter-btn" onclick="applyFilter('year', this)">هذا العام</button>
        <button class="filter-btn" onclick="applyFilter('month', this)">هذا الشهر</button>
    </div>
    
    <div class="stats-row">
        <div class="stat-card"><div class="stat-value" id="val-total-cases">0</div><div class="stat-label">الملفات المسجلة</div></div>
        <div class="stat-card revenue"><div class="stat-value" id="val-total-revenue">0</div><div class="stat-label">المقبوضات (د.أ)</div></div>
        <div class="stat-card pending"><div class="stat-value" id="val-total-pending">0</div><div class="stat-label">المعلّق (د.أ)</div></div>
    </div>
    
    <div class="row g-3">
        <div class="col-md-6">
            <div class="chart-card"><div class="chart-header"><i class="fas fa-balance-scale"></i><h6>أنواع القضايا</h6></div><div class="chart-container"><canvas id="typeChart"></canvas></div></div>
        </div>
        <div class="col-md-6">
            <div class="chart-card"><div class="chart-header"><i class="fas fa-layer-group"></i><h6>المراحل القانونية</h6></div><div class="chart-container"><canvas id="stageChart"></canvas></div></div>
        </div>
        <div class="col-12">
            <div class="chart-card"><div class="chart-header"><i class="fas fa-users"></i><h6>أداء المحامين</h6></div><div class="chart-container"><canvas id="lawyerChart"></canvas></div></div>
        </div>
    </div>
</div>

<script>
    const API = 'https://curly-pond-9975.hassan-alsakka.workers.dev';
    const token = localStorage.getItem('mo_token');
    
    let allCases = [], allStaff = [], filteredCases = [];
    let typeChartIns = null, stageChartIns = null, lawyerChartIns = null;

    Chart.defaults.font.family = "'Cairo', sans-serif";
    const pieOptions = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } };

    window.onload = async () => {
        if (!token) { location.href = 'index.html'; return; }
        try {
            const [casesRes, staffRes] = await Promise.all([
                fetch(`${API}/api/cases`, { headers: { 'Authorization': `Bearer ${token}` } }),
                fetch(`${API}/api/staff`, { headers: { 'Authorization': `Bearer ${token}` } })
            ]);
            allCases = await casesRes.json();
            allStaff = await staffRes.json();
            applyFilter('all', document.querySelector('.filter-btn.active'));
            document.getElementById('loadingOverlay').style.display = 'none';
        } catch (e) { alert('خطأ في التحميل'); }
    };

    function applyFilter(period, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const now = new Date(); let startDate = new Date(0);
        if (period === 'month') startDate = new Date(now.getFullYear(), now.getMonth(), 1);
        else if (period === 'year') startDate = new Date(now.getFullYear(), 0, 1);
        filteredCases = allCases.filter(c => new Date(c.creation_date) >= startDate);
        updateDashboardStats(); updateCharts();
    }

    function updateDashboardStats() {
        let totalAgreed = 0, totalPaid = 0;
        filteredCases.forEach(c => { totalAgreed += parseFloat(c.total_agreed_fees) || 0; totalPaid += parseFloat(c.total_paid) || 0; });
        document.getElementById('val-total-cases').innerText = filteredCases.length;
        document.getElementById('val-total-revenue').innerText = totalPaid;
        document.getElementById('val-total-pending').innerText = totalAgreed - totalPaid;
    }

    function updateCharts() {
        // Types
        const typeCounts = {}; filteredCases.forEach(c => { const t = c.case_type || 'غير مصنف'; typeCounts[t] = (typeCounts[t] || 0) + 1; });
        if (typeChartIns) typeChartIns.destroy();
        typeChartIns = new Chart(document.getElementById('typeChart'), { type: 'doughnut', data: { labels: Object.keys(typeCounts), datasets: [{ data: Object.values(typeCounts), backgroundColor: ['#0a192f', '#64ffda', '#4caf50', '#2196f3', '#ff9800'] }] }, options: pieOptions });

        // Stages
        const stageCounts = {}; filteredCases.forEach(c => { const s = c.case_stage || 'غير محدد'; stageCounts[s] = (stageCounts[s] || 0) + 1; });
        if (stageChartIns) stageChartIns.destroy();
        stageChartIns = new Chart(document.getElementById('stageChart'), { type: 'pie', data: { labels: Object.keys(stageCounts), datasets: [{ data: Object.values(stageCounts), backgroundColor: ['#ff9800', '#2196f3', '#4caf50', '#f44336', '#9c27b0'] }] }, options: pieOptions });

        // Lawyers
        const lawyerStats = {};
        filteredCases.forEach(c => {
            const name = c.assigned_lawyer_id ? (allStaff.find(s=>s.id===c.assigned_lawyer_id)?.full_name || 'محذوف') : 'غير مسند';
            if (!lawyerStats[name]) lawyerStats[name] = { cases: 0, revenue: 0 };
            lawyerStats[name].cases += 1; lawyerStats[name].revenue += parseFloat(c.total_paid) || 0;
        });
        if (lawyerChartIns) lawyerChartIns.destroy();
        lawyerChartIns = new Chart(document.getElementById('lawyerChart'), {
            type: 'bar',
            data: { labels: Object.keys(lawyerStats), datasets: [
                { label: 'عدد القضايا', data: Object.values(lawyerStats).map(l=>l.cases), backgroundColor: '#0a192f', yAxisID: 'y' },
                { label: 'المقبوضات', data: Object.values(lawyerStats).map(l=>l.revenue), backgroundColor: '#64ffda', yAxisID: 'y1' }
            ]},
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { position: 'right' }, y1: { position: 'left' } } }
        });
    }

    function exportToExcel() {
        let csv = '\uFEFFرقم الملف,الموكل,الهاتف,نوع الدعوى,قيمة المطالبة,المحكمة,القاضي,المحامي,الأتعاب,المدفوع,المتبقي,الحالة\n';
        filteredCases.forEach(c => {
            const lawyer = c.assigned_lawyer_id ? (allStaff.find(s=>s.id===c.assigned_lawyer_id)?.full_name || '') : '';
            const agreed = parseFloat(c.total_agreed_fees) || 0; const paid = parseFloat(c.total_paid) || 0;
            csv += `"${c.case_internal_id}","${c.client_name}","${c.client_phone}","${c.case_type||''}","${c.claim_amount||0}","${c.current_court||''}","${c.current_judge||''}","${lawyer}",${agreed},${paid},${agreed-paid},"${c.case_status}"\n`;
        });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = `Reports_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
    }
</script>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/service-worker.js')
                .then(reg => console.log('✅ Service Worker Registered'))
                .catch(err => console.log('❌ Service Worker Error:', err));
        });
    }
</script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/service-worker.js')
                .then(reg => console.log('✅ Service Worker Registered'))
                .catch(err => console.log('❌ Service Worker Error:', err));
        });
    }
</script>
</body>
</html>
