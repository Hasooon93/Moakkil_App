<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تفاصيل القضية | موكّل</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
    
    <style>
        .timeline { border-right: 3px solid #e2e8f0; padding-right: 20px; position: relative; }
        .timeline-item { position: relative; margin-bottom: 25px; }
        .timeline-item::after { content: ''; position: absolute; right: -27px; top: 5px; width: 12px; height: 12px; background: var(--navy); border-radius: 50%; border: 3px solid white; }
        .nav-pills .nav-link { border-radius: 10px; color: var(--navy); font-weight: 700; border: 1px solid #e2e8f0; margin-left: 5px; transition: 0.3s; }
        .nav-pills .nav-link.active { background-color: var(--navy); color: white; border-color: var(--navy); }
        .detail-item { font-size: 0.9rem; margin-bottom: 8px; }
        .detail-item i { width: 20px; color: var(--info); text-align: center; }
    </style>
</head>
<body style="background: #f8fafc; padding-bottom: 80px;">

    <div class="top-nav d-flex align-items-center px-3 shadow-sm" style="height: 65px; background: var(--navy);">
        <button class="btn btn-link text-white text-decoration-none me-2 p-0" onclick="goBack()"><i class="fas fa-arrow-right fs-4"></i></button>
        <h6 class="text-white mb-0 fw-bold text-truncate" id="case-title" style="max-width: 45%;">جاري التحميل...</h6>
        
        <div class="ms-auto d-flex gap-2">
            <button class="btn btn-sm btn-light text-navy fw-bold" onclick="copyDeepLink()" title="نسخ رابط الموكل"><i class="fas fa-link"></i></button>
            <button class="btn btn-sm btn-warning fw-bold text-dark" onclick="openEditModal()" title="تعديل القضية"><i class="fas fa-edit"></i></button>
            <button class="btn btn-sm btn-accent fw-bold text-navy" onclick="generatePDF()" title="طباعة تقرير"><i class="fas fa-file-pdf"></i></button>
        </div>
    </div>

    <div class="container mt-3">
        
        <div class="card-custom p-3 mb-3 bg-white shadow-sm border-0 position-relative" id="case-summary-card">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="badge fs-6" id="case-status">--</span>
                <span class="text-muted small fw-bold bg-light px-2 py-1 rounded-2" id="case-pin"><i class="fas fa-key text-warning"></i> PIN: --</span>
            </div>
            <h5 class="fw-bold text-navy mt-2 mb-3 border-bottom pb-2" id="case-client-name"><i class="fas fa-user-tie me-2 text-info"></i> --</h5>
            
            <div class="row g-2 mb-3">
                <div class="col-6 detail-item"><i class="fas fa-balance-scale"></i> <b>المحكمة:</b> <span id="det-court">--</span></div>
                <div class="col-6 detail-item"><i class="fas fa-gavel"></i> <b>القاضي:</b> <span id="det-judge">--</span></div>
                <div class="col-6 detail-item"><i class="fas fa-folder"></i> <b>النوع:</b> <span id="det-type">--</span></div>
                <div class="col-6 detail-item"><i class="fas fa-user-shield"></i> <b>الخصم:</b> <span id="det-opponent">--</span></div>
                <div class="col-12 detail-item"><i class="fas fa-money-bill-wave"></i> <b>قيمة المطالبة:</b> <span id="det-claim" class="text-danger fw-bold">--</span></div>
            </div>

            <div class="row mt-2 text-center bg-light rounded-3 p-2 border">
                <div class="col-4 border-end border-2"><small class="text-muted d-block fw-bold">الأتعاب</small><b id="sum-agreed" class="text-navy">0</b></div>
                <div class="col-4 border-end border-2"><small class="text-muted d-block fw-bold">المُحصّل</small><b class="text-success" id="sum-paid">0</b></div>
                <div class="col-4"><small class="text-muted d-block fw-bold">المتبقي</small><b class="text-danger" id="sum-rem">0</b></div>
            </div>
        </div>

        <ul class="nav nav-pills mb-3 justify-content-center" id="pills-tab" role="tablist">
            <li class="nav-item"><button class="nav-link active shadow-sm" data-bs-toggle="pill" data-bs-target="#tab-updates">الوقائع</button></li>
            <li class="nav-item"><button class="nav-link shadow-sm" data-bs-toggle="pill" data-bs-target="#tab-finance">المالية</button></li>
            <li class="nav-item"><button class="nav-link shadow-sm" data-bs-toggle="pill" data-bs-target="#tab-files">الأرشيف</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="tab-updates">
                <div class="d-flex justify-content-between mb-3 align-items-center">
                    <h6 class="fw-bold mb-0 text-navy"><i class="fas fa-stream me-1"></i> الخط الزمني</h6>
                    <button class="btn btn-sm btn-primary-custom" onclick="openModal('updateModal')"><i class="fas fa-plus"></i> إضافة واقعة</button>
                </div>
                <div class="timeline" id="timeline-container">
                    <div class="text-center p-4 text-muted small">جاري التحميل...</div>
                </div>
            </div>

            <div class="tab-pane fade" id="tab-finance">
                <div class="d-flex justify-content-between mb-3 align-items-center">
                    <h6 class="fw-bold mb-0 text-navy"><i class="fas fa-receipt me-1"></i> سجل الدفعات</h6>
                    <button class="btn btn-sm btn-success fw-bold" onclick="openModal('paymentModal')"><i class="fas fa-plus"></i> دفعة جديدة</button>
                </div>
                <div id="payments-container"></div>
            </div>

            <div class="tab-pane fade" id="tab-files">
                <div class="d-flex justify-content-between mb-3 align-items-center">
                    <h6 class="fw-bold mb-0 text-navy"><i class="fas fa-cloud-upload-alt me-1"></i> المستندات (Drive)</h6>
                    <button class="btn btn-sm btn-warning fw-bold text-dark" onclick="openModal('fileModal')"><i class="fas fa-upload"></i> رفع ملف</button>
                </div>
                <div class="row g-2" id="files-container"></div>
            </div>
        </div>
    </div>

    <div id="alertBox" class="alert-container"></div>

    <div class="modal fade" id="editCaseModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0" style="border-radius: 20px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-navy">تحديث بيانات القضية</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editCaseForm" onsubmit="updateCaseDetails(event)">
                        <input type="text" id="edit_internal_id" class="form-control mb-2" placeholder="رقم الملف الداخلي *" required>
                        <select id="edit_status" class="form-select mb-2" required>
                            <option value="نشطة">نشطة</option>
                            <option value="مغلقة">مغلقة</option>
                            <option value="قيد الاستئناف">قيد الاستئناف</option>
                            <option value="محفوظة">محفوظة</option>
                        </select>
                        <input type="text" id="edit_access_pin" class="form-control mb-2" placeholder="رمز PIN للموكل *" required>
                        <hr>
                        <input type="text" id="edit_court" class="form-control mb-2" placeholder="المحكمة الحالية">
                        <input type="text" id="edit_judge" class="form-control mb-2" placeholder="اسم القاضي">
                        <input type="text" id="edit_type" class="form-control mb-2" placeholder="نوع الدعوى">
                        <input type="text" id="edit_opponent" class="form-control mb-2" placeholder="اسم الخصم">
                        <hr>
                        <input type="number" id="edit_claim" class="form-control mb-2" placeholder="قيمة المطالبة">
                        <input type="number" id="edit_fees" class="form-control mb-3" placeholder="الأتعاب الكلية">
                        <button type="submit" class="btn-primary-custom w-100">حفظ التعديلات</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="updateModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0" style="border-radius: 20px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-navy">إضافة واقعة أو قرار</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="updateForm" onsubmit="saveUpdate(event)">
                        <input type="text" id="upd_title" class="form-control mb-2" placeholder="عنوان التحديث (مثال: قرار تأجيل) *" required>
                        <textarea id="upd_details" class="form-control mb-2" rows="3" placeholder="التفاصيل الدقيقة..." required></textarea>
                        
                        <div class="row g-2 mb-2">
                            <div class="col-6">
                                <label class="small text-muted">تاريخ الجلسة</label>
                                <input type="date" id="upd_hearing_date" class="form-control">
                            </div>
                            <div class="col-6">
                                <label class="small text-muted">الجلسة القادمة</label>
                                <input type="date" id="upd_next_hearing" class="form-control">
                            </div>
                        </div>
                        
                        <div class="form-check form-switch mb-3 mt-2">
                            <input class="form-check-input" type="checkbox" id="upd_visible" checked>
                            <label class="form-check-label small fw-bold text-navy" for="upd_visible">إظهار هذا التحديث للموكل في بوابته</label>
                        </div>
                        
                        <button type="submit" class="btn-primary-custom w-100">حفظ الواقعة</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="paymentModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0" style="border-radius: 20px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-success">تسجيل دفعة مالية</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="paymentForm" onsubmit="savePayment(event)">
                        <div class="input-group mb-2">
                            <input type="number" id="pay_amount" class="form-control" placeholder="المبلغ المرفوع *" required>
                            <span class="input-group-text fw-bold">د.أ</span>
                        </div>
                        <label class="small text-muted">تاريخ الدفعة / الاستحقاق</label>
                        <input type="date" id="pay_due_date" class="form-control mb-2" required>
                        <select id="pay_status" class="form-select mb-3">
                            <option value="مدفوعة">مدفوعة ومقبوضة</option>
                            <option value="مستحقة">مستحقة (شيك آجال)</option>
                        </select>
                        <button type="submit" class="btn btn-success w-100 fw-bold py-2" style="border-radius: 10px;">حفظ الدفعة</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="fileModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0" style="border-radius: 20px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-warning text-dark">رفع مستند (Drive)</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <form id="fileForm" onsubmit="saveFile(event)">
                        <input type="text" id="file_title_input" class="form-control mb-2" placeholder="اسم المستند (مثال: وكالة، لائحة دعوى) *" required>
                        <input type="file" id="file_input" class="form-control mb-3" required>
                        
                        <button type="submit" id="btn_upload" class="btn btn-warning w-100 fw-bold py-2" style="border-radius: 10px;">
                            <i class="fas fa-cloud-upload-alt me-1"></i> بدء الرفع والأرشفة
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/case-details.js"></script>
</body>
</html>
