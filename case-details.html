<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تفاصيل القضية | موكّل</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
    
    <style>
        .timeline { border-right: 3px solid #e2e8f0; padding-right: 20px; position: relative; }
        .timeline-item { position: relative; margin-bottom: 25px; }
        .timeline-item::after { content: ''; position: absolute; right: -27px; top: 5px; width: 12px; height: 12px; background: var(--navy); border-radius: 50%; border: 3px solid white; }
        .nav-pills .nav-link { border-radius: 10px; color: var(--navy); font-weight: 700; border: 1px solid #e2e8f0; margin-left: 5px; }
        .nav-pills .nav-link.active { background-color: var(--navy); color: white; border-color: var(--navy); }
    </style>
</head>
<body style="background: #f8fafc; padding-bottom: 80px;">

    <div class="top-nav d-flex align-items-center px-3" style="height: 60px;">
        <a href="app.html" class="text-white text-decoration-none me-3"><i class="fas fa-arrow-right fs-5"></i></a>
        <h6 class="text-white mb-0 fw-bold" id="case-title">جاري التحميل...</h6>
        <button class="btn btn-sm btn-accent ms-auto fw-bold" onclick="generatePDF()"><i class="fas fa-file-pdf me-1"></i> تقرير</button>
    </div>

    <div class="container mt-3">
        <div class="card-custom p-3 mb-3 bg-white shadow-sm border-0" id="case-summary-card">
            <div class="d-flex justify-content-between">
                <span class="badge bg-soft-primary text-primary" id="case-status">--</span>
                <span class="text-muted small" id="case-court">--</span>
            </div>
            <h5 class="fw-bold text-navy mt-2 mb-1" id="case-client-name">--</h5>
            <div class="row mt-3 text-center border-top pt-2">
                <div class="col-4 border-left"><small class="text-muted d-block">الأتعاب</small><b id="sum-agreed">0</b></div>
                <div class="col-4 border-left"><small class="text-muted d-block">المُحصّل</small><b class="text-success" id="sum-paid">0</b></div>
                <div class="col-4"><small class="text-muted d-block">المتبقي</small><b class="text-danger" id="sum-rem">0</b></div>
            </div>
        </div>

        <ul class="nav nav-pills mb-3 justify-content-center" id="pills-tab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-updates">الوقائع</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-finance">المالية</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-files">الأرشيف</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="tab-updates">
                <div class="d-flex justify-content-between mb-3 align-items-center">
                    <h6 class="fw-bold mb-0 text-navy">الخط الزمني للأحداث</h6>
                    <button class="btn btn-sm btn-primary-custom" onclick="openModal('updateModal')"><i class="fas fa-plus"></i> تحديث</button>
                </div>
                <div class="timeline" id="timeline-container">
                    </div>
            </div>

            <div class="tab-pane fade" id="tab-finance">
                <div class="d-flex justify-content-between mb-3 align-items-center">
                    <h6 class="fw-bold mb-0 text-navy">سجل الدفعات</h6>
                    <button class="btn btn-sm btn-success" onclick="openModal('paymentModal')"><i class="fas fa-plus"></i> دفعة جديدة</button>
                </div>
                <div id="payments-container"></div>
            </div>

            <div class="tab-pane fade" id="tab-files">
                <div class="d-flex justify-content-between mb-3 align-items-center">
                    <h6 class="fw-bold mb-0 text-navy">المستندات والوثائق</h6>
                    <button class="btn btn-sm btn-warning text-white" onclick="openModal('fileModal')"><i class="fas fa-upload"></i> رفع ملف</button>
                </div>
                <div class="row g-2" id="files-container"></div>
            </div>
        </div>
    </div>

    <div id="alertBox" class="alert-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/case-details.js"></script>
</body>
</html>
