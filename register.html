<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإدارة العليا | نظام موكّل</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        :root { 
            --primary: #0f172a; 
            --accent: #38bdf8; 
            --bg: #f1f5f9; 
        }
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg); 
        }
        .admin-header { 
            background: var(--primary); 
            color: white; 
            padding: 20px 0; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
        }
        .card { 
            border: none; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
        }
        .card-header { 
            background-color: white; 
            border-bottom: 1px solid #e2e8f0; 
            border-radius: 12px 12px 0 0 !important; 
            font-weight: 700; 
        }
        .stat-card { 
            transition: transform 0.3s; 
        }
        .stat-card:hover { 
            transform: translateY(-5px); 
        }
        .stat-icon { 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 24px; 
        }
        .table-responsive { 
            border-radius: 8px; 
        }
        .table thead th { 
            background-color: #f8fafc; 
            color: #475569; 
            font-weight: 700; 
            border-bottom: 2px solid #e2e8f0; 
        }
        .btn-logout {
            background-color: #e53e3e;
            color: white;
            border: none;
            transition: all 0.3s;
        }
        .btn-logout:hover {
            background-color: #c53030;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="admin-header mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <h4 class="m-0 fw-bold"><i class="fas fa-crown text-warning me-2"></i> الإدارة العليا | نظام موكّل</h4>
            <div>
                <button class="btn btn-logout btn-sm px-3 fw-bold rounded-pill shadow-sm" onclick="AUTH.logout()">
                    <i class="fas fa-sign-out-alt me-1"></i> تسجيل الخروج
                </button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card stat-card border-start border-primary border-4">
                    <div class="card-body d-flex align-items-center">
                        <div class="stat-icon bg-primary bg-opacity-10 text-primary me-3 ms-3">
                            <i class="fas fa-building"></i>
                        </div>
                        <div>
                            <h6 class="text-muted mb-1 fw-bold">إجمالي المكاتب</h6>
                            <h3 class="m-0 fw-bold" id="stat-firms">0</h3>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card border-start border-success border-4">
                    <div class="card-body d-flex align-items-center">
                        <div class="stat-icon bg-success bg-opacity-10 text-success me-3 ms-3">
                            <i class="fas fa-users"></i>
                        </div>
                        <div>
                            <h6 class="text-muted mb-1 fw-bold">إجمالي المستخدمين</h6>
                            <h3 class="m-0 fw-bold" id="stat-users">0</h3>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card border-start border-warning border-4">
                    <div class="card-body d-flex align-items-center">
                        <div class="stat-icon bg-warning bg-opacity-10 text-warning me-3 ms-3">
                            <i class="fas fa-balance-scale"></i>
                        </div>
                        <div>
                            <h6 class="text-muted mb-1 fw-bold">إجمالي القضايا</h6>
                            <h3 class="m-0 fw-bold" id="stat-cases">0</h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center py-3">
                        <span class="fs-5"><i class="fas fa-list text-primary me-2"></i> المكاتب المسجلة</span>
                        <div>
                            <button class="btn btn-sm btn-outline-success me-2 fw-bold" onclick="loadFirms()">
                                <i class="fas fa-sync-alt"></i> تحديث
                            </button>
                            <button class="btn btn-sm btn-primary fw-bold" data-bs-toggle="modal" data-bs-target="#addFirmModal">
                                <i class="fas fa-plus"></i> تسجيل مكتب جديد
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive" style="max-height: 600px; overflow-y: auto;">
                            <table class="table table-hover align-middle m-0" id="firmsTable">
                                <thead class="table-light sticky-top">
                                    <tr>
                                        <th>المكتب</th>
                                        <th>تاريخ الانتهاء</th>
                                        <th>المستخدمين (الكوتا)</th>
                                        <th>الحالة</th>
                                        <th>إجراءات</th>
                                    </tr>
                                </thead>
                                <tbody id="firmsTableBody">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addFirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-primary text-white border-0">
                    <h5 class="modal-title fw-bold"><i class="fas fa-plus-circle me-2"></i> تسجيل مكتب جديد</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-light">
                    <form id="addFirmForm">
                        <div class="card p-3 mb-3 border-0 shadow-sm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">اسم المكتب / الشركة</label>
                                <input type="text" class="form-control" id="newFirmName" required>
                            </div>
                            <div class="row mb-2">
                                <div class="col-6">
                                    <label class="form-label fw-bold">مدة الاشتراك (أشهر)</label>
                                    <input type="number" class="form-control" id="newFirmMonths" value="12" min="1" required>
                                </div>
                                <div class="col-6">
                                    <label class="form-label fw-bold">الحد الأقصى للمستخدمين</label>
                                    <input type="number" class="form-control" id="newFirmMaxUsers" value="5" min="1" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="card p-3 border-0 shadow-sm mb-2">
                            <h6 class="fw-bold text-primary mb-3 border-bottom pb-2">بيانات مدير المكتب (Admin)</h6>
                            <div class="mb-3">
                                <label class="form-label fw-bold">الاسم الكامل للمدير</label>
                                <input type="text" class="form-control" id="newAdminName" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">رقم الهاتف (يُستخدم للدخول)</label>
                                <input type="tel" class="form-control text-start" id="newAdminPhone" placeholder="07xxxxxxxx" dir="ltr" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label fw-bold">معرف تيليغرام (اختياري)</label>
                                <input type="text" class="form-control text-start" id="newAdminTelegram" dir="ltr" placeholder="لمراسلات البوت">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mt-2 shadow-sm" id="btnSubmitFirm">حفظ وتسجيل المكتب</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="renewFirmModal" tabindex="-1">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-success text-white border-0">
                    <h5 class="modal-title fw-bold"><i class="fas fa-calendar-plus me-2"></i> تجديد الاشتراك</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center p-4">
                    <form id="renewFirmForm">
                        <input type="hidden" id="renewFirmId">
                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted">تجديد لمدة (أشهر)</label>
                            <input type="number" class="form-control text-center fs-4 fw-bold" id="renewMonths" value="12" min="1" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold py-2 shadow-sm" id="btnSubmitRenew">تأكيد التجديد الآن</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/config.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/register.js"></script>

    <script>
        // حماية فورية: بمجرد فتح الصفحة، يتم التحقق من الصلاحيات وطرد أي مستخدم عادي
        document.addEventListener('DOMContentLoaded', () => {
            const user = AUTH.checkSession();
            if (user && user.role !== 'super_admin' && user.role !== 'superadmin') {
                window.location.replace('app.html');
            }
        });
    </script>
</body>
</html>
