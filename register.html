<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإدارة العليا | نظام موكّل</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        :root { --primary: #0f172a; --accent: #38bdf8; --bg: #f1f5f9; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); }
        .admin-header { background: var(--primary); color: white; padding: 20px 0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .card-header { background: white; border-bottom: 2px solid var(--bg); border-radius: 15px 15px 0 0 !important; font-weight: bold; }
        .btn-custom { background: var(--primary); color: white; border-radius: 8px; padding: 10px 20px; font-weight: bold; }
        .btn-custom:hover { background: #1e293b; color: white; transform: translateY(-1px); }
    </style>
</head>
<body>

    <div class="admin-header mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <h3 class="m-0 fw-bold"><i class="fas fa-server text-info me-2"></i> الإدارة العليا (Super Admin)</h3>
            <button onclick="logout()" class="btn btn-outline-light btn-sm"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
        </div>
    </div>

    <div class="container pb-5">
        <div class="row g-4">
            <div class="col-lg-5">
                <div class="card h-100">
                    <div class="card-header text-primary"><i class="fas fa-plus-circle"></i> تسجيل مكتب محاماة جديد</div>
                    <div class="card-body">
                        <form id="registerFirmForm">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">اسم المكتب</label>
                                <input type="text" class="form-control" id="firmName" required>
                            </div>
                            <div class="row mb-3">
                                <div class="col-6">
                                    <label class="form-label small fw-bold">مدة الاشتراك (أشهر)</label>
                                    <input type="number" class="form-control" id="subMonths" value="12" min="1" required>
                                </div>
                                <div class="col-6">
                                    <label class="form-label small fw-bold">الحد الأقصى للمستخدمين</label>
                                    <input type="number" class="form-control" id="maxUsers" value="5" min="1" required>
                                </div>
                            </div>
                            <hr>
                            <h6 class="fw-bold text-muted mb-3">بيانات المدير العام للمكتب</h6>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">اسم المدير</label>
                                <input type="text" class="form-control" id="adminName" required>
                            </div>
                            <div class="row mb-4">
                                <div class="col-6">
                                    <label class="form-label small fw-bold">رقم الهاتف (للدخول)</label>
                                    <input type="tel" class="form-control" id="adminPhone" dir="ltr" required>
                                </div>
                                <div class="col-6">
                                    <label class="form-label small fw-bold">Telegram ID (اختياري)</label>
                                    <input type="text" class="form-control" id="adminTg" dir="ltr">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-custom w-100"><i class="fas fa-save"></i> إنشاء المكتب والحساب</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="card h-100">
                    <div class="card-header text-success d-flex justify-content-between align-items-center">
                        <span><i class="fas fa-building"></i> المكاتب المسجلة</span>
                        <button class="btn btn-sm btn-outline-success" onclick="loadFirms()"><i class="fas fa-sync-alt"></i> تحديث</button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive" style="max-height: 600px; overflow-y: auto;">
                            <table class="table table-hover align-middle m-0" id="firmsTable">
                                <thead class="table-light sticky-top">
                                    <tr>
                                        <th>المكتب</th>
                                        <th>الاشتراك</th>
                                        <th>المستخدمين (الكوتا)</th>
                                        <th>إجراءات</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/config.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/register.js"></script>
</body>
</html>
