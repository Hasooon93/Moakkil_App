<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من صحة السند | موكّل</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .verify-card { background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; padding: 30px; border-top: 8px solid #10b981; text-align: center; }
        .status-icon { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; font-size: 40px; }
        .status-valid { background-color: #d1fae5; color: #10b981; }
        .status-invalid { background-color: #fee2e2; color: #ef4444; border-top: 8px solid #ef4444 !important; }
        .data-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #e2e8f0; }
        .data-row:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <div id="verify-content" class="verify-card shadow-lg">
        <div id="loading-state">
            <div class="spinner-border text-primary mb-3" role="status"></div>
            <h5 class="fw-bold">جاري التحقق من سجلات السحاب...</h5>
        </div>

        <div id="result-state" class="d-none">
            <div id="status-icon-div" class="status-icon"></div>
            <h3 id="status-title" class="fw-bold mb-1">نتيجة التحقق</h3>
            <p id="status-desc" class="text-muted small mb-4">تفاصيل السند المستخرجة من النظام</p>
            
            <div id="data-container" class="text-start bg-light p-3 rounded-3 border">
                </div>

            <div class="mt-4 pt-3 border-top">
                <img src="./icons/icon-192.png" width="30" class="mb-2">
                <p class="small text-muted mb-0">نظام موكّل للتحقق الأمني الرقمي</p>
            </div>
        </div>
    </div>

    <script src="./js/config.js"></script>
    <script>
        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const invId = params.get('inv');

            if (!token || !invId) {
                showError("رابط التحقق غير مكتمل أو تالف.");
                return;
            }

            try {
                // الاتصال بمسار بوابة الموكل العامة لجلب بيانات المالية
                const res = await fetch(`${CONFIG.API_URL}/api/public/client?token=${token}`);
                const data = await res.json();

                if (res.ok && data.installments) {
                    // البحث عن الدفعة المحددة (السند)
                    const invoice = data.installments.find(i => i.id === invId);

                    if (invoice && invoice.status === 'مدفوعة') {
                        showSuccess(invoice, data.cases[0], data.firm);
                    } else {
                        showError("لم يتم العثور على هذا السند في سجلات المكتب، أو أنه لم يُسدد بعد.");
                    }
                } else {
                    showError("فشل الوصول لقاعدة البيانات المركزية.");
                }
            } catch (e) {
                showError("خطأ في الاتصال بالخادم السحابي.");
            }
        };

        function showSuccess(inv, caseData, firm) {
            document.getElementById('loading-state').classList.add('d-none');
            const resState = document.getElementById('result-state');
            resState.classList.remove('d-none');

            const iconDiv = document.getElementById('status-icon-div');
            iconDiv.className = "status-icon status-valid";
            iconDiv.innerHTML = '<i class="fas fa-check-circle"></i>';

            document.getElementById('status-title').innerText = "سند أصلي ومعتمد";
            document.getElementById('status-title').className = "fw-bold mb-1 text-success";

            const container = document.getElementById('data-container');
            container.innerHTML = `
                <div class="data-row"><span>جهة الإصدار:</span> <b class="text-navy">${firm.firm_name}</b></div>
                <div class="data-row"><span>رقم الملف:</span> <b>${caseData.case_internal_id}</b></div>
                <div class="data-row"><span>قيمة السند:</span> <b class="text-success">${inv.amount} د.أ</b></div>
                <div class="data-row"><span>تاريخ السداد:</span> <b>${inv.due_date || inv.created_at.split('T')[0]}</b></div>
                <div class="data-row"><span>حالة السند:</span> <span class="badge bg-success">مسجل ومقبوض</span></div>
            `;
        }

        function showError(msg) {
            document.getElementById('loading-state').classList.add('d-none');
            const resState = document.getElementById('result-state');
            resState.classList.remove('d-none');
            
            const card = document.querySelector('.verify-card');
            card.classList.add('status-invalid');

            const iconDiv = document.getElementById('status-icon-div');
            iconDiv.className = "status-icon status-invalid";
            iconDiv.innerHTML = '<i class="fas fa-times-circle"></i>';

            document.getElementById('status-title').innerText = "تحذير: سند غير موثق";
            document.getElementById('status-title').className = "fw-bold mb-1 text-danger";
            document.getElementById('status-desc').innerText = msg;
            
            document.getElementById('data-container').innerHTML = `
                <div class="alert alert-danger mb-0 small text-center fw-bold">
                    يرجى مراجعة إدارة المكتب فوراً. لم يتم العثور على هذا السند في النظام الرقمي المعتمد.
                </div>
            `;
        }
    </script>
</body>
</html>
