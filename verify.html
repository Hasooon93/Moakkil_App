<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <title>التحقق من صحة السجلات | نظام موكّل</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; padding: 20px; margin: 0;
        }
        .verify-card { 
            background: white; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            width: 100%; max-width: 500px; padding: 30px;
            text-align: center; position: relative; overflow: hidden;
            border-top: 5px solid #6f42c1;
        }
        .verify-card.status-valid-card { border-top-color: #198754; }
        .verify-card.status-invalid-card { border-top-color: #dc3545; }
        
        .brand-logo { margin-bottom: 20px; color: #6f42c1; font-size: 2rem; font-weight: 900;}
        
        .status-icon { 
            width: 80px; height: 80px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; margin: 0 auto 20px; color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .status-loading { background: #6c757d; animation: pulse 1.5s infinite; }
        .status-valid { background: #198754; }
        .status-invalid { background: #dc3545; }
        
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(108, 117, 125, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(108, 117, 125, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(108, 117, 125, 0); }
        }

        .data-container { text-align: right; margin-top: 25px; background: #f8f9fa; border-radius: 10px; padding: 15px; border: 1px solid #eee;}
        .data-row { display: flex; flex-direction: column; margin-bottom: 12px; border-bottom: 1px dashed #ddd; padding-bottom: 10px; }
        .data-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .data-label { font-size: 0.85rem; color: #6c757d; font-weight: bold; margin-bottom: 2px;}
        .data-value { font-size: 1.1rem; color: #212529; font-weight: bold;}
        
        .system-stamp { margin-top: 30px; font-size: 0.8rem; color: #adb5bd; border-top: 1px solid #eee; padding-top: 15px;}
        .system-stamp i { color: #198754; }
        
        .d-none { display: none !important; }
    </style>
</head>
<body>

    <div class="verify-card" id="mainCard">
        <div class="brand-logo"><i class="fas fa-balance-scale"></i> نظام موكّل</div>
        
        <div id="loading-state">
            <div class="status-icon status-loading">
                <i class="fas fa-spinner fa-spin"></i>
            </div>
            <h4 class="fw-bold text-secondary">جاري التحقق الآمن...</h4>
            <p class="text-muted small">يتم الآن الاتصال بقاعدة البيانات المركزية للتحقق من صحة السجل المشفر.</p>
        </div>

        <div id="result-state" class="d-none">
            <div id="status-icon-div" class="status-icon">
                </div>
            <h3 id="status-title" class="fw-bold mb-2"></h3>
            <p id="status-desc" class="text-muted small mb-4"></p>
            
            <div id="data-container" class="data-container">
                </div>
        </div>

        <div class="system-stamp">
            تم التحقق بواسطة محرك <b>موكّل</b> الموثوق <i class="fas fa-shield-check"></i><br>
            <span id="verification-time" dir="ltr"></span>
        </div>
    </div>

    <script src="assets/js/verify.js"></script>
</body>
</html>
