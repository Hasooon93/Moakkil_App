<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <title>التحقق من صحة السجلات | نظام موكّل</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; padding: 20px; margin: 0;
        }
        .verify-card { 
            background: white; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 100%; max-width: 450px; padding: 30px; 
            border-top: 8px solid #10b981; text-align: center; 
            transition: all 0.3s ease;
        }
        .status-icon { 
            width: 80px; height: 80px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            margin: 0 auto 20px auto; font-size: 40px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .status-valid { background-color: #d1fae5; color: #10b981; }
        .status-invalid { background-color: #fee2e2; color: #ef4444; }
        .verify-card.status-invalid-card { border-top-color: #ef4444; }
        
        .data-row { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px dashed #cbd5e1; 
        }
        .data-row:last-child { border-bottom: none; }
        .text-navy { color: #0a192f; }
    </style>
</head>
<body>

    <div id="verify-content" class="verify-card shadow-lg">
        <div id="loading-state">
            <div class="spinner-border text-success mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
            <h5 class="fw-bold text-navy">جاري التحقق من السجلات...</h5>
            <p class="text-muted small">يرجى الانتظار لحين مطابقة البيانات مع الخادم السحابي الآمن.</p>
        </div>

        <div id="result-state" class="d-none fade-in">
            <div id="status-icon-div" class="status-icon"></div>
            <h3 id="status-title" class="fw-bold mb-1">نتيجة التحقق</h3>
            <p id="status-desc" class="text-muted small mb-4">تفاصيل السجل المستخرجة من النظام</p>
            
            <div id="data-container" class="text-start bg-light p-3 rounded-4 border shadow-sm">
            </div>

            <div class="mt-4 pt-3 border-top">
                <img src="./icons/icon-192.png" width="30" class="mb-2 opacity-75" alt="Moakkil">
                <p class="small text-muted mb-0 fw-bold">مدعوم بواسطة نظام <span class="text-navy">موكّل ERP</span> للتحقق الرقمي</p>
            </div>
        </div>
    </div>

    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    
    <script>
        // دالة حماية النصوص
        const escapeHTML = (str) => {
            if (!str) return '';
            return str.toString().replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        };

        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            
            // قراءة المتغيرات الحديثة (V3.0)
            const type = params.get('type');
            const id = params.get('id');

            // قراءة المتغيرات القديمة للتوافقية (Legacy Support)
            const oldToken = params.get('token');
            const oldInvId = params.get('inv');

            if (type === 'receipt' && id) {
                await verifyReceiptData(id);
            } else if (type === 'cv' && id) {
                await verifyCVData(id);
            } else if (oldToken && oldInvId) {
                await verifyLegacyReceipt(oldToken, oldInvId);
            } else {
                showError("رابط التحقق غير مكتمل أو تالف. يرجى مسح رمز الـ QR الأصلي مجدداً.");
            }
        };

        // 1. معالج التحقق من الإيصالات (النظام الجديد)
        async function verifyReceiptData(id) {
            const res = await window.API.verifyReceipt(id);
            if (res && res.success && res.data) {
                showReceiptSuccess(res.data);
            } else {
                showError("لم يتم العثور على هذا السند في سجلات المكتب المعتمدة، أو أنه مسجل كدفعة غير مسددة بعد.");
            }
        }

        // 2. معالج التحقق من هوية المحامي والسيرة الذاتية (CV)
        async function verifyCVData(id) {
            const res = await window.API.verifyCV(id);
            if (res && res.success && res.data) {
                showCVSuccess(res.data);
            } else {
                showError("تعذر العثور على ملف هذا الموظف/المحامي في السجلات المعتمدة.");
            }
        }

        // 3. معالج التوافقية للإيصالات المطبوعة قديماً (Legacy)
        async function verifyLegacyReceipt(token, invId) {
            try {
                const res = await window.API.getPublicPortalData(token);
                if (res && !res.error && res.installments) {
                    const invoice = res.installments.find(i => i.id === invId);
                    const caseData = res.case || {};
                    const firmData = res.firm || {};

                    if (invoice && invoice.status === 'مدفوعة') {
                        // تجميع البيانات لتشبه الهيكل الجديد وعرضها
                        const assembledData = {
                            ...invoice,
                            mo_cases: { case_internal_id: caseData.case_internal_id, mo_clients: { full_name: res.client?.full_name } },
                            mo_firms: { firm_name: firmData.firm_name }
                        };
                        showReceiptSuccess(assembledData);
                    } else {
                        showError("لم يتم العثور على هذا السند، أو أنه مسجل كدفعة غير مسددة.");
                    }
                } else {
                    showError("فشل الوصول لقاعدة البيانات أو أن ملف القضية لم يعد متاحاً.");
                }
            } catch (e) {
                showError("خطأ في الاتصال بالخادم السحابي.");
            }
        }

        // --- دوال العرض في واجهة المستخدم --- //

        function showReceiptSuccess(inv) {
            document.getElementById('loading-state').classList.add('d-none');
            const resState = document.getElementById('result-state');
            resState.classList.remove('d-none');

            const iconDiv = document.getElementById('status-icon-div');
            iconDiv.className = "status-icon status-valid";
            iconDiv.innerHTML = '<i class="fas fa-check-circle"></i>';

            document.getElementById('status-title').innerText = "سند أصلي ومعتمد";
            document.getElementById('status-title').className = "fw-bold mb-1 text-success";
            document.getElementById('status-desc').innerText = "تم التحقق من صحة السند المالي";

            const firmName = inv.mo_firms ? inv.mo_firms.firm_name : 'مكتب محاماة معتمد';
            const caseNum = inv.mo_cases ? inv.mo_cases.case_internal_id : 'غير محدد';
            const clientName = (inv.mo_cases && inv.mo_cases.mo_clients) ? inv.mo_cases.mo_clients.full_name : 'غير محدد';

            const container = document.getElementById('data-container');
            container.innerHTML = `
                <div class="data-row"><span>جهة الإصدار:</span> <b class="text-navy text-end">${escapeHTML(firmName)}</b></div>
                <div class="data-row"><span>رقم الملف:</span> <b class="text-end">${escapeHTML(caseNum)}</b></div>
                <div class="data-row"><span>اسم الموكل:</span> <b class="text-end text-truncate" style="max-width: 150px;">${escapeHTML(clientName)}</b></div>
                <div class="data-row"><span>قيمة السند:</span> <b class="text-success fs-5 text-end">${Number(inv.amount).toLocaleString()} د.أ</b></div>
                <div class="data-row"><span>تاريخ السداد:</span> <b dir="ltr" class="text-end">${escapeHTML(inv.due_date || inv.created_at.split('T')[0])}</b></div>
                <div class="data-row"><span>حالة السند:</span> <span class="badge bg-success shadow-sm px-3 py-2">مقبوض ومسجل</span></div>
                <div class="data-row pb-0"><span>الرقم المرجعي:</span> <b style="font-size: 0.65rem; color: #94a3b8; user-select: all;" class="text-end">${escapeHTML(inv.id)}</b></div>
            `;
        }

        function showCVSuccess(user) {
            document.getElementById('loading-state').classList.add('d-none');
            const resState = document.getElementById('result-state');
            resState.classList.remove('d-none');

            const iconDiv = document.getElementById('status-icon-div');
            iconDiv.className = "status-icon status-valid";
            iconDiv.innerHTML = '<i class="fas fa-user-check"></i>';

            document.getElementById('status-title').innerText = "هوية مهنية موثقة";
            document.getElementById('status-title').className = "fw-bold mb-1 text-success";
            document.getElementById('status-desc').innerText = "تم التحقق من انتماء المحامي للمكتب المعتمد";

            const firmName = user.mo_firms ? user.mo_firms.firm_name : 'مكتب محاماة معتمد';
            
            let roleAr = user.role;
            if (user.role === 'admin') roleAr = 'مدير / محامي شريك';
            else if (user.role === 'lawyer') roleAr = 'محامي مزاول';
            else if (user.role === 'secretary') roleAr = 'سكرتاريا قانونية';

            const container = document.getElementById('data-container');
            container.innerHTML = `
                <div class="data-row"><span>الاسم الكامل:</span> <b class="text-navy text-end">${escapeHTML(user.full_name)}</b></div>
                <div class="data-row"><span>الصفة المهنية:</span> <b class="text-end">${escapeHTML(roleAr)}</b></div>
                <div class="data-row"><span>المكتب التابع له:</span> <b class="text-end">${escapeHTML(firmName)}</b></div>
                <div class="data-row"><span>رقم النقابة:</span> <b class="text-end" dir="ltr">${escapeHTML(user.syndicate_number || 'غير متوفر')}</b></div>
                <div class="data-row"><span>رقم التواصل:</span> <b class="text-end" dir="ltr">${escapeHTML(user.phone || 'غير متوفر')}</b></div>
                <div class="data-row pb-0 border-0 mt-3 text-center w-100">
                    <span class="badge bg-success shadow-sm px-3 py-2 w-100"><i class="fas fa-shield-alt me-1"></i> حساب موثق ونشط</span>
                </div>
            `;
        }

        function showError(msg) {
            document.getElementById('loading-state').classList.add('d-none');
            const resState = document.getElementById('result-state');
            resState.classList.remove('d-none');
            
            const card = document.querySelector('.verify-card');
            card.classList.add('status-invalid-card');

            const iconDiv = document.getElementById('status-icon-div');
            iconDiv.className = "status-icon status-invalid";
            iconDiv.innerHTML = '<i class="fas fa-times-circle"></i>';

            document.getElementById('status-title').innerText = "تحذير: سجل غير موثق";
            document.getElementById('status-title').className = "fw-bold mb-1 text-danger";
            document.getElementById('status-desc').innerText = escapeHTML(msg);
            
            document.getElementById('data-container').innerHTML = `
                <div class="alert alert-danger mb-0 small text-center fw-bold shadow-sm">
                    يرجى مراجعة إدارة المكتب فوراً. لم يتم العثور على هذا السجل في النظام الرقمي المعتمد، أو أنه قد يكون مزوراً.
                </div>
            `;
        }
    </script>
</body>
</html>
