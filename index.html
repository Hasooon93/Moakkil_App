<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a192f">
    <meta name="description" content="موكّل - نظام إدارة مكاتب المحاماة الأذكى والأسرع">
    <title>موكّل | نظام إدارة المكاتب القانونية</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
    
    <style>
        body { 
            background: linear-gradient(135deg, var(--navy) 0%, #1e3a8a 100%); 
            color: white; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero-section { text-align: center; padding: 40px 20px; }
        .logo-icon { font-size: 5rem; color: var(--accent); margin-bottom: 20px; text-shadow: 0 4px 15px rgba(100,255,218,0.3); }
        .btn-install { background: var(--accent); color: var(--navy); font-weight: 800; font-size: 1.1rem; padding: 15px 30px; border-radius: 50px; border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.3s; display: none; margin: 20px auto; }
        .btn-install:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(0,0,0,0.3); }
        .btn-login { background: rgba(255,255,255,0.1); color: white; border: 2px solid rgba(255,255,255,0.2); font-weight: 700; padding: 12px 30px; border-radius: 50px; transition: 0.3s; text-decoration: none; display: inline-block; margin-top: 10px; }
        .btn-login:hover { background: white; color: var(--navy); }
    </style>
</head>
<body>

    <div class="hero-section w-100 max-w-md mx-auto">
        <i class="fas fa-balance-scale logo-icon"></i>
        <h1 class="fw-bold mb-3">نظام موكّل</h1>
        <p class="lead mb-5 text-white-50">الإدارة السحابية الذكية لمكتبك القانوني.<br>أينما كنت، ملفاتك وقضاياك بين يديك.</p>
        
        <button id="install-btn" class="btn-install w-100 max-w-sm"><i class="fas fa-download me-2"></i> تثبيت التطبيق على الجهاز</button>
        
        <a href="login.html" class="btn-login w-100 max-w-sm mt-3"><i class="fas fa-sign-in-alt me-2"></i> تسجيل الدخول</a>
    </div>

    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        // 1. تسجيل الـ Service Worker ليعمل النظام بدون إنترنت بشكل جزئي ويتيح التثبيت
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('✅ ServiceWorker Active:', reg.scope))
                    .catch(err => console.log('⚠️ ServiceWorker Failed:', err));
            });
        }

        // 2. التقاط حدث التثبيت من المتصفح (يُطلق فقط إذا كان التطبيق مؤهلاً للتثبيت)
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block'; // إظهار زر التثبيت
            console.log('✅ تطبيق الويب جاهز للتثبيت');
        });

        // 3. هندسة الضغط على زر التثبيت
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('تم قبول التثبيت بنجاح!');
                    installBtn.style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        // 4. إخفاء الزر إذا كان التطبيق مثبتاً بالفعل
        window.addEventListener('appinstalled', () => {
            installBtn.style.display = 'none';
            console.log('تم تثبيت التطبيق مسبقاً.');
        });
    </script>
</body>
</html>
