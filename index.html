<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دخول المدير | موكّل 2.0</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f4f7f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: none;
        }
        .brand-logo {
            font-size: 2.5rem;
            font-weight: 900;
            color: #1a237e; /* Navy Blue */
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .btn-navy {
            background-color: #1a237e;
            color: white;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            transition: all 0.3s;
        }
        .btn-navy:hover {
            background-color: #0d1440;
            color: white;
            transform: translateY(-2px);
        }
        .form-control {
            border-radius: 12px;
            padding: 12px;
            border: 2px solid #eef2f6;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 700;
        }
        .form-control:focus {
            border-color: #1a237e;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="login-card">
            <div class="brand-logo">موكّل</div>
            <p class="text-center text-muted mb-4">نظام إدارة المكاتب القانونية ذ.م.م</p>

            <div id="phone-section">
                <div class="mb-3">
                    <label class="form-label fw-bold text-navy">رقم هاتف المدير</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0" style="border-radius: 0 12px 12px 0;"><i class="fas fa-phone text-muted"></i></span>
                        <input type="tel" id="phone" class="form-control border-start-0" placeholder="07XXXXXXXX" style="border-radius: 12px 0 0 12px;">
                    </div>
                </div>
                <button onclick="requestOTP()" class="btn btn-navy w-100 mb-3">
                    <i class="fas fa-paper-plane me-2"></i> إرسال كود الدخول
                </button>
                <div class="text-center">
                    <small class="text-muted">سيصلك الكود عبر تطبيق **Telegram**</small>
                </div>
            </div>

            <div id="otp-section" class="d-none">
                <div class="mb-3 text-center">
                    <label class="form-label fw-bold text-navy">أدخل كود التحقق</label>
                    <input type="text" id="otp" class="form-control mb-2" placeholder="------" maxlength="6">
                    <small class="text-muted">تم إرسال رمز مكون من 6 أرقام</small>
                </div>
                <button onclick="verifyOTP()" class="btn btn-success w-100 fw-bold py-2 mb-3" style="border-radius: 12px;">
                    <i class="fas fa-check-circle me-2"></i> تأكيد ودخول
                </button>
                <button onclick="location.reload()" class="btn btn-link btn-sm w-100 text-decoration-none text-muted">
                    <i class="fas fa-arrow-right me-1"></i> العودة لتغيير الرقم
                </button>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="./js/config.js"></script>
    <script src="./js/auth.js"></script>

</body>
</html>
