<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a192f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>موكّل | تسجيل الدخول</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --navy: #0a192f; 
            --accent: #64ffda; 
            --danger: #f44336;
        }
        
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background: #f5f7fa;
            /* استخدام 100dvh للتعامل الذكي مع شريط العناوين ولوحة المفاتيح في الهواتف */
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%;
        }
        
        .login-card {
            background: white;
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 6px;
            background: linear-gradient(90deg, var(--navy), var(--accent));
        }

        .logo-icon {
            font-size: 3.5rem;
            color: var(--navy);
            margin-bottom: 15px;
        }

        .login-title {
            font-weight: 800;
            color: var(--navy);
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .login-subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* منع سفاري من عمل Zoom عبر تثبيت الخط على 16px كحد أدنى */
        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px; 
            text-align: center;
            letter-spacing: 2px;
            font-weight: 700;
            transition: all 0.3s;
            margin-bottom: 20px;
            box-shadow: none !important;
        }
        
        .form-control:focus {
            border-color: var(--accent);
            outline: none;
            background: #fcfcfc;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--navy) 0%, #1a3a5a 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.3s;
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        .btn-primary:disabled {
            background: #ccc;
            transform: none;
        }

        .step {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .step.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-custom {
            border-radius: 10px;
            padding: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: none;
        }

        .alert-danger {
            background: #ffebee;
            color: var(--danger);
            border: 1px solid #ffcdd2;
        }

        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #999;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.3s;
        }

        .back-link:active {
            color: var(--navy);
        }

        /* Loading Spinner */
        .spinner-border {
            width: 1.5rem;
            height: 1.5rem;
            border-width: 0.2em;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-icon">
                <i class="fas fa-balance-scale"></i>
            </div>
            <h1 class="login-title">موكّل</h1>
            
            <div id="alertBox" class="alert-custom"></div>

            <div id="step1" class="step active">
                <p class="login-subtitle">أدخل رقم هاتفك المسجل للوصول للنظام</p>
                <form onsubmit="event.preventDefault(); sendOTP();">
                    <input type="tel" id="phone" class="form-control" placeholder="07XXXXXXXX" dir="ltr" autocomplete="tel">
                    <button type="submit" class="btn btn-primary" id="btnSend">
                        <span>إرسال رمز الدخول</span>
                    </button>
                </form>
            </div>

            <div id="step2" class="step">
                <p class="login-subtitle">أدخل الرمز المكون من 6 أرقام المرسل إليك عبر تيليجرام</p>
                <form onsubmit="event.preventDefault(); verifyOTP();">
                    <input type="tel" id="otp" class="form-control" placeholder="X X X X X X" dir="ltr" autocomplete="one-time-code" maxlength="6">
                    <button type="submit" class="btn btn-primary" id="btnVerify">
                        <span>تأكيد الدخول</span>
                    </button>
                </form>
                <a href="#" class="back-link" onclick="resetForm(); return false;">
                    <i class="fas fa-arrow-right me-1"></i> تغيير رقم الهاتف
                </a>
            </div>
            
        </div>
    </div>

    <script>
        const API = 'https://curly-pond-9975.hassan-alsakka.workers.dev';
        
        // ===== Auto-focus & Auth Check =====
        window.onload = () => {
            const token = localStorage.getItem('mo_token');
            if (token) {
                window.location.href = 'dashboard.html';
                return;
            }
            // تأخير بسيط للفوكس لتجنب مشاكل لوحة المفاتيح في بعض الهواتف
            setTimeout(() => { document.getElementById('phone').focus(); }, 300);
        };

        // ===== Input Formatters =====
        document.getElementById('phone').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9+]/g, '');
        });
        
        document.getElementById('otp').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
            // التقديم التلقائي عند اكتمال 6 أرقام لتجربة مستخدم سلسة
            if (this.value.length === 6) {
                verifyOTP();
            }
        });

        // ===== Alerts =====
        function showAlert(msg, type = 'danger') {
            const box = document.getElementById('alertBox');
            box.className = `alert-custom alert-${type}`;
            box.innerText = msg;
            box.style.display = 'block';
        }

        function hideAlert() {
            document.getElementById('alertBox').style.display = 'none';
        }

        // ===== Send OTP =====
        async function sendOTP() {
            const phone = document.getElementById('phone').value.trim();
            if (!phone || phone.length < 9) {
                showAlert('الرجاء إدخال رقم هاتف صحيح.');
                return;
            }

            const btn = document.getElementById('btnSend');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<div class="spinner-border text-light" role="status"></div>';
            btn.disabled = true;
            hideAlert();

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });

                if (res.ok) {
                    document.getElementById('step1').classList.remove('active');
                    document.getElementById('step2').classList.add('active');
                    setTimeout(() => { document.getElementById('otp').focus(); }, 300);
                } else {
                    showAlert('رقم الهاتف غير مصرح له بالدخول.');
                }
            } catch (e) {
                showAlert('حدث خطأ في الاتصال، يرجى المحاولة لاحقاً.');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // ===== Verify OTP =====
        async function verifyOTP() {
            const phone = document.getElementById('phone').value.trim();
            const otp = document.getElementById('otp').value.trim();
            
            if (otp.length !== 6) {
                showAlert('رمز الدخول يجب أن يتكون من 6 أرقام.');
                return;
            }

            const btn = document.getElementById('btnVerify');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<div class="spinner-border text-light" role="status"></div>';
            btn.disabled = true;
            hideAlert();

            try {
                const res = await fetch(`${API}/auth/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, otp })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('mo_token', data.token);
                    localStorage.setItem('mo_user', JSON.stringify(data.user));
                    showAlert('تم التحقق بنجاح! جاري التوجيه...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                } else {
                    showAlert('رمز الدخول غير صحيح أو منتهي الصلاحية.');
                    document.getElementById('otp').value = '';
                    document.getElementById('otp').focus();
                }
            } catch (e) {
                showAlert('حدث خطأ في الاتصال، يرجى المحاولة لاحقاً.');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // ===== Reset Form =====
        function resetForm() {
            hideAlert();
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step1').classList.add('active');
            document.getElementById('otp').value = '';
            setTimeout(() => { document.getElementById('phone').focus(); }, 300);
        }
    </script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/service-worker.js')
                .then(reg => console.log('✅ Service Worker Registered'))
                .catch(err => console.log('❌ Service Worker Error:', err));
        });
    }
</script>
</body>
</html>
