<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#0a192f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>موكّل | تسجيل الدخول</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy: #0a192f; 
            --accent: #64ffda; 
            --success: #4caf50;
            --danger: #f44336;
            --warning: #ff9800;
            --info: #2196f3;
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, var(--navy) 0%, #1a3a5a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* Animated Background */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(100,255,218,0.1) 0%, transparent 70%);
            animation: pulse 15s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.2) translate(-50px, 50px); }
        }
        
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .login-card {
            background: white;
            border-radius: 25px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--accent) 0%, #52e5b8 100%);
        }
        
        .logo-section {
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--navy) 0%, #1a3a5a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .logo i {
            -webkit-text-fill-color: var(--accent);
            font-size: 2.2rem;
        }
        
        .subtitle {
            color: #666;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .tagline {
            color: #999;
            font-size: 0.8rem;
        }
        
        .form-section {
            margin-top: 35px;
        }
        
        .form-label {
            text-align: right;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 10px;
            font-size: 0.9rem;
            display: block;
        }
        
        .input-group-custom {
            position: relative;
            margin-bottom: 20px;
        }
        
        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 1.2rem;
            z-index: 10;
        }
        
        .form-control {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            padding: 15px 50px 15px 20px;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
            text-align: right;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(100,255,218,0.1);
            background: white;
        }
        
        .form-control::placeholder {
            color: #bbb;
            font-weight: 400;
        }
        
        .btn-custom {
            background: linear-gradient(135deg, var(--accent) 0%, #52e5b8 100%);
            color: var(--navy);
            border: none;
            border-radius: 15px;
            padding: 15px;
            font-weight: 800;
            font-size: 1.05rem;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(100,255,218,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-custom:active {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(100,255,218,0.4);
        }
        
        .btn-custom:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary-custom {
            background: white;
            color: var(--navy);
            border: 2px solid #e9ecef;
            margin-top: 12px;
        }
        
        .btn-secondary-custom:active {
            background: #f8f9fa;
        }
        
        .alert-custom {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border: none;
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 20px;
            color: #1565c0;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .alert-custom i {
            font-size: 1.2rem;
        }
        
        .alert-success {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            color: #2e7d32;
        }
        
        .alert-danger {
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
            color: #c62828;
        }
        
        .step {
            display: none;
            animation: fadeIn 0.4s;
        }
        
        .step.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #999;
            font-size: 0.85rem;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e9ecef;
        }
        
        .divider::before {
            margin-left: 15px;
        }
        
        .divider::after {
            margin-right: 15px;
        }
        
        .info-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            text-align: right;
        }
        
        .info-box-title {
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .info-box-text {
            color: #666;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .footer-text {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
            color: #999;
            font-size: 0.8rem;
        }
        
        .footer-text a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }
        
        /* Mobile Optimization */
        @media (max-width: 480px) {
            .login-card {
                padding: 35px 25px;
            }
            
            .logo {
                font-size: 2rem;
            }
            
            .form-control {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo">
                <i class="fas fa-balance-scale"></i>
                موكّل
            </div>
            <p class="subtitle">نظام إدارة مكاتب المحاماة</p>
            <p class="tagline">بوابة الموظفين والمحامين</p>
        </div>
        
        <!-- Alert Container -->
        <div id="alertContainer"></div>
        
        <!-- Step 1: Phone Number -->
        <div id="step1" class="step active">
            <div class="form-section">
                <label class="form-label">
                    <i class="fas fa-phone me-2"></i>
                    رقم الهاتف المسجل
                </label>
                <div class="input-group-custom">
                    <input 
                        type="tel" 
                        id="phone" 
                        class="form-control" 
                        placeholder="07XXXXXXXX" 
                        dir="ltr"
                        autocomplete="tel"
                        maxlength="15"
                        onkeypress="if(event.key==='Enter') sendOTP()"
                    >
                    <i class="fas fa-mobile-alt input-icon"></i>
                </div>
                
                <button onclick="sendOTP()" id="btn1" class="btn-custom">
                    <i class="fas fa-paper-plane"></i>
                    <span>إرسال رمز التحقق</span>
                </button>
            </div>
            
            <div class="info-box">
                <div class="info-box-title">
                    <i class="fas fa-info-circle me-2"></i>
                    كيف يعمل النظام؟
                </div>
                <div class="info-box-text">
                    سيتم إرسال رمز التحقق (OTP) إلى حسابك على تيليجرام. تأكد من تسجيل رقمك في النظام مسبقاً.
                </div>
            </div>
        </div>
        
        <!-- Step 2: OTP Verification -->
        <div id="step2" class="step">
            <div class="form-section">
                <label class="form-label">
                    <i class="fas fa-shield-alt me-2"></i>
                    رمز التحقق (OTP)
                </label>
                <div class="input-group-custom">
                    <input 
                        type="text" 
                        id="otp" 
                        class="form-control" 
                        placeholder="000000" 
                        maxlength="6"
                        dir="ltr"
                        style="text-align: center; letter-spacing: 8px; font-size: 1.4rem; font-weight: 800;"
                        autocomplete="one-time-code"
                        inputmode="numeric"
                        onkeypress="if(event.key==='Enter') verifyOTP()"
                    >
                    <i class="fas fa-key input-icon"></i>
                </div>
                
                <button onclick="verifyOTP()" id="btn2" class="btn-custom">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>تسجيل الدخول</span>
                </button>
                
                <button onclick="resetForm()" class="btn-custom btn-secondary-custom">
                    <i class="fas fa-redo-alt"></i>
                    <span>تغيير رقم الهاتف</span>
                </button>
            </div>
            
            <div class="info-box">
                <div class="info-box-title">
                    <i class="fas fa-telegram me-2"></i>
                    تحقق من تيليجرام
                </div>
                <div class="info-box-text">
                    تم إرسال رمز مكون من 6 أرقام إلى حسابك على تيليجرام. الرمز صالح لمدة 5 دقائق.
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="footer-text">
            موكّل © 2026 | نظام آمن ومشفّر 🔒
        </div>
    </div>
</div>

<script>
    const API = 'https://curly-pond-9975.hassan-alsakka.workers.dev';
    
    // ===== Show Alert =====
    function showAlert(message, type = 'info') {
        const container = document.getElementById('alertContainer');
        const icons = {
            success: 'fa-check-circle',
            error: 'fa-exclamation-circle',
            warning: 'fa-exclamation-triangle',
            info: 'fa-info-circle'
        };
        
        const alertClass = type === 'error' ? 'alert-danger' : type === 'success' ? 'alert-success' : 'alert-custom';
        
        container.innerHTML = `
            <div class="${alertClass}">
                <i class="fas ${icons[type]}"></i>
                <span>${message}</span>
            </div>
        `;
        
        setTimeout(() => {
            container.innerHTML = '';
        }, 5000);
    }
    
    function hideAlert() {
        document.getElementById('alertContainer').innerHTML = '';
    }
    
    // ===== Send OTP =====
    async function sendOTP() {
        const phoneInput = document.getElementById('phone');
        const phone = phoneInput.value.trim();
        const btn = document.getElementById('btn1');
        
        // Validation
        if (phone.length < 5) {
            showAlert('يرجى إدخال رقم هاتف صحيح', 'error');
            phoneInput.focus();
            return;
        }
        
        // Disable button and show loading
        btn.disabled = true;
        const originalContent = btn.innerHTML;
        btn.innerHTML = '<div class="spinner"></div><span>جاري الإرسال...</span>';
        
        try {
            const res = await fetch(`${API}/auth/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ phone })
            });
            
            if (res.ok) {
                showAlert('✅ تم إرسال الرمز بنجاح! تحقق من تيليجرام', 'success');
                
                // Switch to step 2
                setTimeout(() => {
                    document.getElementById('step1').classList.remove('active');
                    document.getElementById('step2').classList.add('active');
                    document.getElementById('otp').focus();
                }, 1500);
            } else {
                const error = await res.text();
                showAlert('❌ ' + (error || 'الرقم غير مسجل في النظام'), 'error');
            }
        } catch (e) {
            console.error('Error:', e);
            showAlert('❌ خطأ في الاتصال بالخادم', 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalContent;
        }
    }
    
    // ===== Verify OTP =====
    async function verifyOTP() {
        const phone = document.getElementById('phone').value.trim();
        const otp = document.getElementById('otp').value.trim();
        const btn = document.getElementById('btn2');
        
        // Validation
        if (otp.length !== 6 || !/^\d+$/.test(otp)) {
            showAlert('يرجى إدخال رمز صحيح مكون من 6 أرقام', 'error');
            document.getElementById('otp').focus();
            return;
        }
        
        // Disable button and show loading
        btn.disabled = true;
        const originalContent = btn.innerHTML;
        btn.innerHTML = '<div class="spinner"></div><span>جاري التحقق...</span>';
        
        try {
            const res = await fetch(`${API}/auth/verify`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ phone, otp })
            });
            
            if (res.ok) {
                const data = await res.json();
                
                // Store auth data
                localStorage.setItem('mo_token', data.token);
                localStorage.setItem('mo_user', JSON.stringify(data.user));
                
                showAlert('✅ تم تسجيل الدخول بنجاح! جاري التحويل...', 'success');
                
                // Redirect to dashboard
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                const error = await res.text();
                showAlert('❌ الرمز غير صحيح أو منتهي الصلاحية', 'error');
                document.getElementById('otp').value = '';
                document.getElementById('otp').focus();
            }
        } catch (e) {
            console.error('Error:', e);
            showAlert('❌ خطأ في الاتصال بالخادم', 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalContent;
        }
    }
    
    // ===== Reset Form =====
    function resetForm() {
        hideAlert();
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step1').classList.add('active');
        document.getElementById('phone').value = '';
        document.getElementById('otp').value = '';
        document.getElementById('phone').focus();
    }
    
    // ===== Auto-focus on load =====
    window.onload = () => {
        // Check if already logged in
        const token = localStorage.getItem('mo_token');
        if (token) {
            window.location.href = 'dashboard.html';
            return;
        }
        
        document.getElementById('phone').focus();
    };
    
    // ===== Format phone input =====
    document.getElementById('phone').addEventListener('input', function(e) {
        // Remove non-numeric characters
        this.value = this.value.replace(/[^0-9+]/g, '');
    });
    
    // ===== Format OTP input =====
    document.getElementById('otp').addEventListener('input', function(e) {
        // Remove non-numeric characters
        this.value = this.value.replace(/[^0-9]/g, '');
        
        // Auto-submit when 6 digits entered
        if (this.value.length === 6) {
            setTimeout(() => verifyOTP(), 500);
        }
    });
</script>

</body>
</html>
