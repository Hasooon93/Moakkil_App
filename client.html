<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الموكل | موكّل</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
</head>
<body style="background: #f0f2f5;">
    <div class="container py-4" style="max-width: 500px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-navy">موكّل</h2>
            <p class="text-muted">متابعة ملفك القانوني</p>
        </div>
        <div id="client-content">
            <div class="text-center p-5"><div class="spinner-border text-primary"></div></div>
        </div>
    </div>

    <script src="./js/config.js"></script>
    <script>
        // منطق جلب بيانات الموكل بدون تسجيل دخول (عبر رابط خاص)
        const params = new URLSearchParams(window.location.search);
        const clientId = params.get('id');

        async function loadClientData() {
            try {
                // سنقوم ببرمجة مسار عام /api/public/client في الوركر لاحقاً
                const res = await fetch(`${CONFIG.API_URL}/api/public/client?id=${clientId}`);
                const data = await res.json();
                render(data);
            } catch(e) {
                document.getElementById('client-content').innerHTML = '<div class="alert alert-danger">الرابط غير صالح أو منتهي</div>';
            }
        }
        loadClientData();

        function render(data) {
            const container = document.getElementById('client-content');
            container.innerHTML = `
                <div class="card-custom mb-3">
                    <h5 class="fw-bold">${data.client.full_name}</h5>
                    <p class="text-muted">لديك ${data.cases.length} قضايا مسجلة</p>
                </div>
                ${data.cases.map(c => `
                    <div class="card-custom mb-2">
                        <b class="d-block">${c.case_internal_id}</b>
                        <small class="text-muted">${c.status} - ${c.current_court}</small>
                    </div>
                `).join('')}
            `;
        }
    </script>
</body>
</html>
