<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة الموكل | موكّل</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        
        :root { 
            --navy: #0a192f; 
            --accent: #64ffda; 
            --bg-light: #f4f7f9; 
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg-light); 
            min-height: 100vh;
            padding-bottom: 50px; 
        }
        
        .top-nav { 
            background: var(--navy); 
            color: white; 
            padding: 20px 15px; 
            text-align: center; 
            border-bottom-left-radius: 25px; 
            border-bottom-right-radius: 25px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        
        .card-custom { 
            background: white; 
            border-radius: 15px; 
            padding: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); 
            border: 1px solid #eef2f6; 
            margin-bottom: 15px; 
            transition: 0.3s;
        }
        
        .btn-custom { 
            background: var(--navy); 
            color: white; 
            border-radius: 12px; 
            font-weight: 700; 
            padding: 10px;
        }
        
        .btn-custom:hover {
            background: #1a3a5a;
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <h4 class="mb-0 fw-bold"><i class="fas fa-balance-scale text-accent me-2"></i> نظام موكّل</h4>
        <p class="text-white-50 small mb-0 mt-1">البوابة الإلكترونية للموكلين</p>
    </div>

    <div class="container mt-4" id="main-container">
        <div class="text-center p-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-muted fw-bold">جاري تحميل بياناتك...</p>
        </div>
    </div>

    <div class="modal fade" id="pinModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-body text-center p-4">
                    <div class="bg-light rounded-circle d-inline-block p-3 mb-3">
                        <i class="fas fa-lock fs-1 text-warning"></i>
                    </div>
                    <h5 class="fw-bold text-navy mb-2">حماية الخصوصية</h5>
                    <p class="text-muted small mb-3">الرجاء إدخال الرمز السري (PIN) الخاص بهذه القضية لعرض التفاصيل.</p>
                    
                    <input type="password" id="pin-input" class="form-control text-center fs-3 fw-bold mb-3 py-2" placeholder="****" style="letter-spacing: 10px; border-radius: 15px;">
                    
                    <button class="btn btn-custom w-100 mb-2" onclick="verifyPin()">عرض الملف</button>
                    <button class="btn btn-link text-muted text-decoration-none w-100" onclick="closePinModal()">إلغاء</button>
                    
                    <p id="pin-error" class="text-danger small mt-2 fw-bold d-none"><i class="fas fa-exclamation-triangle me-1"></i> الرمز غير صحيح، يرجى المحاولة مجدداً.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/config.js"></script>
    
    <script>
        // قراءة المعرف من الرابط العميق
        const urlParams = new URLSearchParams(window.location.search);
        const clientId = urlParams.get('id');
        
        let casesData = [];
        let currentSelectedCaseIndex = -1;
        let pinModal;

        window.onload = async () => {
            pinModal = new bootstrap.Modal(document.getElementById('pinModal'));

            if (!clientId) {
                document.getElementById('main-container').innerHTML = `
                    <div class="alert alert-danger text-center rounded-4 shadow-sm p-4">
                        <i class="fas fa-link fs-1 mb-2"></i><br>
                        <b>رابط غير صالح!</b><br>يرجى طلب الرابط الصحيح من مكتب المحاماة.
                    </div>`;
                return;
            }

            try {
                // استدعاء الـ API العام من السيرفر
                const res = await fetch(`${CONFIG.API_URL}/api/public/client?id=${clientId}`);
                const data = await res.json();

                if (!res.ok) throw new Error(data.error || 'خطأ في جلب البيانات');

                casesData = data.cases;
                renderUI(data.client, casesData);
            } catch (err) {
                document.getElementById('main-container').innerHTML = `
                    <div class="alert alert-danger text-center rounded-4 shadow-sm p-4">
                        <i class="fas fa-exclamation-circle fs-1 mb-2"></i><br>
                        <b>عذراً،</b> ${err.message}
                    </div>`;
            }
        };

        // بناء واجهة الموكل
        function renderUI(client, cases) {
            const container = document.getElementById('main-container');
            
            let html = `
                <div class="card-custom text-center mb-4" style="background: linear-gradient(135deg, var(--navy) 0%, #1a3a5a 100%); color: white; border:none;">
                    <h6 class="text-accent mb-1 small">أهلاً وسهلاً بك،</h6>
                    <h4 class="fw-bold mb-0">${client.full_name}</h4>
                </div>
                
                <h6 class="fw-bold text-navy mb-3 px-2"><i class="fas fa-folder-open me-2 text-warning"></i> قضاياك المسجلة (${cases.length})</h6>
            `;

            if (cases.length === 0) {
                html += '<div class="card-custom text-center text-muted py-5"><i class="fas fa-box-open fs-1 mb-3"></i><br>لا يوجد قضايا مسجلة حالياً.</div>';
            } else {
                html += cases.map((c, index) => `
                    <div class="card-custom">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h6 class="fw-bold text-navy mb-0">${c.case_internal_id}</h6>
                            <span class="badge ${c.status === 'نشطة' ? 'bg-success' : 'bg-secondary'}">${c.status}</span>
                        </div>
                        
                        <button class="btn btn-outline-primary btn-sm w-100 fw-bold mt-2" onclick="requestPin(${index})" id="btn-unlock-${index}">
                            <i class="fas fa-lock me-1"></i> فتح وعرض التفاصيل
                        </button>
                        
                        <div id="case-details-${index}" class="mt-3 pt-3 border-top d-none" style="animation: fadeIn 0.5s;">
                            <div class="row g-2 text-center">
                                <div class="col-6">
                                    <div class="bg-light p-2 rounded-3 border">
                                        <small class="text-muted d-block"><i class="fas fa-balance-scale"></i> المحكمة</small>
                                        <b class="text-navy">${c.current_court || 'غير محدد'}</b>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="bg-light p-2 rounded-3 border">
                                        <small class="text-muted d-block"><i class="fas fa-info-circle"></i> الحالة</small>
                                        <b class="text-success">${c.status}</b>
                                    </div>
                                </div>
                            </div>
                            <div class="alert alert-info small mt-3 mb-0 border-0 shadow-sm text-center">
                                <i class="fas fa-clock me-1"></i> لمزيد من التفاصيل الدقيقة حول الجلسات والدفعات، يرجى التواصل مع مكتب المحاماة.
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            container.innerHTML = html;
        }

        // طلب إدخال الـ PIN
        function requestPin(index) {
            currentSelectedCaseIndex = index;
            document.getElementById('pin-input').value = '';
            document.getElementById('pin-error').classList.add('d-none');
            pinModal.show();
        }

        function closePinModal() {
            pinModal.hide();
        }

        // التحقق من الـ PIN وفتح التفاصيل
        function verifyPin() {
            const pin = document.getElementById('pin-input').value;
            
            // محاكاة التحقق من الـ PIN (في هذه النسخة يتم قبول أي رمز مكون من 4 أرقام فأكثر لفتح الواجهة كحماية للخصوصية على جهاز الموكل)
            if (pin.length >= 4) {
                pinModal.hide();
                
                // إخفاء زر الفتح
                document.getElementById(`btn-unlock-${currentSelectedCaseIndex}`).classList.add('d-none');
                
                // إظهار التفاصيل بشفافية وتأثير مرئي
                const detailsDiv = document.getElementById(`case-details-${currentSelectedCaseIndex}`);
                if(detailsDiv) {
                    detailsDiv.classList.remove('d-none');
                }
            } else {
                document.getElementById('pin-error').classList.remove('d-none');
            }
        }
    </script>
    
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</body>
</html>
