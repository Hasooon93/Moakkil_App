<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#0a192f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>موكّل | متابعة قضيتي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy: #0a192f; 
            --accent: #64ffda; 
            --success: #4caf50;
            --danger: #f44336;
            --warning: #ff9800;
            --info: #2196f3;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ====== Header ====== */
        .client-header {
            background: linear-gradient(135deg, var(--navy) 0%, #1a3a5a 100%);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            border-bottom: 4px solid var(--accent);
        }

        .client-header h1 {
            font-weight: 800;
            font-size: 1.5rem;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* ====== Main Content ====== */
        .main-content {
            flex: 1;
            padding: 20px 15px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        /* ====== Login Step ====== */
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: var(--shadow);
            text-align: center;
            animation: fadeIn 0.5s;
        }

        .login-icon {
            font-size: 3.5rem;
            color: var(--navy);
            margin-bottom: 20px;
        }

        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 12px 15px;
            font-size: 1rem;
            margin-bottom: 15px;
            transition: all 0.3s;
            text-align: center;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(100,255,218,0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #52e5b8 100%);
            color: var(--navy);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.3s;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        /* ====== Case View Step ====== */
        .case-header-card {
            background: white;
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-top: 5px solid var(--accent);
        }

        .case-title {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .client-name {
            font-size: 1.6rem;
            color: var(--navy);
            font-weight: 800;
            margin-bottom: 20px;
        }

        /* ====== Info Grid ====== */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            text-align: right;
        }

        .info-box {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }

        .info-box.full-width {
            grid-column: span 2;
        }

        .info-label {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--navy);
        }

        .info-value.highlight {
            color: var(--danger);
            font-size: 1.1rem;
        }

        /* ====== Timeline ====== */
        .timeline-container {
            background: white;
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: var(--shadow);
        }

        .timeline-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .timeline-item {
            position: relative;
            padding-right: 30px;
            padding-bottom: 20px;
            border-right: 2px solid #e9ecef;
        }

        .timeline-item:last-child {
            border-right: none;
            padding-bottom: 0;
        }

        .timeline-icon {
            position: absolute;
            right: -16px;
            top: 0;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.9rem;
            box-shadow: 0 0 0 4px white;
        }

        .timeline-content {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .log-title {
            font-weight: 800;
            color: var(--navy);
            font-size: 1.05rem;
        }

        .log-date {
            font-size: 0.8rem;
            color: #999;
            font-weight: 600;
        }

        .log-details {
            font-size: 0.9rem;
            color: #555;
            line-height: 1.6;
        }

        .log-financial {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        /* ====== Utilities ====== */
        .d-none { display: none !important; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-spinner {
            display: inline-block;
            width: 1.5rem;
            height: 1.5rem;
            border: 3px solid rgba(10, 25, 47, 0.3);
            border-radius: 50%;
            border-top-color: var(--navy);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="client-header">
        <h1><i class="fas fa-balance-scale"></i> موكّل</h1>
        <p class="mb-0 mt-2" style="font-size: 0.9rem; opacity: 0.9;">بوابة متابعة القضايا للموكلين</p>
    </div>

    <div class="main-content">
        
        <div id="alertBox" class="alert d-none text-center" style="border-radius: 12px; font-weight: 700;"></div>

        <div id="loginStep" class="login-card">
            <div class="login-icon">
                <i class="fas fa-search-location"></i>
            </div>
            <h3 class="mb-2 fw-bold" style="color: var(--navy);">استعلام عن قضية</h3>
            <p class="text-muted mb-4 small">أدخل رقم الملف والرمز السري (PIN) الخاص بك للوصول إلى التحديثات</p>
            
            <form id="accessForm" onsubmit="event.preventDefault(); fetchCaseData();">
                <input type="text" id="caseId" class="form-control" placeholder="رقم الملف (مثال: 123/2026)" required>
                <input type="password" id="accessPin" class="form-control" placeholder="الرمز السري (PIN)" pattern="[0-9]*" inputmode="numeric" required>
                <button type="submit" class="btn btn-primary mt-2" id="submitBtn">
                    <span>عرض التفاصيل</span>
                </button>
            </form>
        </div>

        <div id="detailsStep" class="d-none">
            
            <div class="case-header-card">
                <div class="case-title">ملف رقم: <span id="v_case_id" class="text-primary fw-bold"></span></div>
                <div class="client-name" id="v_client_name"></div>
                
                <div class="info-grid">
                    <div class="info-box">
                        <div class="info-label"><i class="fas fa-info-circle text-info"></i> حالة الملف</div>
                        <div class="info-value" id="v_status"></div>
                    </div>
                    <div class="info-box">
                        <div class="info-label"><i class="fas fa-layer-group text-warning"></i> المرحلة الحالية</div>
                        <div class="info-value" id="v_stage"></div>
                    </div>
                    <div class="info-box full-width">
                        <div class="info-label"><i class="fas fa-tags text-secondary"></i> نوع الدعوى</div>
                        <div class="info-value" id="v_type"></div>
                    </div>
                    <div class="info-box">
                        <div class="info-label"><i class="fas fa-landmark text-primary"></i> المحكمة</div>
                        <div class="info-value" id="v_court"></div>
                    </div>
                    <div class="info-box">
                        <div class="info-label"><i class="fas fa-gavel text-navy"></i> القاضي</div>
                        <div class="info-value" id="v_judge"></div>
                    </div>
                    <div class="info-box full-width" style="background: #fff5f5; border-color: #ffdce0;">
                        <div class="info-label"><i class="fas fa-calendar-alt text-danger"></i> موعد الجلسة القادمة</div>
                        <div class="info-value highlight" id="v_next_hearing"></div>
                    </div>
                </div>
                
                <button class="btn btn-outline-secondary btn-sm mt-3 w-100 rounded-pill fw-bold" onclick="logout()">
                    <i class="fas fa-sign-out-alt me-1"></i> خروج
                </button>
            </div>

            <div class="timeline-container">
                <div class="timeline-title">
                    <i class="fas fa-history text-accent"></i> السجل الإجرائي
                </div>
                <div id="timelineList"></div>
            </div>

        </div>
    </div>

    <script>
        const API = 'https://curly-pond-9975.hassan-alsakka.workers.dev';

        // Auto-fill from URL parameters if available
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const cid = urlParams.get('id');
            const pin = urlParams.get('pin');
            
            if (cid) document.getElementById('caseId').value = cid;
            if (pin) document.getElementById('accessPin').value = pin;
            
            if (cid && pin) {
                fetchCaseData();
            }
        };

        // ===== Fetch Case Data =====
        async function fetchCaseData() {
            const caseId = document.getElementById('caseId').value.trim();
            const pin = document.getElementById('accessPin').value.trim();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;

            if (!caseId || !pin) return;

            // Loading state
            btn.innerHTML = '<div class="loading-spinner"></div>';
            btn.disabled = true;
            hideAlert();

            try {
                const res = await fetch(`${API}/client/access`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ case_id: caseId, pin: pin })
                });

                if (res.ok) {
                    const data = await res.json();
                    renderCaseDetails(data.case, data.updates);
                } else {
                    showAlert('رقم الملف أو الرمز السري غير صحيح.', 'danger');
                }
            } catch (e) {
                showAlert('حدث خطأ في الاتصال بالسيرفر. حاول مرة أخرى.', 'danger');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // ===== Render Data =====
        function renderCaseDetails(caseData, updates) {
            // Hide login, show details
            document.getElementById('loginStep').classList.add('d-none');
            document.getElementById('detailsStep').classList.remove('d-none');
            window.scrollTo(0, 0);

            // Populate Info
            document.getElementById('v_case_id').innerText = caseData.case_internal_id;
            document.getElementById('v_client_name').innerText = caseData.client_name;
            
            // Status translation
            const statusMap = { 'active': 'نشط', 'closed': 'مغلق', 'pending': 'معلق' };
            document.getElementById('v_status').innerText = statusMap[caseData.case_status] || caseData.case_status;
            
            document.getElementById('v_stage').innerText = caseData.case_stage || 'قيد المتابعة';
            document.getElementById('v_type').innerText = caseData.case_type || 'غير مصنف';
            document.getElementById('v_court').innerText = caseData.current_court || 'غير محدد';
            document.getElementById('v_judge').innerText = caseData.current_judge || 'غير محدد';
            
            if (caseData.next_hearing_date) {
                document.getElementById('v_next_hearing').innerText = formatDate(caseData.next_hearing_date);
            } else {
                document.getElementById('v_next_hearing').innerText = 'غير محدد حالياً';
                document.getElementById('v_next_hearing').classList.remove('highlight');
                document.getElementById('v_next_hearing').style.color = '#666';
            }

            // Render Timeline
            const timelineContainer = document.getElementById('timelineList');
            timelineContainer.innerHTML = '';

            if (!updates || updates.length === 0) {
                timelineContainer.innerHTML = '<p class="text-center text-muted py-4">لا توجد تحديثات مسجلة حتى الآن.</p>';
                return;
            }

            updates.forEach(log => {
                // Determine icon and color based on type
                let icon = 'fa-check';
                let color = 'var(--navy)';
                let bgClass = '';

                if (log.update_type === 'hearing') {
                    icon = 'fa-gavel'; color = 'var(--info)';
                } else if (log.update_type === 'admin') {
                    icon = 'fa-file-alt'; color = 'var(--warning)';
                } else if (log.update_type === 'payment_in') {
                    icon = 'fa-money-bill-wave'; color = 'var(--success)'; bgClass = 'bg-success text-white';
                } else if (log.update_type === 'payment_out') {
                    icon = 'fa-file-invoice-dollar'; color = 'var(--danger)'; bgClass = 'bg-danger text-white';
                }

                // Format Details (Smart Updates Support)
                const formattedDetails = log.details ? log.details.replace(/\n/g, '<br>') : '';

                // Build HTML
                let html = `
                    <div class="timeline-item">
                        <div class="timeline-icon" style="background-color: ${color};">
                            <i class="fas ${icon}"></i>
                        </div>
                        <div class="timeline-content">
                            <div class="log-header">
                                <div class="log-title">${log.title || 'تحديث'}</div>
                                <div class="log-date">${formatDateTime(log.timestamp)}</div>
                            </div>
                            ${formattedDetails ? `<div class="log-details mt-2">${formattedDetails}</div>` : ''}
                `;

                // Add Financial Badges if exist
                if (log.financial_in > 0 || log.financial_out > 0) {
                    html += `<div class="log-financial">`;
                    if (log.financial_in > 0) html += `<span class="badge bg-success px-2 py-1">دفعة مقبوضة: ${log.financial_in}</span>`;
                    if (log.financial_out > 0) html += `<span class="badge bg-danger px-2 py-1">رسوم مدفوعة: ${log.financial_out}</span>`;
                    html += `</div>`;
                }

                html += `</div></div>`;
                timelineContainer.innerHTML += html;
            });
        }

        // ===== Utilities =====
        function showAlert(msg, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `alert alert-${type} mt-3`;
            alertBox.innerText = msg;
            alertBox.classList.remove('d-none');
        }

        function hideAlert() {
            document.getElementById('alertBox').classList.add('d-none');
        }

        function logout() {
            // Reset form and UI
            document.getElementById('caseId').value = '';
            document.getElementById('accessPin').value = '';
            document.getElementById('detailsStep').classList.add('d-none');
            document.getElementById('loginStep').classList.remove('d-none');
            hideAlert();
            
            // Remove URL params cleanly
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dateStr).toLocaleDateString('ar-JO', options);
        }

        function formatDateTime(dateStr) {
            if (!dateStr) return '';
            const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            return new Date(dateStr).toLocaleDateString('ar-JO', options);
        }
    </script>
</body>
</html>
