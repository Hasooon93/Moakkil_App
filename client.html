<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#0a192f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>موكّل | متابعة قضيتي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy: #0a192f; 
            --accent: #64ffda; 
            --success: #4caf50;
            --danger: #f44336;
            --warning: #ff9800;
            --info: #2196f3;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #f5f7fa;
            padding-bottom: 40px;
        }
        
        /* ====== Header ====== */
        .header-section {
            background: linear-gradient(135deg, var(--navy) 0%, #1a3a5a 100%);
            color: white;
            padding: 40px 20px 60px 20px;
            border-radius: 0 0 35px 35px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }
        
        .header-section::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(100,255,218,0.1) 0%, transparent 70%);
            top: -50%;
            left: -50%;
            animation: pulse 15s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .header-content {
            position: relative;
            z-index: 1;
        }
        
        .logo-client {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .logo-client i {
            color: var(--accent);
            font-size: 2.2rem;
        }
        
        .header-subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 0.95rem;
            font-weight: 600;
        }
        
        /* ====== Main Container ====== */
        .main-container {
            padding: 0 15px;
            margin-top: -40px;
            position: relative;
            z-index: 10;
        }
        
        /* ====== Case Card ====== */
        .case-info-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .case-info-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--accent) 0%, #52e5b8 100%);
        }
        
        .case-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .case-number {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .case-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 5px;
        }
        
        .client-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #555;
        }
        
        .status-badge {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            color: #2e7d32;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .status-badge.closed {
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            color: #757575;
        }
        
        .case-info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .info-item {
            text-align: center;
            padding: 15px;
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }
        
        .info-label {
            font-size: 0.75rem;
            color: #999;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .info-value {
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--navy);
            word-break: break-word;
        }
        
        .info-value.highlight {
            color: var(--danger);
        }
        
        /* ====== Section Card ====== */
        .section-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        
        .section-header {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-header i {
            color: var(--accent);
            font-size: 1.3rem;
        }
        
        /* ====== Timeline ====== */
        .timeline {
            position: relative;
        }
        
        .timeline-item {
            position: relative;
            padding-right: 35px;
            padding-bottom: 30px;
            border-right: 3px solid #e9ecef;
        }
        
        .timeline-item:last-child {
            border-right: none;
            padding-bottom: 0;
        }
        
        .timeline-icon {
            position: absolute;
            right: -14px;
            top: 0;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--navy);
            font-size: 0.7rem;
            box-shadow: 0 0 0 5px white;
            font-weight: 800;
        }
        
        .timeline-icon.hearing {
            background: var(--info);
            color: white;
        }
        
        .timeline-icon.payment {
            background: var(--success);
            color: white;
        }
        
        .timeline-icon.admin {
            background: var(--warning);
            color: white;
        }
        
        .timeline-content {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            position: relative;
        }
        
        .timeline-date {
            font-size: 0.75rem;
            color: #999;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .timeline-title {
            font-size: 1rem;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 8px;
        }
        
        .timeline-details {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.6;
        }
        
        /* ====== Empty State ====== */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #999;
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        
        .empty-state p {
            font-size: 1rem;
            font-weight: 600;
        }
        
        /* ====== Loading ====== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--navy) 0%, #1a3a5a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .loading-logo {
            color: var(--accent);
            font-size: 3rem;
            margin-bottom: 30px;
            animation: bounce 1.5s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .spinner {
            border: 4px solid rgba(100,255,218,0.2);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: white;
            margin-top: 20px;
            font-size: 0.95rem;
            font-weight: 600;
        }
        
        /* ====== Error State ====== */
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--navy) 0%, #1a3a5a 100%);
        }
        
        .error-card {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .error-icon {
            font-size: 4rem;
            color: var(--danger);
            margin-bottom: 20px;
        }
        
        .error-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 15px;
        }
        
        .error-message {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.6;
        }
        
        /* ====== Footer ====== */
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: #999;
            font-size: 0.85rem;
        }
        
        .footer-logo {
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 5px;
        }
        
        /* ====== Responsive ====== */
        @media (max-width: 576px) {
            .case-info-grid {
                grid-template-columns: 1fr;
            }
            
            .info-item {
                text-align: right;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            
            .info-label {
                margin-bottom: 0;
            }
        }
        
        @media (min-width: 768px) {
            .main-container {
                max-width: 800px;
                margin-left: auto;
                margin-right: auto;
            }
        }
    </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading" class="loading-screen">
    <div class="loading-logo">
        <i class="fas fa-balance-scale"></i>
    </div>
    <div class="spinner"></div>
    <p class="loading-text">جاري تحميل بيانات القضية...</p>
</div>

<!-- Main Content -->
<div id="content" class="d-none">
    <!-- Header -->
    <div class="header-section">
        <div class="header-content">
            <div class="logo-client">
                <i class="fas fa-balance-scale"></i>
                موكّل
            </div>
            <p class="header-subtitle">بوابة الموكل الآمنة</p>
        </div>
    </div>
    
    <!-- Main Container -->
    <div class="main-container">
        
        <!-- Case Info Card -->
        <div class="case-info-card">
            <div class="case-header">
                <div>
                    <div class="case-number">رقم الملف</div>
                    <h1 class="case-title" id="caseId">...</h1>
                    <div class="client-name" id="clientName">...</div>
                </div>
                <div>
                    <div class="status-badge" id="statusBadge">نشطة</div>
                </div>
            </div>
            
            <div class="case-info-grid">
                <div class="info-item">
                    <div class="info-label">المحكمة</div>
                    <div class="info-value" id="courtName">...</div>
                </div>
                <div class="info-item">
                    <div class="info-label">المرحلة</div>
                    <div class="info-value" id="caseStage">...</div>
                </div>
                <div class="info-item">
                    <div class="info-label">الجلسة القادمة</div>
                    <div class="info-value highlight" id="nextDate">...</div>
                </div>
            </div>
        </div>
        
        <!-- Timeline Section -->
        <div class="section-card">
            <h2 class="section-header">
                <i class="fas fa-history"></i>
                سجل التحديثات والأحداث
            </h2>
            <div id="timeline" class="timeline"></div>
        </div>
        
    </div>
    
    <!-- Footer -->
    <div class="footer">
        <div class="footer-logo">موكّل</div>
        <div>نظام إدارة مكاتب المحاماة © 2026</div>
        <div class="mt-2">
            <i class="fas fa-shield-alt text-success me-1"></i>
            نظام آمن ومشفّر
        </div>
    </div>
</div>

<script>
    const API = 'https://curly-pond-9975.hassan-alsakka.workers.dev';
    
    // ===== Initialize =====
    window.onload = async () => {
        // Get parameters from URL
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const pin = params.get('pin');
        
        // Validate parameters
        if (!id || !pin) {
            showError(
                'رابط غير صالح',
                'يرجى طلب الرابط الصحيح من المحامي المسؤول عن قضيتك.'
            );
            return;
        }
        
        try {
            // Fetch case data
            const res = await fetch(`${API}/client/access`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    case_id: id, 
                    pin: pin 
                })
            });
            
            if (!res.ok) {
                throw new Error('بيانات الدخول غير صحيحة');
            }
            
            const data = await res.json();
            
            // Render page
            renderPage(data.case, data.updates);
            
        } catch (e) {
            console.error('Error:', e);
            showError(
                'عذراً، لا يمكن الوصول للملف',
                'تأكد من صحة الرابط أو تواصل مع المكتب. قد يكون الرابط منتهي الصلاحية أو غير صحيح.'
            );
        }
    };
    
    // ===== Render Page =====
    function renderPage(caseData, updates) {
        // Hide loading
        document.getElementById('loading').classList.add('d-none');
        document.getElementById('content').classList.remove('d-none');
        
        // Case Info
        document.getElementById('caseId').innerText = caseData.case_internal_id;
        document.getElementById('clientName').innerText = caseData.client_name;
        
        // Status Badge
        const statusBadge = document.getElementById('statusBadge');
        if (caseData.case_status === 'active') {
            statusBadge.innerText = '✓ قيد المتابعة';
            statusBadge.classList.remove('closed');
        } else if (caseData.case_status === 'closed') {
            statusBadge.innerText = '✓ مغلقة';
            statusBadge.classList.add('closed');
        } else {
            statusBadge.innerText = caseData.case_status || 'نشطة';
        }
        
        // Case Details
        document.getElementById('courtName').innerText = caseData.current_court || 'غير محدد';
        document.getElementById('caseStage').innerText = caseData.case_stage || 'جديد';
        
        // Next Hearing
        if (caseData.next_hearing_date) {
            const hearingDate = new Date(caseData.next_hearing_date);
            document.getElementById('nextDate').innerText = formatDate(hearingDate);
        } else {
            document.getElementById('nextDate').innerText = 'سيحدد لاحقاً';
            document.getElementById('nextDate').classList.remove('highlight');
        }
        
        // Timeline
        renderTimeline(updates);
    }
    
    // ===== Render Timeline =====
    function renderTimeline(updates) {
        const timeline = document.getElementById('timeline');
        timeline.innerHTML = '';
        
        if (updates.length === 0) {
            timeline.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <p>لا توجد تحديثات مسجلة بعد</p>
                    <small class="text-muted">سيتم إضافة التحديثات تلقائياً عند حدوثها</small>
                </div>
            `;
            return;
        }
        
        updates.forEach(update => {
            // Determine icon type
            let iconClass = 'fas fa-circle';
            let iconType = '';
            
            if (update.update_type === 'hearing') {
                iconClass = 'fas fa-gavel';
                iconType = 'hearing';
            } else if (update.update_type === 'payment_in') {
                iconClass = 'fas fa-money-bill-wave';
                iconType = 'payment';
            } else if (update.update_type === 'admin') {
                iconClass = 'fas fa-file-alt';
                iconType = 'admin';
            }
            
            // Get title
            const title = update.title || getTitleByType(update.update_type);
            
            // Create timeline item
            const item = document.createElement('div');
            item.className = 'timeline-item';
            item.innerHTML = `
                <div class="timeline-icon ${iconType}">
                    <i class="${iconClass}"></i>
                </div>
                <div class="timeline-content">
                    <div class="timeline-date">${formatDateTime(update.timestamp)}</div>
                    <div class="timeline-title">${title}</div>
                    ${update.details ? `<div class="timeline-details">${update.details}</div>` : ''}
                </div>
            `;
            
            timeline.appendChild(item);
        });
    }
    
    // ===== Get Title By Type =====
    function getTitleByType(type) {
        const titles = {
            'hearing': '📋 جلسة محكمة',
            'admin': '📄 إجراء إداري',
            'payment_in': '💰 دفعة مالية',
            'payment_out': '💸 رسوم ومصاريف'
        };
        return titles[type] || 'تحديث';
    }
    
    // ===== Show Error =====
    function showError(title, message) {
        document.getElementById('loading').classList.add('d-none');
        document.body.innerHTML = `
            <div class="error-container">
                <div class="error-card">
                    <div class="error-icon">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <h2 class="error-title">${title}</h2>
                    <p class="error-message">${message}</p>
                </div>
            </div>
        `;
    }
    
    // ===== Format Date =====
    function formatDate(date) {
        return date.toLocaleDateString('ar-JO', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
    }
    
    // ===== Format DateTime =====
    function formatDateTime(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString('ar-JO', {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
    }
</script>

</body>
</html>
