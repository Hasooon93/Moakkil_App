<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة الموكل | موكّل</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        
        :root { 
            --navy: #0a192f; 
            --accent: #64ffda; 
            --bg-light: #f4f7f9; 
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg-light); 
            min-height: 100vh;
            padding-bottom: 50px; 
        }
        
        .top-nav { 
            background: var(--navy); 
            color: white; 
            padding: 20px 15px; 
            text-align: center; 
            border-bottom-left-radius: 25px; 
            border-bottom-right-radius: 25px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        
        .card-custom { 
            background: white; 
            border-radius: 15px; 
            padding: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); 
            border: 1px solid #eef2f6; 
            margin-bottom: 15px; 
        }
        
        .btn-custom { 
            background: var(--navy); 
            color: white; 
            border-radius: 12px; 
            font-weight: 700; 
            padding: 10px; 
        }
        .btn-custom:hover { background: #1a3a5a; color: var(--accent); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="top-nav">
        <h4 class="mb-0 fw-bold"><i class="fas fa-balance-scale text-accent me-2"></i> نظام موكّل</h4>
        <p class="text-white-50 small mb-0 mt-1">البوابة الإلكترونية الموحدة للموكلين</p>
    </div>

    <div class="container mt-4" id="main-container">
        <div class="text-center p-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-muted fw-bold">جاري تأمين الاتصال وتحميل بياناتك...</p>
        </div>
    </div>

    <div class="modal fade" id="pinModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-body text-center p-4">
                    <div class="bg-light rounded-circle d-inline-block p-3 mb-3">
                        <i class="fas fa-user-shield fs-1 text-warning"></i>
                    </div>
                    <h5 class="fw-bold text-navy mb-2">حماية الخصوصية</h5>
                    <p class="text-muted small mb-3">الرجاء إدخال الرمز السري (PIN) المخصص لهذه القضية لعرض التفاصيل.</p>
                    
                    <input type="password" id="pin-input" class="form-control text-center fs-3 fw-bold mb-3 py-2" placeholder="****" style="letter-spacing: 10px; border-radius: 15px;">
                    
                    <button class="btn btn-custom w-100 mb-2" onclick="verifyPin()">فتح الملف الآمن</button>
                    
                    <p id="pin-error" class="text-danger small mt-2 fw-bold d-none"><i class="fas fa-exclamation-triangle me-1"></i> الرمز السري غير صحيح.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/config.js"></script>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const publicToken = urlParams.get('token');
        
        let fetchedData = null;
        let pinModal;

        window.onload = async () => {
            pinModal = new bootstrap.Modal(document.getElementById('pinModal'));

            if (!publicToken) {
                document.getElementById('main-container').innerHTML = `
                    <div class="alert alert-danger text-center rounded-4 shadow-sm p-4">
                        <i class="fas fa-link-slash fs-1 mb-2"></i><br>
                        <b>الرابط غير صالح!</b><br>يرجى طلب الرابط الصحيح من مكتب المحاماة.
                    </div>`;
                return;
            }

            try {
                const res = await fetch(`${CONFIG.API_URL}/api/public/client?token=${publicToken}`);
                const data = await res.json();

                if (!res.ok) throw new Error(data.error || 'خطأ في جلب البيانات');

                fetchedData = data;
                renderBaseUI();
            } catch (err) {
                document.getElementById('main-container').innerHTML = `
                    <div class="alert alert-danger text-center rounded-4 shadow-sm p-4">
                        <i class="fas fa-exclamation-circle fs-1 mb-2"></i><br>
                        <b>عذراً،</b> ${err.message}
                    </div>`;
            }
        };

        function renderBaseUI() {
            const client = fetchedData.client;
            const c = fetchedData.cases[0];
            const container = document.getElementById('main-container');
            
            let html = `
                <div class="card-custom text-center mb-4" style="background: linear-gradient(135deg, var(--navy) 0%, #1a3a5a 100%); color: white; border:none;">
                    <h6 class="text-accent mb-1 small">بوابة الموكل المؤمنة لـ:</h6>
                    <h4 class="fw-bold mb-0">${client.full_name}</h4>
                </div>
                
                <h6 class="fw-bold text-navy mb-3 px-2"><i class="fas fa-folder-open me-2 text-warning"></i> ملخص القضية</h6>
                
                <div class="card-custom">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="fw-bold text-navy mb-0">رقم الملف: ${c.case_internal_id}</h6>
                        <span class="badge ${c.status === 'نشطة' ? 'bg-success' : 'bg-secondary'}">${c.status}</span>
                    </div>
                    
                    <button class="btn btn-outline-primary btn-sm w-100 fw-bold mt-3" onclick="requestPin()" id="btn-unlock">
                        <i class="fas fa-lock me-1"></i> فك التشفير وعرض المستندات والسجلات
                    </button>
                    
                    <div id="case-details" class="mt-3 pt-3 border-top d-none" style="animation: fadeIn 0.5s;">
                        </div>
                </div>
            `;
            container.innerHTML = html;
        }

        function requestPin() {
            document.getElementById('pin-input').value = '';
            document.getElementById('pin-error').classList.add('d-none');
            pinModal.show();
        }

        function verifyPin() {
            const pinInput = document.getElementById('pin-input').value;
            const actualPin = fetchedData.cases[0].access_pin;

            // التحقق من الرقم السري
            if (pinInput === actualPin || (actualPin == null && pinInput.length > 0)) {
                pinModal.hide();
                document.getElementById('btn-unlock').classList.add('d-none');
                renderFullDetails();
            } else {
                document.getElementById('pin-error').classList.remove('d-none');
            }
        }

        function renderFullDetails() {
            const c = fetchedData.cases[0];
            const updates = fetchedData.updates;
            const files = fetchedData.files;
            const installments = fetchedData.installments;

            const detailsDiv = document.getElementById('case-details');
            detailsDiv.classList.remove('d-none');

            // 1. حساب الملخص المالي
            let totalAgreed = Number(c.total_agreed_fees) || 0;
            let totalPaid = installments.filter(i => i.status === 'مدفوعة').reduce((sum, i) => sum + Number(i.amount), 0);
            let totalRemaining = totalAgreed - totalPaid;

            // 2. تجهيز HTML الوقائع (Timeline)
            let updatesHtml = updates.length > 0 ? updates.map(u => `
                <div class="p-3 mb-2 bg-light rounded-3 border-start border-4 border-info shadow-sm">
                    <small class="text-primary fw-bold">${new Date(u.created_at).toLocaleDateString('ar-EG')}</small>
                    <h6 class="fw-bold text-navy mt-1 mb-1">${u.update_title}</h6>
                    <p class="small text-muted mb-0">${u.update_details}</p>
                    ${u.hearing_date ? `<small class="text-success mt-1 d-block fw-bold"><i class="fas fa-calendar-check"></i> الجلسة: ${u.hearing_date}</small>` : ''}
                </div>
            `).join('') : '<div class="alert alert-secondary small text-center">لا توجد وقائع مسجلة حالياً.</div>';

            // 3. تجهيز HTML الملفات
            let filesHtml = files.length > 0 ? files.map(f => `
                <div class="col-6">
                    <a href="${f.drive_file_id}" target="_blank" class="text-decoration-none">
                        <div class="p-2 border rounded-3 bg-light text-center h-100 shadow-sm transition">
                            <i class="fas ${f.file_type && f.file_type.includes('image') ? 'fa-image text-primary' : 'fa-file-pdf text-danger'} fs-3 mb-2"></i>
                            <h6 class="small fw-bold text-dark text-truncate mb-0" title="${f.file_name}">${f.file_name}</h6>
                        </div>
                    </a>
                </div>
            `).join('') : '<div class="col-12"><div class="alert alert-secondary small text-center">لا توجد ملفات مرفوعة.</div></div>';

            // دمج كل شيء في الواجهة
            detailsDiv.innerHTML = `
                <div class="row g-2 text-center mb-4">
                    <div class="col-6">
                        <div class="bg-light p-2 rounded-3 border h-100 shadow-sm">
                            <small class="text-muted d-block mb-1"><i class="fas fa-balance-scale"></i> المحكمة</small>
                            <b class="text-navy small">${c.current_court || 'قيد المتابعة'}</b>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="bg-light p-2 rounded-3 border h-100 shadow-sm">
                            <small class="text-muted d-block mb-1"><i class="fas fa-money-bill-wave"></i> المتبقي من الأتعاب</small>
                            <b class="text-danger small">${totalRemaining.toLocaleString()} د.أ</b>
                        </div>
                    </div>
                </div>

                <h6 class="fw-bold text-navy mt-4 mb-2"><i class="fas fa-stream me-2"></i> سجل الوقائع والجلسات</h6>
                <div class="text-start mb-4">
                    ${updatesHtml}
                </div>

                <h6 class="fw-bold text-navy mt-4 mb-2"><i class="fas fa-file-pdf me-2"></i> ملفات ومستندات القضية</h6>
                <div class="row g-2 mb-2">
                    ${filesHtml}
                </div>
            `;
        }
    </script>
</body>
</html>
