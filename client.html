<body class="bg-light text-center p-4">
    <h2 id="c-name">مرحباً</h2>
    <div id="c-cases" class="mt-4"></div>
    <script src="./js/config.js"></script>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        fetch(`${CONFIG.API_URL}/api/public/client?id=${id}`).then(r => r.json()).then(d => {
            document.getElementById('c-name').innerText = d.client.full_name;
            document.getElementById('c-cases').innerHTML = d.cases.map(c => `<div class="card p-3 mb-2">${c.case_internal_id} - ${c.status}</div>`).join('');
        });
    </script>
</body>
