<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- ========================================================
         [1] إعدادات الصفحة والروابط الخارجية (Meta & Links)
         ======================================================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0B132B">
    <title>دخول نظام موكّل 4.0 | Enterprise Security</title>
    
    <!-- أيقونات المتصفح وتطبيقات الويب (PWA) -->
    <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg4PE-keniz_4Af49kFkt6o_JmNj4K1yDZpdoDpXtzZcw6Zylh6l3MKyG186d2NmFov_1xIZ8qhXY136PeE5OpQlWQgR45YFvKo9MdMlL6K0rE-IqIyiMINdIrAynb44a2V_177s_xcULbLfMWgLuXJP4-uQ8zx3V-Cl3HNwXucegTli7-sDlUnAIGS__M/s320/icon-512.png.png">
    <link rel="apple-touch-icon" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg4PE-keniz_4Af49kFkt6o_JmNj4K1yDZpdoDpXtzZcw6Zylh6l3MKyG186d2NmFov_1xIZ8qhXY136PeE5OpQlWQgR45YFvKo9MdMlL6K0rE-IqIyiMINdIrAynb44a2V_177s_xcULbLfMWgLuXJP4-uQ8zx3V-Cl3HNwXucegTli7-sDlUnAIGS__M/s320/icon-512.png.png">

    <!-- المكتبات المساعدة -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <!-- ========================================================
         [2] التصميم المعماري والأمني (CSS Architecture)
         ======================================================== -->
    <style>
        /* --- المتغيرات اللونية: فخامة الأزرق الملكي والذهبي --- */
        :root { 
            --primary-dark: #0B132B; 
            --primary-light: #1C2541;
            --gold-luxury: #D4AF37;
            --gold-hover: #b5952f;
            --light-bg: #F8F9FA;
            --text-dark: #2B2D42;
            --telegram: #0088cc;
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-light) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            position: relative;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- أشكال هندسية عائمة (أجواء سيبرانية) --- */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(70px);
            z-index: 0;
            animation: floatOrb 12s infinite alternate ease-in-out;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(212, 175, 55, 0.15); top: -80px; right: -80px; }
        .orb-2 { width: 500px; height: 500px; background: rgba(28, 37, 65, 0.9); bottom: -150px; left: -150px; animation-delay: -6s;}

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 50px) scale(1.05); }
        }

        /* --- الكارت الزجاجي الفاخر (Glassmorphism) --- */
        .login-card {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 28px;
            padding: 50px 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.8);
            border-left: 1px solid rgba(255, 255, 255, 0.8);
            position: relative;
            z-index: 10;
        }

        /* شارة الأمان */
        .secure-badge {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-dark);
            color: var(--gold-luxury);
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(11, 19, 43, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.5);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* --- الشعار الدائري --- */
        .logo-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            box-shadow: 0 12px 35px rgba(11, 19, 43, 0.4);
            border: 3px solid var(--gold-luxury);
            position: relative;
        }
        .logo-circle::after {
            content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%; border: 1px dashed rgba(212, 175, 55, 0.5); animation: spin 15s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- الحقول --- */
        .form-control {
            background: var(--light-bg);
            border: 2px solid #E2E8F0;
            border-radius: 16px;
            padding: 16px 20px;
            font-size: 1.15rem;
            font-weight: 800;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--primary-dark);
            text-align: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .form-control:focus {
            border-color: var(--gold-luxury);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15), inset 0 2px 4px rgba(0,0,0,0.02);
            background: #ffffff;
            outline: none;
        }

        /* حقل الـ OTP (تصميم الخزنة) */
        .otp-input {
            letter-spacing: 25px;
            font-size: 2.2rem;
            text-align: center;
            font-weight: 900;
            padding: 15px !important;
            color: var(--primary-dark);
            font-family: monospace;
            background: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(11, 19, 43, 0.05) 40px, rgba(11, 19, 43, 0.05) 42px);
        }

        /* --- الأزرار الأساسية --- */
        .btn-primary-custom {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            color: white;
            border-radius: 16px;
            padding: 16px;
            font-weight: 900;
            font-size: 1.15rem;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(11, 19, 43, 0.25);
        }

        .btn-primary-custom:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--primary-light), var(--primary-dark));
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(11, 19, 43, 0.35);
            border-color: var(--gold-luxury);
            color: var(--gold-luxury);
        }
        
        .btn-primary-custom:disabled {
            background: #94A3B8;
            cursor: not-allowed;
            opacity: 0.9;
            box-shadow: none;
            color: #f1f5f9;
        }

        /* --- صندوق تعليمات التيليغرام --- */
        .telegram-box {
            background: rgba(0, 136, 204, 0.04);
            border-radius: 16px;
            border: 1px dashed rgba(0, 136, 204, 0.4);
            padding: 18px 15px;
            margin-bottom: 25px;
            transition: 0.3s;
        }
        .telegram-box:hover {
            border-style: solid;
            background: rgba(0, 136, 204, 0.08);
            border-color: var(--telegram);
        }

        .telegram-link {
            color: var(--telegram);
            font-weight: 900;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 30px;
            background: rgba(0, 136, 204, 0.12);
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            margin-top: 5px;
        }

        .telegram-link:hover {
            background: var(--telegram);
            color: white;
            box-shadow: 0 8px 20px rgba(0, 136, 204, 0.35);
            transform: translateY(-2px);
        }

        /* --- زر البصمة الفاخر --- */
        .btn-bio {
            background-color: transparent;
            color: var(--primary-dark);
            border: 2px solid var(--primary-dark);
            border-radius: 16px;
            padding: 15px;
            font-weight: 900;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-bio:hover {
            background-color: var(--primary-dark);
            color: var(--gold-luxury);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(11, 19, 43, 0.2);
        }

        /* حركات الظهور */
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* توافقية الشاشات الصغيرة */
        @media (max-width: 480px) {
            .login-card { padding: 40px 25px; border-radius: 20px; }
            .logo-circle { width: 85px; height: 85px; }
            .otp-input { letter-spacing: 15px; font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- ========================================================
         [3] واجهة المستخدم (UI / HTML)
         ======================================================== -->

    <!-- مؤثرات الخلفية الأمنية -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <main class="login-card fade-in">
        
        <div class="secure-badge">
            <i class="fas fa-lock"></i> 256-BIT ENCRYPTED
        </div>

        <div class="text-center mb-4">
            <div class="logo-circle">
                <i class="fas fa-balance-scale fa-3x" style="color: var(--gold-luxury);"></i>
            </div>
            <h3 class="fw-bold mb-1" style="color: var(--primary-dark);">نظام موكّل <span style="color: var(--gold-luxury); font-size: 0.8em;">ERP</span></h3>
            <p class="text-muted small fw-bold"><i class="fas fa-shield-check text-success me-1"></i> تسجيل الدخول الآمن والموحد (SSO)</p>
        </div>

        <!-- الخطوة الأولى: إدخال الهاتف -->
        <form id="loginForm">
            <div class="mb-4">
                <label for="phoneInput" class="form-label fw-bold text-muted small">رقم الهاتف المسجل بالنظام <span class="text-danger">*</span></label>
                <input type="tel" id="phoneInput" class="form-control" placeholder="07xxxxxxxx" required autocomplete="tel" dir="ltr">
            </div>

            <div class="telegram-box text-center">
                <small class="text-muted fw-bold d-block mb-2" style="font-size: 0.85rem;">لتصلك رسالة الدخول المشفرة، يجب بدء المحادثة مع البوت:</small>
                <a href="https://t.me/Moakkil_bot" target="_blank" class="telegram-link">
                    <i class="fab fa-telegram fa-lg"></i> @Moakkil_bot
                </a>
            </div>

            <button type="submit" class="btn btn-primary-custom w-100 shadow-sm" id="btnRequestOtp">
                <i class="fas fa-paper-plane"></i> إرسال رمز التحقق
            </button>
            
            <!-- زر البصمة يظهر برمجياً إذا كان الجهاز مسجلاً -->
            <button type="button" class="btn btn-bio w-100 mt-3 d-none" id="btnBiometric" onclick="handleBiometricLogin()">
                <i class="fas fa-fingerprint me-2 fs-5"></i> الدخول السريع بالبصمة
            </button>
        </form>

        <!-- الخطوة الثانية: إدخال الكود (OTP) -->
        <form id="otpForm" class="d-none fade-in">
            <div class="mb-4">
                <label for="otpInput" class="form-label fw-bold text-muted text-center w-100 small">أدخل الرمز السري المرسل لتيليغرام <span class="text-danger">*</span></label>
                <input type="text" id="otpInput" class="form-control otp-input" placeholder="------" maxlength="6" required autocomplete="one-time-code" dir="ltr">
            </div>
            
            <button type="submit" class="btn btn-primary-custom w-100 shadow-sm mb-3" id="btnVerifyOtp">
                <i class="fas fa-shield-alt"></i> تأكيد الدخول
            </button>
            
            <button type="button" onclick="location.reload()" class="btn btn-link btn-sm w-100 text-decoration-none fw-bold" style="color: var(--text-muted); transition: 0.3s;">
                <i class="fas fa-redo-alt me-1"></i> العودة وتعديل رقم الهاتف
            </button>
        </form>
        
        <div class="text-center mt-4 pt-4 border-top" style="border-color: rgba(0,0,0,0.05) !important;">
            <a href="index.html" class="text-muted text-decoration-none small fw-bold" style="transition: 0.3s;">
                <i class="fas fa-arrow-right me-1"></i> العودة للرئيسية
            </a>
        </div>
    </main>

    <!-- ========================================================
         [4] المكتبات البرمجية والسكربتات
         ======================================================== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> 
    
    <!-- محركات النظام الأمنية -->
    <script src="./js/config.js?v=4.0"></script>
    <script src="./js/api.js?v=4.0"></script>
    <script src="./js/auth.js?v=4.0"></script> 
    
    <script>
        let currentPhone = '';
        const loginForm = document.getElementById('loginForm');
        const otpForm = document.getElementById('otpForm');
        const btnRequestOtp = document.getElementById('btnRequestOtp');
        const btnVerifyOtp = document.getElementById('btnVerifyOtp');

        // توليد معرّف الجهاز (Device ID) لربطه بالجلسة
        function initDeviceId() {
            if (!localStorage.getItem('moakkil_device_id')) {
                localStorage.setItem('moakkil_device_id', 'dev_' + crypto.randomUUID());
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            initDeviceId();
            
            try {
                // توافقية ذكية: سحب ألوان المكتب وتطبيقها (White-Labeling)
                const settings = JSON.parse(localStorage.getItem('firm_settings'));
                if (settings?.primary_color) {
                    document.documentElement.style.setProperty('--primary-dark', settings.primary_color);
                    document.documentElement.style.setProperty('--navy', settings.primary_color); // لدعم المتغيرات القديمة
                }
                if (settings?.accent_color) {
                    document.documentElement.style.setProperty('--gold-luxury', settings.accent_color);
                    document.documentElement.style.setProperty('--accent', settings.accent_color); // لدعم المتغيرات القديمة
                }
            } catch (e) {
                console.error("Theme Loading Error:", e);
            }

            // إظهار زر البصمة إذا كان الجهاز مسجلاً مسبقاً
            if (localStorage.getItem('moakkil_biometric_id')) {
                document.getElementById('btnBiometric').classList.remove('d-none');
            }
        });

        // ---------------------------------------------------------
        // 1. طلب الرمز السري (Request OTP)
        // ---------------------------------------------------------
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phoneInput').value.trim();
            if (!phone) return;

            btnRequestOtp.disabled = true;
            btnRequestOtp.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> جاري الاتصال الآمن...';

            try {
                await AUTH.requestOTP(phone);
                currentPhone = phone;
                
                // الانتقال للخطوة التالية بلمسة حركية
                loginForm.classList.add('d-none');
                otpForm.classList.remove('d-none');
                
                Swal.fire({
                    icon: 'success',
                    title: 'تم إرسال الرمز!',
                    text: 'تحقق من حسابك في تيليغرام الآن، الرمز صالح لعدة دقائق.',
                    confirmButtonColor: 'var(--primary-dark)',
                    timer: 3500,
                    timerProgressBar: true
                });
                
                setTimeout(() => document.getElementById('otpInput').focus(), 400);

            } catch (err) {
                Swal.fire({ 
                    icon: 'error', 
                    title: 'فشل الإرسال', 
                    text: err.message || 'حدث خطأ في النظام. تأكد من الرقم وصلاحية حسابك.', 
                    confirmButtonColor: 'var(--primary-dark)' 
                });
            } finally {
                btnRequestOtp.disabled = false;
                btnRequestOtp.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال رمز التحقق';
            }
        });

        // ---------------------------------------------------------
        // 2. التحقق من الرمز (Verify OTP)
        // ---------------------------------------------------------
        otpForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = document.getElementById('otpInput').value.trim();
            if (!otp) return;

            btnVerifyOtp.disabled = true;
            btnVerifyOtp.innerHTML = '<i class="fas fa-shield-alt fa-fade"></i> جاري المصادقة...';

            try {
                await AUTH.verifyOTP(currentPhone, otp);
                Swal.fire({
                    icon: 'success',
                    title: 'تمت المصادقة بنجاح',
                    text: 'جاري تشفير الجلسة والتوجيه للوحة التحكم...',
                    showConfirmButton: false,
                    timer: 1500
                });
                // الملاحظة: التوجيه الفعلي يتم داخل ملف auth.js بناءً على رد السيرفر
            } catch (err) {
                Swal.fire({ 
                    icon: 'error', 
                    title: 'رفض الوصول', 
                    text: err.message || 'الرمز غير صحيح أو انتهت صلاحيته.', 
                    confirmButtonColor: 'var(--primary-dark)' 
                });
                btnVerifyOtp.disabled = false;
                btnVerifyOtp.innerHTML = '<i class="fas fa-shield-alt"></i> تأكيد الدخول';
                document.getElementById('otpInput').value = ''; // تفريغ الحقل لتسهيل المحاولة مجدداً
            }
        });

        // ---------------------------------------------------------
        // 3. الدخول بالبصمة (Biometric Login / WebAuthn)
        // ---------------------------------------------------------
        async function handleBiometricLogin() {
            const btnBio = document.getElementById('btnBiometric');
            const originalContent = btnBio.innerHTML;
            
            btnBio.disabled = true;
            btnBio.innerHTML = '<i class="fas fa-fingerprint fa-fade me-2 fs-5"></i> جاري قراءة البصمة...';
            
            try {
                await AUTH.loginWithBiometric();
            } catch (err) {
                Swal.fire({ 
                    icon: 'error', 
                    title: 'فشل المطابقة', 
                    text: err.message || 'تعذر تسجيل الدخول بالبصمة. حاول استخدام رقم الهاتف.', 
                    confirmButtonColor: 'var(--primary-dark)' 
                });
            } finally {
                btnBio.disabled = false;
                btnBio.innerHTML = originalContent;
            }
        }
    </script>
</body>
</html>
