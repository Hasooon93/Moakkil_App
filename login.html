<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a192f">
    <title>دخول نظام موكّل 4.0 | Enterprise</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        :root { 
            --navy: #0a192f; 
            --accent: #64ffda; 
            --light-bg: #f8fafc; 
            --telegram: #0088cc;
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, var(--navy) 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo-circle {
            width: 90px;
            height: 90px;
            background: var(--navy);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 25px rgba(10, 25, 47, 0.3);
            border: 3px solid var(--accent);
        }

        .form-control {
            background: var(--light-bg);
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: var(--navy);
            box-shadow: 0 0 0 4px rgba(10, 25, 47, 0.1);
            background: #fff;
        }

        .btn-primary-custom {
            background: var(--navy);
            color: white;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s;
            border: none;
        }

        .btn-primary-custom:hover, .btn-primary-custom:active, .btn-primary-custom:focus {
            background: #1e3a8a;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(10, 25, 47, 0.2);
            color: white;
            outline: none;
        }
        
        .btn-primary-custom:disabled {
            background: #94a3b8;
            transform: none;
            cursor: not-allowed;
            box-shadow: none;
        }

        .otp-input {
            letter-spacing: 12px;
            font-size: 1.5rem;
            text-align: center;
            font-weight: 900;
        }

        .btn-back-home {
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-back-home:hover {
            color: var(--navy);
        }

        .telegram-box {
            background: rgba(0, 136, 204, 0.05);
            border-radius: 12px;
            border: 1px dashed rgba(0, 136, 204, 0.3);
            padding: 12px;
            transition: 0.3s;
        }
        
        .telegram-box:hover {
            background: rgba(0, 136, 204, 0.1);
            border-color: var(--telegram);
        }

        .telegram-link {
            color: var(--telegram);
            font-weight: 800;
            font-size: 0.95rem;
            text-decoration: none;
            padding: 6px 15px;
            border-radius: 20px;
            background: rgba(0, 136, 204, 0.1);
            transition: 0.3s;
        }

        .telegram-link:hover {
            background: var(--telegram);
            color: white;
            box-shadow: 0 4px 10px rgba(0, 136, 204, 0.3);
        }
        
        .btn-biometric-custom {
            background: transparent;
            color: var(--navy);
            border: 2px solid var(--navy);
            border-radius: 12px;
            padding: 10px;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn-biometric-custom:hover {
            background: var(--light-bg);
            color: var(--navy);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <div class="logo-circle">
                <i class="fas fa-balance-scale fa-3x" style="color: var(--accent);"></i>
            </div>
            <h3 class="fw-bold text-navy mb-1" style="color: var(--navy);">نظام موكّل</h3>
            <p class="text-muted small fw-bold">تسجيل الدخول الموحد (SSO)</p>
        </div>

        <form id="loginForm">
            <div class="mb-3 position-relative">
                <label for="phoneInput" class="form-label small fw-bold text-muted">رقم الهاتف <span class="text-danger">*</span></label>
                <input type="tel" id="phoneInput" class="form-control text-center" placeholder="أدخل رقم الهاتف المسجل بالنظام..." required autocomplete="tel" dir="ltr">
            </div>

            <div class="telegram-box text-center mb-4">
                <small class="text-muted fw-bold d-block mb-2" style="font-size: 0.75rem;">لتصلك رسالة الدخول، يجب بدء المحادثة مع البوت:</small>
                <a href="https://t.me/Moakkil_bot" target="_blank" class="telegram-link d-inline-block">
                    <i class="fab fa-telegram fa-lg me-1 align-middle"></i> @Moakkil_bot
                </a>
            </div>

            <button type="submit" class="btn btn-primary-custom w-100 shadow-sm" id="btnRequestOtp">
                <i class="fas fa-paper-plane me-2"></i> إرسال رمز التحقق
            </button>
            
            <button type="button" class="btn btn-biometric-custom w-100 mt-3 d-none" id="btnBiometric" onclick="handleBiometricLogin()">
                <i class="fas fa-fingerprint me-2"></i> الدخول السريع بالبصمة
            </button>
        </form>

        <form id="otpForm" class="d-none fade-in">
            <div class="mb-4">
                <label for="otpInput" class="form-label small fw-bold text-muted text-center w-100">أدخل الرمز السري <span class="text-danger">*</span></label>
                <input type="text" id="otpInput" class="form-control otp-input text-navy" placeholder="------" maxlength="6" required autocomplete="one-time-code" dir="ltr">
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 shadow-sm mb-3" id="btnVerifyOtp">
                <i class="fas fa-shield-alt me-1"></i> تأكيد الدخول
            </button>
            <button type="button" onclick="location.reload()" class="btn btn-link btn-sm w-100 text-decoration-none fw-bold" style="color: #64748b;">
                <i class="fas fa-arrow-right me-1"></i> تغيير رقم الهاتف
            </button>
        </form>
        
        <div class="text-center mt-4 pt-3 border-top">
            <a href="index.html" class="btn-back-home d-block mb-3"><i class="fas fa-home me-1"></i> العودة للصفحة الرئيسية</a>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> 
    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script> 
    
    <script>
        let currentPhone = '';
        const loginForm = document.getElementById('loginForm');
        const otpForm = document.getElementById('otpForm');
        const btnRequestOtp = document.getElementById('btnRequestOtp');
        const btnVerifyOtp = document.getElementById('btnVerifyOtp');
        const btnBiometric = document.getElementById('btnBiometric');

        function getOrCreateDeviceId() {
            let deviceId = localStorage.getItem('moakkil_device_id');
            if (!deviceId) {
                deviceId = 'dev_' + crypto.randomUUID();
                localStorage.setItem('moakkil_device_id', deviceId);
            }
            return deviceId;
        }

        window.addEventListener('DOMContentLoaded', () => {
            getOrCreateDeviceId();

            try {
                const fwSettings = JSON.parse(localStorage.getItem('firm_settings'));
                if (fwSettings) {
                    if (fwSettings.primary_color) document.documentElement.style.setProperty('--navy', fwSettings.primary_color);
                    if (fwSettings.accent_color) document.documentElement.style.setProperty('--accent', fwSettings.accent_color);
                }
            } catch (e) {}

            const token = localStorage.getItem(CONFIG?.TOKEN_KEY || 'moakkil_token');
            const userStr = localStorage.getItem(CONFIG?.USER_KEY || 'moakkil_user');
            if (token && userStr) {
                const user = JSON.parse(userStr);
                const userRole = user.role || user.user_type;
                if (userRole === 'super_admin' || userRole === 'superadmin' || user.is_setup_required) {
                    window.location.replace('register.html');
                } else {
                    window.location.replace('app.html');
                }
            }

            if (localStorage.getItem(CONFIG?.BIOMETRIC_ID_KEY || 'moakkil_biometric_id')) {
                btnBiometric.classList.remove('d-none');
            }

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js').catch(console.error);
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phoneInput').value.trim();
            if (!phone) return;

            btnRequestOtp.disabled = true;
            const originalHtml = btnRequestOtp.innerHTML;
            btnRequestOtp.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> جاري الإرسال...';

            try {
                await AUTH.requestOTP(phone);
                currentPhone = phone;
                
                loginForm.classList.add('d-none');
                otpForm.classList.remove('d-none');
                
                Swal.fire({
                    icon: 'success',
                    title: 'تم الإرسال!',
                    text: 'تفقد حسابك في تيليغرام للحصول على الرمز.',
                    confirmButtonColor: 'var(--navy)'
                });
                
                setTimeout(() => document.getElementById('otpInput').focus(), 300);
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: err.message, confirmButtonColor: 'var(--navy)' });
            } finally {
                btnRequestOtp.disabled = false;
                btnRequestOtp.innerHTML = originalHtml;
            }
        });

        otpForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = document.getElementById('otpInput').value.trim();
            if (!otp) return;

            btnVerifyOtp.disabled = true;
            const originalHtml = btnVerifyOtp.innerHTML;
            btnVerifyOtp.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> جاري التحقق...';

            try {
                // إظهار رسالة النجاح فوراً، ودالة verifyOTP في auth.js ستتكفل بالانتقال بعد 800ms
                Swal.fire({
                    icon: 'success',
                    title: 'مرحباً بك!',
                    text: 'تم التحقق بنجاح، جاري التوجيه...',
                    showConfirmButton: false,
                    timer: 1500
                });
                
                await AUTH.verifyOTP(currentPhone, otp);
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'الرمز غير صحيح', text: err.message,
