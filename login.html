<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a192f">
    <title>دخول نظام موكّل 4.0 | Enterprise</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        :root { 
            --navy: #0a192f; 
            --accent: #d69e2e; 
            --light-bg: #f8fafc; 
            --telegram: #0088cc;
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, var(--navy) 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 45px 35px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-circle {
            width: 95px;
            height: 95px;
            background: var(--navy);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            box-shadow: 0 10px 30px rgba(10, 25, 47, 0.4);
            border: 3px solid var(--accent);
        }

        .form-control {
            background: var(--light-bg);
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            padding: 14px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--navy);
            text-align: center;
        }

        .form-control:focus {
            border-color: var(--navy);
            box-shadow: 0 0 0 4px rgba(10, 25, 47, 0.1);
            background: #ffffff;
            outline: none;
        }

        .btn-primary-custom {
            background: var(--navy);
            color: white;
            border-radius: 14px;
            padding: 14px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary-custom:hover:not(:disabled) {
            background: #1e3a8a;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(10, 25, 47, 0.25);
            color: white;
        }
        
        .btn-primary-custom:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            opacity: 0.8;
        }

        .otp-input {
            letter-spacing: 15px;
            font-size: 1.8rem;
            text-align: center;
            font-weight: 900;
            padding: 15px !important;
        }

        .telegram-box {
            background: rgba(0, 136, 204, 0.04);
            border-radius: 14px;
            border: 1px dashed rgba(0, 136, 204, 0.4);
            padding: 15px;
            margin-bottom: 25px;
        }

        .telegram-link {
            color: var(--telegram);
            font-weight: 800;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 25px;
            background: rgba(0, 136, 204, 0.1);
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .telegram-link:hover {
            background: var(--telegram);
            color: white;
        }

        .fade-in { animation: fadeIn 0.5s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <div class="logo-circle">
                <i class="fas fa-balance-scale fa-3x" style="color: var(--accent);"></i>
            </div>
            <h3 class="fw-bold mb-1" style="color: var(--navy);">نظام موكّل</h3>
            <p class="text-muted small fw-bold">تسجيل الدخول الآمن والموحد (SSO)</p>
        </div>

        <form id="loginForm">
            <div class="mb-4">
                <label for="phoneInput" class="form-label fw-bold text-muted small">رقم الهاتف المسجل بالنظام <span class="text-danger">*</span></label>
                <input type="tel" id="phoneInput" class="form-control" placeholder="07xxxxxxxx" required autocomplete="tel" dir="ltr">
            </div>

            <div class="telegram-box text-center">
                <small class="text-muted fw-bold d-block mb-2" style="font-size: 0.8rem;">لتصلك رسالة الدخول، يجب بدء المحادثة مع البوت:</small>
                <a href="https://t.me/Moakkil_bot" target="_blank" class="telegram-link">
                    <i class="fab fa-telegram fa-lg"></i> @Moakkil_bot
                </a>
            </div>

            <button type="submit" class="btn btn-primary-custom w-100 shadow-sm" id="btnRequestOtp">
                <i class="fas fa-paper-plane"></i> إرسال رمز التحقق
            </button>
            
            <button type="button" class="btn btn-outline-dark w-100 mt-3 d-none" id="btnBiometric" onclick="handleBiometricLogin()" style="border-radius: 14px; padding: 12px; font-weight: 700;">
                <i class="fas fa-fingerprint me-2"></i> الدخول السريع بالبصمة
            </button>
        </form>

        <form id="otpForm" class="d-none fade-in">
            <div class="mb-4">
                <label for="otpInput" class="form-label fw-bold text-muted text-center w-100 small">أدخل الرمز السري المرسل لتيليغرام <span class="text-danger">*</span></label>
                <input type="text" id="otpInput" class="form-control otp-input" placeholder="------" maxlength="6" required autocomplete="one-time-code" dir="ltr">
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 shadow-sm mb-3" id="btnVerifyOtp">
                <i class="fas fa-shield-alt"></i> تأكيد الدخول
            </button>
            <button type="button" onclick="location.reload()" class="btn btn-link btn-sm w-100 text-decoration-none fw-bold" style="color: #64748b;">
                <i class="fas fa-redo-alt me-1"></i> تعديل رقم الهاتف
            </button>
        </form>
        
        <div class="text-center mt-4 pt-4 border-top">
            <a href="index.html" class="text-muted text-decoration-none small fw-bold"><i class="fas fa-home me-1"></i> العودة للرئيسية</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> 
    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script> 
    
    <script>
        let currentPhone = '';
        const loginForm = document.getElementById('loginForm');
        const otpForm = document.getElementById('otpForm');
        const btnRequestOtp = document.getElementById('btnRequestOtp');
        const btnVerifyOtp = document.getElementById('btnVerifyOtp');

        // دالة توليد معرف الجهاز (دستور الجلسة الأحادية)
        function initDeviceId() {
            if (!localStorage.getItem('moakkil_device_id')) {
                localStorage.setItem('moakkil_device_id', 'dev_' + crypto.randomUUID());
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            initDeviceId();
            
            // تطبيق الألوان الديناميكية
            try {
                const settings = JSON.parse(localStorage.getItem('firm_settings'));
                if (settings?.primary_color) document.documentElement.style.setProperty('--navy', settings.primary_color);
            } catch (e) {}

            // فحص وجود بصمة
            if (localStorage.getItem('moakkil_biometric_id')) {
                document.getElementById('btnBiometric').classList.remove('d-none');
            }
        });

        // تنفيذ طلب الـ OTP
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phoneInput').value.trim();
            if (!phone) return;

            btnRequestOtp.disabled = true;
            btnRequestOtp.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> جاري الإرسال...';

            try {
                console.log("🚀 جاري طلب الكود للرقم:", phone);
                await AUTH.requestOTP(phone);
                currentPhone = phone;
                
                // الانتقال للخطوة التالية (هنا يكمن الحل)
                loginForm.classList.add('d-none');
                otpForm.classList.remove('d-none');
                
                Swal.fire({
                    icon: 'success',
                    title: 'تم إرسال الرمز!',
                    text: 'تحقق من حسابك في تيليغرام الآن.',
                    confirmButtonColor: 'var(--navy)',
                    timer: 3000
                });
                
                setTimeout(() => document.getElementById('otpInput').focus(), 400);

            } catch (err) {
                console.error("❌ خطأ في طلب OTP:", err);
                Swal.fire({ 
                    icon: 'error', 
                    title: 'فشل الإرسال', 
                    text: err.message || 'تأكد من اتصالك بالإنترنت أو أن الرقم مسجل بالنظام.', 
                    confirmButtonColor: 'var(--navy)' 
                });
            } finally {
                btnRequestOtp.disabled = false;
                btnRequestOtp.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال رمز التحقق';
            }
        });

        // تنفيذ التحقق
        otpForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = document.getElementById('otpInput').value.trim();
            if (!otp) return;

            btnVerifyOtp.disabled = true;
            btnVerifyOtp.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> جاري المصادقة...';

            try {
                await AUTH.verifyOTP(currentPhone, otp);
                Swal.fire({
                    icon: 'success',
                    title: 'تم بنجاح',
                    text: 'جاري تجهيز مساحة العمل...',
                    showConfirmButton: false,
                    timer: 1500
                });
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'رمز غير صحيح', text: err.message, confirmButtonColor: 'var(--navy)' });
            } finally {
                btnVerifyOtp.disabled = false;
                btnVerifyOtp.innerHTML = '<i class="fas fa-shield-alt"></i> تأكيد الدخول';
            }
        });

        async function handleBiometricLogin() {
            try {
                await AUTH.loginWithBiometric();
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'فشل البصمة', text: err.message, confirmButtonColor: 'var(--navy)' });
            }
        }
    </script>
</body>
</html>
