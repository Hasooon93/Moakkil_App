<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6f42c1">
    <title>تسجيل الدخول | نظام موكّل الآمن</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6f42c1;
            --primary-hover: #59359a;
            --bg-color: #f4f6f9;
            --text-color: #333;
            --danger: #dc3545;
            --success: #198754;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at top right, #e2d9f3 0%, transparent 40%),
                              radial-gradient(circle at bottom left, #d1e7dd 0%, transparent 40%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
            border-top: 5px solid var(--primary);
            position: relative;
            overflow: hidden;
        }

        .logo-area {
            margin-bottom: 30px;
        }

        .logo-area i {
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .logo-area h1 {
            margin: 0;
            font-size: 1.8rem;
            color: var(--text-color);
            font-weight: 800;
        }

        .logo-area p {
            color: #666;
            font-size: 0.95rem;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 0.9rem;
        }

        .input-icon-wrapper {
            position: relative;
        }

        .input-icon-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }

        .form-control {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.3s;
            box-sizing: border-box;
            background: #fafafa;
        }

        .form-control:focus {
            border-color: var(--primary);
            background: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(111, 66, 193, 0.1);
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-submit:disabled {
            background: #aaa;
            cursor: not-allowed;
            transform: none;
        }

        .biometric-btn {
            background: transparent;
            color: var(--text-color);
            border: 1px solid #ddd;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-family: inherit;
        }

        .biometric-btn:hover {
            background: #f8f9fa;
            border-color: #bbb;
        }

        .biometric-btn i {
            color: var(--primary);
            font-size: 1.2rem;
        }

        /* حاويات الخطوات */
        .step {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .step.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-box {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            display: none;
        }

        .alert-error {
            background: #f8d7da;
            color: var(--danger);
            border: 1px solid #f5c2c7;
        }

        .alert-success {
            background: #d1e7dd;
            color: var(--success);
            border: 1px solid #badbcc;
        }

        .security-badge {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #888;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .security-badge i {
            color: var(--success);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <i class="fas fa-balance-scale"></i>
            <h1>نظام موكّل</h1>
            <p>بوابة الدخول الموحدة والمؤمنة</p>
        </div>

        <div id="alertBox" class="alert-box"></div>

        <div id="step-phone" class="step active">
            <form id="phoneForm">
                <div class="form-group">
                    <label>رقم الهاتف المعتمد</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="userPhone" class="form-control" placeholder="07XXXXXXXX" required dir="ltr" style="text-align: right;">
                    </div>
                </div>
                
                <button type="submit" class="btn-submit" id="btnRequestOtp">
                    متابعة <i class="fas fa-arrow-left"></i>
                </button>

                <div style="position: relative; text-align: center; margin: 20px 0;">
                    <hr style="border: none; border-top: 1px solid #eee;">
                    <span style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: white; padding: 0 10px; color: #888; font-size: 0.9rem;">أو</span>
                </div>

                <button type="button" class="biometric-btn" id="btnBiometricLogin">
                    <i class="fas fa-fingerprint"></i> الدخول السريع بالبصمة
                </button>
            </form>
        </div>

        <div id="step-otp" class="step">
            <p style="color: #555; margin-bottom: 20px; font-size: 0.95rem;">
                تم إرسال كود التحقق (OTP) إلى حسابك في تيليغرام.<br>
                <strong id="displayPhone" dir="ltr"></strong>
            </p>
            <form id="otpForm">
                <div class="form-group">
                    <label>كود التحقق (6 أرقام)</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="text" id="userOtp" class="form-control" placeholder="أدخل الكود هنا" required dir="ltr" style="text-align: center; font-size: 1.2rem; letter-spacing: 5px;" maxlength="6">
                    </div>
                </div>
                
                <button type="submit" class="btn-submit" id="btnVerifyOtp">
                    تحقق ودخول <i class="fas fa-sign-in-alt"></i>
                </button>

                <button type="button" style="background:none; border:none; color:var(--primary); margin-top:15px; cursor:pointer; font-family:inherit; font-weight:600; text-decoration:underline;" onclick="resetToPhoneStep()">
                    تغيير رقم الهاتف
                </button>
            </form>
        </div>

        <div class="security-badge">
            <i class="fas fa-shield-check"></i> اتصال مشفر بـ 256-bit وحماية RLS مفعلة
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
