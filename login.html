<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دخول نظام موكّل 2.0</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root { --navy: #1a237e; --accent: #ffd700; }
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7f9; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 20px; background: #ffffff; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .brand-logo { font-size: 2.5rem; font-weight: 900; color: var(--navy); text-align: center; margin-bottom: 0.5rem; }
        .nav-pills .nav-link { color: var(--navy); font-weight: 700; border-radius: 10px; }
        .nav-pills .nav-link.active { background-color: var(--navy); color: white; }
        .form-control { border-radius: 12px; padding: 12px; border: 2px solid #eef2f6; font-weight: 700; text-align: center; }
        .btn-navy { background-color: var(--navy); color: white; border-radius: 12px; padding: 12px; font-weight: 700; width: 100%; transition: 0.3s; }
        .btn-navy:hover { background-color: #0d1440; color: white; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-logo">موكّل</div>
        <p class="text-center text-muted mb-4 small">نظام إدارة المكاتب القانونية</p>

        <ul class="nav nav-pills nav-fill mb-4 bg-light rounded-3 p-1" id="loginTabs">
            <li class="nav-item">
                <button class="nav-link active" onclick="toggleLogin('admin', this)">المدير</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" onclick="toggleLogin('staff', this)">الموظفين</button>
            </li>
        </ul>

        <div id="admin-login-view">
            <div id="phone-section">
                <div class="mb-3">
                    <label class="form-label fw-bold">رقم الهاتف</label>
                    <input type="tel" id="phone" class="form-control" placeholder="07XXXXXXXX">
                </div>
                <button onclick="requestOTP()" class="btn btn-navy">إرسال كود الدخول</button>
            </div>

            <div id="otp-section" class="d-none">
                <div class="mb-3">
                    <label class="form-label fw-bold">كود التحقق (Telegram)</label>
                    <input type="text" id="otp" class="form-control" placeholder="------" maxlength="6">
                </div>
                <button onclick="verifyOTP()" class="btn btn-success w-100 py-3 rounded-3 fw-bold">تأكيد ودخول</button>
                <button onclick="location.reload()" class="btn btn-link btn-sm w-100 mt-2 text-decoration-none text-muted">تغيير الرقم</button>
            </div>
        </div>

        <div id="staff-login-view" class="d-none">
            <div class="mb-2">
                <label class="form-label fw-bold">اسم المستخدم</label>
                <input type="text" id="username" class="form-control" placeholder="Username">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">كلمة المرور</label>
                <input type="password" id="password" class="form-control" placeholder="Password">
            </div>
            <button onclick="staffLogin()" class="btn btn-navy">دخول فريق العمل</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="./js/config.js"></script>
    <script src="./js/auth.js"></script>

    <script>
        // دالة التبديل بين الواجهات في صفحة الدخول
        function toggleLogin(type, btn) {
            document.querySelectorAll('#loginTabs .nav-link').forEach(l => l.classList.remove('active'));
            btn.classList.add('active');

            if(type === 'admin') {
                document.getElementById('admin-login-view').classList.remove('d-none');
                document.getElementById('staff-login-view').classList.add('d-none');
            } else {
                document.getElementById('admin-login-view').classList.add('d-none');
                document.getElementById('staff-login-view').classList.remove('d-none');
            }
        }
    </script>
</body>
</html>
