<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بروفايل الموكل | موكّل</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
    
    <style>
        .nav-pills .nav-link { border-radius: 10px; color: var(--navy); font-weight: 700; border: 1px solid #eef2f6; margin-left: 5px; transition: 0.3s; }
        .nav-pills .nav-link.active { background-color: var(--navy); color: white; border-color: var(--navy); }
    </style>
</head>
<body style="background: var(--bg-light); padding-bottom: 80px;">

    <div class="top-nav px-3 d-flex align-items-center shadow-sm" style="height: 65px; background: var(--navy);">
        <button class="btn btn-link text-white text-decoration-none me-2 p-0" onclick="window.location.href='app.html'"><i class="fas fa-arrow-right fs-4"></i></button>
        <h6 class="text-white mb-0 fw-bold">الملف الشخصي للموكل</h6>
    </div>

    <div class="container mt-3">
        <div class="card-custom text-center mb-3 border-top border-4 border-info shadow-sm">
            <div class="bg-light rounded-circle d-inline-block p-3 mb-2">
                <i class="fas fa-user-tie fs-1 text-info"></i>
            </div>
            <h4 class="fw-bold text-navy mb-1" id="cd-name">جاري التحميل...</h4>
            <span class="badge bg-secondary mb-3" id="cd-type">فرد</span>
            
            <div class="row g-2 text-end">
                <div class="col-6"><small class="text-muted"><i class="fas fa-phone"></i> الهاتف:</small> <b id="cd-phone">--</b></div>
                <div class="col-6"><small class="text-muted"><i class="fas fa-id-card"></i> الوطني:</small> <b id="cd-national">--</b></div>
                <div class="col-12"><small class="text-muted"><i class="fas fa-map-marker-alt"></i> العنوان:</small> <b id="cd-address">--</b></div>
            </div>
        </div>

        <ul class="nav nav-pills mb-3 justify-content-center" role="tablist">
            <li class="nav-item"><button class="nav-link active shadow-sm px-4" data-bs-toggle="pill" data-bs-target="#tab-cases">القضايا</button></li>
            <li class="nav-item"><button class="nav-link shadow-sm px-4" data-bs-toggle="pill" data-bs-target="#tab-files">المرفقات الشخصية</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="tab-cases">
                <h6 class="fw-bold text-navy mb-3"><i class="fas fa-folder-open me-2 text-warning"></i> قضايا الموكل</h6>
                <div id="client-cases-list"></div>
            </div>

            <div class="tab-pane fade" id="tab-files">
                <div class="d-flex justify-content-between mb-3 align-items-center">
                    <h6 class="fw-bold mb-0 text-navy"><i class="fas fa-id-badge me-2 text-primary"></i> المستندات (هويات، وكالات)</h6>
                    <button class="btn btn-sm btn-warning fw-bold text-dark" onclick="openModal('uploadModal')"><i class="fas fa-upload"></i> رفع ملف</button>
                </div>
                <div class="row g-2" id="client-files-list"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="uploadModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0" style="border-radius: 20px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-navy">رفع مستند شخصي</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="uploadForm" onsubmit="uploadPersonalFile(event)">
                        <input type="text" id="file_title" class="form-control mb-2" placeholder="اسم المستند (مثال: صورة الهوية) *" required>
                        <select id="file_cat" class="form-select mb-2" required>
                            <option value="هوية">إثبات شخصية (هوية / جواز)</option>
                            <option value="وكالة">وكالة قانونية</option>
                            <option value="سجل تجاري">سجل تجاري</option>
                            <option value="أخرى">أخرى</option>
                        </select>
                        <input type="file" id="file_input" class="form-control mb-3" accept="image/*,.pdf" required>
                        
                        <button type="submit" id="btn_upload" class="btn btn-primary-custom w-100">بدء الرفع</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="alertBox" class="alert-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/client-details.js"></script>
</body>
</html>
